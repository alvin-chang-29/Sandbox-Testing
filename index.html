<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢閱讀大冒險 v8.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        body { font-family: 'ZCOOL+KuaiLe', cursive, sans-serif; touch-action: manipulation; }
        .pokemon-float { animation: floating 3s ease-in-out infinite; }
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .hp-bar { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-green-50 h-screen flex flex-col overflow-hidden">

    <div class="bg-white p-2 shadow-md flex justify-between items-center z-50">
        <div class="flex items-center">
            <div class="w-10 h-10 bg-yellow-400 rounded-full flex items-center justify-center mr-2 shadow">
                <span id="player-lv">Lv1</span>
            </div>
            <span class="font-bold text-gray-700">閱讀冒險者</span>
        </div>
        <div class="text-xs bg-blue-100 px-2 py-1 rounded-full text-blue-600">
            收集進度: <span id="collection-count">0</span>
        </div>
    </div>

    <div id="battle-scene" class="flex-grow relative flex flex-col items-center justify-center p-4">
        
        <div class="relative w-full flex flex-col items-center mb-8">
            <div id="enemy-info" class="absolute -top-10 left-4 bg-white/80 p-2 rounded-lg border-2 border-green-500 shadow-sm w-40">
                <div class="text-sm font-bold" id="enemy-name">載入中...</div>
                <div class="w-full bg-gray-200 h-2 rounded-full mt-1">
                    <div id="enemy-hp" class="hp-bar bg-green-500 h-2 rounded-full" style="width: 100%"></div>
                </div>
            </div>
            <img id="pokemon-img" src="" class="w-48 h-48 pokemon-float drop-shadow-2xl" alt="Pokemon">
        </div>

        <div id="reading-box" class="w-full max-w-sm bg-white rounded-3xl p-6 shadow-xl border-4 border-yellow-400 relative">
            <div class="text-center mb-4">
                <p class="text-gray-400 text-xs tracking-widest uppercase">Reading Quest</p>
                <h2 id="quest-text" class="text-2xl font-bold text-blue-600 mt-1 cursor-pointer hover:scale-105 transition">
                    Click to Read!
                </h2>
            </div>

            <div id="options-grid" class="grid grid-cols-2 gap-3">
                </div>
        </div>
    </div>

    <div class="h-20 bg-white border-t flex justify-around items-center px-4">
        <button onclick="location.reload()" class="flex flex-col items-center">
            <span class="text-2xl">🔍</span>
            <span class="text-xs text-gray-500">尋找</span>
        </button>
        <button class="w-16 h-16 bg-red-500 rounded-full border-4 border-white -mt-10 shadow-lg flex items-center justify-center text-white font-bold">
            GO
        </button>
        <button id="show-bag" class="flex flex-col items-center">
            <span class="text-2xl">🎒</span>
            <span class="text-xs text-gray-500">背包</span>
        </button>
    </div>

    <script>
        // 1. 初始化資料庫
        const db = new Dexie("PokemonReadingDB");
        db.version(1).stores({
            myPokemon: '++id, pokeId, name, timestamp'
        });

        // 2. 教材資料庫 (結合圖片中的 Lesson 4 & 5)
        const curriculum = [
            { text: "Kick the ball.", target: "ball", options: ["ball", "box", "log"], audio: "Kick the ball" },
            { text: "A fox on a box.", target: "fox", options: ["fox", "dog", "frog"], audio: "A fox on a box" },
            { text: "Roll the ball.", target: "ball", options: ["ball", "clock", "sock"], audio: "Roll the ball" },
            { text: "Watch out! Don't fall.", target: "fall", options: ["fall", "climb", "crawl"], audio: "Watch out! Don't fall" },
            { text: "Climb and crawl.", target: "crawl", options: ["crawl", "jump", "kick"], audio: "Climb and crawl" }
        ];

        let currentQuest = {};
        let currentPoke = {};

        // 3. 核心功能：獲取寶可夢
        async function fetchWildPokemon() {
            const id = Math.floor(Math.random() * 151) + 1;
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
            const data = await res.json();
            
            // 獲取中文名稱
            const speciesRes = await fetch(data.species.url);
            const speciesData = await speciesRes.json();
            const nameObj = speciesData.names.find(n => n.language.name === "zh-Hant");
            
            currentPoke = {
                id: data.id,
                name: nameObj ? nameObj.name : data.name,
                img: data.sprites.other['official-artwork'].front_default
            };

            document.getElementById('pokemon-img').src = currentPoke.img;
            document.getElementById('enemy-name').innerText = currentPoke.name;
            newQuest();
        }

        // 4. 核心功能：出題 (RPG 模式)
        function newQuest() {
            currentQuest = curriculum[Math.floor(Math.random() * curriculum.length)];
            const questDisplay = document.getElementById('quest-text');
            questDisplay.innerText = currentQuest.text;
            
            // 點擊文字朗讀 (TTS)
            questDisplay.onclick = () => speak(currentQuest.audio);

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            
            // 混淆選項並生成按鈕
            [...currentQuest.options].sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "bg-blue-50 hover:bg-yellow-100 border-2 border-blue-200 p-4 rounded-2xl font-bold text-xl text-blue-800 transition active:scale-95";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt);
                grid.appendChild(btn);
            });
        }

        // 5. 檢查答案與捕獲邏輯
        async function checkAnswer(ans) {
            if (ans === currentQuest.target) {
                // 答對：捕獲動畫
                speak("Correct! You got it!");
                document.getElementById('enemy-hp').style.width = "0%";
                document.getElementById('pokemon-img').style.transform = "scale(0) rotate(720deg)";
                document.getElementById('pokemon-img').style.transition = "all 0.8s";
                
                // 存入 Dexie
                await db.myPokemon.add({
                    pokeId: currentPoke.id,
                    name: currentPoke.name,
                    timestamp: Date.now()
                });
                
                updateCounter();
                setTimeout(() => {
                    alert(`太棒了！你收服了 ${currentPoke.name}！`);
                    location.reload();
                }, 1000);
            } else {
                // 答錯：抖動提醒
                speak("Try again!");
                document.getElementById('reading-box').classList.add('animate-bounce');
                setTimeout(() => document.getElementById('reading-box').classList.remove('animate-bounce'), 500);
            }
        }

        // 語音引擎
        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.8; // 六歲孩子聽慢一點比較好
            window.speechSynthesis.speak(msg);
        }

        // 更新計數器
        async function updateCounter() {
            const count = await db.myPokemon.count();
            document.getElementById('collection-count').innerText = count;
            document.getElementById('player-lv').innerText = `Lv${Math.floor(count/3) + 1}`;
        }

        window.onload = () => {
            fetchWildPokemon();
            updateCounter();
        };
    </script>
</body>
</html>
