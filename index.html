<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mezastar Math: Ultimate v24.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Noto+Sans+TC:wght@900&display=swap');
        
        body { 
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif; 
            background: #020617; color: white; overflow: hidden; 
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* --- 遊戲開始：10隻寶可夢 3D 爆炸開場 --- */
        .burst-stage { perspective: 1500px; position: relative; width: 100vw; height: 60vh; overflow: hidden; }
        .poke-burst-unit {
            position: absolute; width: 180px; height: 180px;
            top: 50%; left: 50%; margin-top: -90px; margin-left: -90px;
            opacity: 0; pointer-events: none;
        }
        @keyframes burst-fly {
            0% { transform: translateZ(-1000px) scale(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateZ(1200px) scale(8) rotate(20deg); opacity: 0; }
        }

        /* --- 戰鬥畫面細節修正 --- */
        .matrix-scale { transform: scale(1.5); transform-origin: center; }
        .battling { animation: strong-shake 0.1s infinite; }
        @keyframes strong-shake { 0% { transform: translate(-3px, 3px); } 50% { transform: translate(3px, -3px); } }

        /* 題目黃色框框精準對位 */
        .formula-box {
            display: inline-flex; align-items: center; justify-content: center;
            border: 6px solid #facc15; background: rgba(0,0,0,0.4);
            padding: 10px 30px; border-radius: 20px; box-shadow: 0 0 20px #facc15;
        }

        .block-unit {
            width: 90%; height: 90%; margin: auto; border-radius: 8px;
            background: radial-gradient(circle at 30% 30%, #fbbf24, #d97706);
            transform: scale(0); transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .block-show { transform: scale(1); }

        .ans-glow-slow {
            animation: glow-pulse 1.2s infinite alternate;
            color: #facc15; text-shadow: 0 0 30px #facc15; cursor: pointer;
        }
        @keyframes glow-pulse { from { opacity: 0.6; transform: scale(1); } to { opacity: 1; transform: scale(1.2); } }

        .scene { position: absolute; inset: 0; width: 100%; height: 100%; transition: opacity 0.5s; }
        .hidden { display: none !important; opacity: 0; }
        .hp-fill { background: #ef4444; transition: width 1s ease-in-out; }
    </style>
</head>
<body>

    <div id="scene-start" class="scene flex flex-col items-center justify-center bg-black z-[1000]">
        <div class="burst-stage" id="burst-box">
            </div>
        <div class="z-50 text-center -mt-20">
            <h1 class="text-7xl font-black italic text-blue-500 mb-4 drop-shadow-[0_0_30px_#3b82f6]">MEZASTAR MATH</h1>
            <p class="text-yellow-400 font-bold tracking-widest mb-12">ULTIMATE ADVENTURE</p>
            <button onclick="changeScene('main')" class="bg-red-600 px-24 py-8 rounded-full text-4xl font-black border-4 border-white shadow-[0_0_50px_#ef4444] active:scale-90 transition">
                一起抓夢吧！
            </button>
        </div>
    </div>

    <div id="scene-main" class="scene hidden flex flex-col p-6">
        <div class="flex justify-center mb-12 mt-4">
            <div class="formula-box text-[120px] font-black italic text-white leading-none">
                <span id="q-a">?</span> 
                <span class="text-blue-500 mx-4">×</span> 
                <span id="q-b">?</span> 
                <span class="text-blue-500 mx-4">=</span> 
                <span id="q-ans" class="text-slate-800 transition-all">?</span>
            </div>
        </div>

        <div class="flex-grow flex items-center justify-around gap-10">
            <div class="flex flex-col items-center w-1/4">
                <div id="enemy-sprite" class="w-80 h-80 bg-contain bg-no-repeat bg-center" style="filter: drop-shadow(0 0 40px #ef4444);"></div>
                <div class="mt-4 text-center bg-black/60 p-6 rounded-[2rem] w-full border-2 border-white/20">
                    <p id="e-name-zh" class="text-3xl font-black text-white mb-1">---</p>
                    <p id="e-name-other" class="text-xs text-slate-400 font-bold uppercase tracking-widest">--- / ---</p>
                    <div class="w-full h-6 bg-red-950 rounded-full mt-4 border-2 border-white overflow-hidden">
                        <div id="e-hp" class="hp-fill h-full w-full"></div>
                    </div>
                    <button onclick="refreshEnemy()" class="mt-6 text-xs bg-slate-800 px-8 py-2 rounded-full border border-slate-600 hover:bg-slate-700 active:scale-95 transition">挑戰其他寶可夢</button>
                </div>
            </div>

            <div class="flex flex-col items-center justify-center">
                <div class="matrix-scale bg-slate-900 border-4 border-blue-500 w-[300px] h-[300px] p-2 relative rounded-3xl shadow-2xl">
                    <div id="grid" class="grid grid-cols-10 grid-rows-10 gap-1 h-full w-full"></div>
                    <div id="block-layer" class="absolute inset-0 p-2 grid grid-cols-10 grid-rows-10 gap-1 pointer-events-none"></div>
                </div>
                <button id="btn-go" onclick="startBattle()" class="bg-blue-600 mt-28 px-16 py-6 rounded-3xl font-black italic text-3xl border-b-8 border-blue-900 shadow-2xl">
                    上吧！<span class="p-name-display">皮卡丘</span>
                </button>
            </div>

            <div class="flex flex-col items-center w-1/4">
                <div id="player-sprite" class="w-80 h-80 bg-contain bg-no-repeat bg-center" style="transform: scaleX(-1); filter: drop-shadow(0 0 40px #3b82f6);"></div>
                <div class="mt-4 text-center bg-black/60 p-6 rounded-[2rem] w-full border-2 border-blue-500/40">
                    <p class="p-name-display text-3xl font-black text-blue-400 mb-1">皮卡丘</p>
                    <p id="p-name-other" class="text-xs text-slate-400 font-bold uppercase tracking-widest">Pikachu / ピカチュウ</p>
                    <div class="w-full h-6 bg-red-950 rounded-full mt-4 border-2 border-white overflow-hidden">
                        <div id="p-hp" class="hp-fill h-full w-full"></div>
                    </div>
                    <button onclick="openBag()" class="mt-8 bg-slate-800 px-10 py-4 rounded-3xl border-2 border-slate-500 flex items-center gap-4 mx-auto">
                        <span class="text-3xl">🎒</span> <span class="font-black text-xl">背包</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="scene-capture" class="scene hidden flex flex-col items-center justify-center bg-black/95 z-[2000] p-10">
        <div id="cap-sprite" class="w-[450px] h-[450px] bg-contain bg-no-repeat bg-center mb-8 animate-bounce"></div>
        <div class="bg-slate-900/90 p-12 rounded-[4rem] border-8 border-yellow-500 text-center shadow-2xl">
            <h2 id="cap-name-zh" class="text-6xl font-black text-yellow-400 italic mb-2">---</h2>
            <p id="cap-name-other" class="text-slate-400 text-xl font-bold uppercase">--- / ---</p>
            <p class="text-white text-4xl font-black mt-10 tracking-widest">成功收服了！！</p>
        </div>
        <button onclick="enterHub()" class="mt-16 bg-red-600 px-20 py-8 rounded-3xl font-black text-3xl">下一個挑戰</button>
    </div>

    <script>
        const db = new Dexie("MezastarFinalDB_v24");
        db.version(1).stores({ bag: 'id, name, en, jp' });

        // 開始畫面的 10 隻經典寶可夢 ID (旅途 & 地平線)
        const START_POKES = [25, 6, 906, 909, 912, 150, 448, 133, 94, 815]; 
        
        const PRESET_BAG = [
            {id: 25, name: "皮卡丘", en: "Pikachu", jp: "ピカチュウ"},
            {id: 6, name: "噴火龍", en: "Charizard", jp: "リザードン"},
            {id: 906, name: "新葉喵", en: "Sprigatito", jp: "ニャオハ"},
            {id: 909, name: "呆火鱷", en: "Fuecoco", jp: "ホゲータ"},
            {id: 912, name: "潤水鴨", en: "Quaxly", jp: "クワッス"}
        ];

        let valA, valB, ans, playerPoke = PRESET_BAG[0], enemyPoke = {};

        function initStartScene() {
            const box = document.getElementById('burst-box');
            START_POKES.forEach((id, index) => {
                const img = document.createElement('img');
                img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
                img.className = 'poke-burst-unit';
                img.style.animation = `burst-fly 2s ease-in forwards`;
                img.style.animationDelay = `${index * 0.4}s`;
                img.style.animationIterationCount = 'infinite';
                box.appendChild(img);
            });
        }

        async function init() {
            if (await db.bag.count() === 0) await db.bag.bulkAdd(PRESET_BAG);
            initStartScene();
            buildGrid();
            refreshEnemy();
        }

        function changeScene(s) {
            document.querySelectorAll('.scene').forEach(sc => sc.classList.add('hidden'));
            document.getElementById(`scene-${s}`).classList.remove('hidden');
            if(s === 'main') resetBattleUI();
        }

        // 修改：從官方全圖鑑 (1-1025) 隨機挑選
        async function refreshEnemy() {
            const randomID = Math.floor(Math.random() * 1025) + 1;
            // 由於直接串接 API 名稱較慢，這裡模擬名稱獲取，建議未來可擴充為 JSON 圖鑑
            enemyPoke = { id: randomID, zh: "未知寶可夢", en: "Unknown", jp: "アンノウン" };
            
            // 試圖從已知的圖鑑匹配名稱（如有）
            const known = PRESET_BAG.find(p => p.id === randomID);
            if(known) enemyPoke = known;

            document.getElementById('enemy-sprite').style.backgroundImage = `url(https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${randomID}.png)`;
            document.getElementById('e-name-zh').innerText = enemyPoke.zh + " #" + randomID;
            document.getElementById('e-name-other').innerText = `${enemyPoke.en} / ${enemyPoke.jp}`;
            
            resetBattleUI();
        }

        function resetBattleUI() {
            valA = Math.floor(Math.random() * 8) + 2;
            valB = Math.floor(Math.random() * 8) + 2;
            ans = valA * valB;
            document.getElementById('q-a').innerText = valA;
            document.getElementById('q-b').innerText = valB;
            document.getElementById('q-ans').innerText = "?";
            document.getElementById('q-ans').className = "text-slate-800 bg-slate-800/20 px-4 rounded-xl";
            document.getElementById('e-hp').style.width = "100%";
            document.getElementById('p-hp').style.width = "100%";
            document.getElementById('btn-go').classList.remove('hidden');
            document.getElementById('enemy-sprite').classList.remove('battling');
            document.getElementById('player-sprite').classList.remove('battling');
            document.getElementById('block-layer').innerHTML = "";
            document.querySelectorAll('.guide-flash').forEach(el => el.classList.remove('guide-flash'));
        }

        function startBattle() {
            document.getElementById('btn-go').classList.add('hidden');
            document.getElementById('enemy-sprite').classList.add('battling');
            document.getElementById('player-sprite').classList.add('battling');
            document.getElementById('q-a').classList.add('guide-flash');
            document.getElementById(`row-${valA}`).classList.add('guide-flash');
        }

        function buildGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            for (let r = 0; r <= 9; r++) {
                for (let c = 0; c <= 9; c++) {
                    const d = document.createElement('div');
                    d.className = "flex items-center justify-center border border-slate-800 font-bold text-xs cursor-pointer";
                    if (c === 0 && r > 0) { 
                        d.innerText = r; d.id = `row-${r}`; d.classList.add('text-yellow-500');
                        d.onclick = () => handleRow(r); 
                    } else if (r === 0 && c > 0) { 
                        d.innerText = c; d.id = `col-${c}`; d.classList.add('text-blue-400');
                        d.onclick = () => handleCol(c); 
                    }
                    grid.appendChild(d);
                }
            }
        }

        function handleRow(r) {
            if(r === valA) {
                document.getElementById(`row-${valA}`).classList.remove('guide-flash');
                document.getElementById('q-a').classList.remove('guide-flash');
                for(let i=1; i<=valA; i++) createBlock(i, 1);
                document.getElementById(`col-${valB}`).classList.add('guide-flash');
                document.getElementById('q-b').classList.add('guide-flash');
            }
        }

        function handleCol(c) {
            if(c === valB) {
                document.getElementById(`col-${valB}`).classList.remove('guide-flash');
                document.getElementById('q-b').classList.remove('guide-flash');
                for(let j=2; j<=valB; j++) {
                    setTimeout(() => { for(let i=1; i<=valA; i++) createBlock(i, j); }, (j-1) * 300); 
                }
                setTimeout(() => {
                    const qa = document.getElementById('q-ans');
                    qa.innerText = ans;
                    qa.className = "ans-glow-slow bg-slate-700 px-6 rounded-2xl border-4 border-yellow-500";
                    qa.onclick = finalize;
                }, valB * 300 + 200);
            }
        }

        function finalize() {
            document.getElementById('e-hp').style.width = "0%";
            setTimeout(async () => {
                await db.bag.put({ id: enemyPoke.id, name: enemyPoke.zh, en: enemyPoke.en, jp: enemyPoke.jp });
                changeScene('capture');
                document.getElementById('cap-sprite').style.backgroundImage = document.getElementById('enemy-sprite').style.backgroundImage;
                document.getElementById('cap-name-zh').innerText = enemyPoke.zh;
                document.getElementById('cap-name-other').innerText = `${enemyPoke.en} / ${enemyPoke.jp}`;
            }, 1000);
        }

        function createBlock(r, c) {
            const wrap = document.createElement('div');
            wrap.style.gridRow = r + 1; wrap.style.gridColumn = c + 1;
            const b = document.createElement('div'); b.className = "block-unit";
            wrap.appendChild(b); document.getElementById('block-layer').appendChild(wrap);
            setTimeout(() => b.classList.add('block-show'), 50);
        }

        init();
    </script>
</body>
</html>
