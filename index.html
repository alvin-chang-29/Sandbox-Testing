<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mezastar Passionate Voice - v13.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');
        .impact-text {
            font-family: 'Permanent+Marker', cursive;
            text-shadow: 4px 4px 0px #be123c, 0 0 30px #fbbf24;
            animation: impact-zoom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.5);
        }
        @keyframes impact-zoom {
            0% { transform: scale(0.3) rotate(-15deg); opacity: 0; }
            50% { transform: scale(1.5) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center justify-center p-6 overflow-hidden">

    <div id="overlay" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center">
        <h2 class="text-blue-400 mb-8 tracking-widest font-black italic">ULTIMATE VOICE TEST</h2>
        <button id="btn-start" class="bg-red-600 px-16 py-8 rounded-full font-black text-2xl shadow-[0_0_30px_rgba(220,38,38,0.5)]">
            READY? GO!
        </button>
    </div>

    <div class="text-center w-full max-w-sm">
        <div id="voice-anchor" class="h-32 flex items-center justify-center">
            </div>

        <div class="bg-gradient-to-b from-slate-800 to-slate-950 p-10 rounded-[3rem] border-4 border-yellow-500 shadow-[0_0_50px_rgba(251,191,36,0.3)]">
            <p class="text-7xl font-black mb-10 text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 to-yellow-500">7 × 8</p>
            
            <button onclick="triggerPassionAttack()" class="w-full bg-blue-600 hover:bg-blue-400 py-6 rounded-3xl font-black italic text-3xl shadow-[0_8px_0_#1e3a8a] active:translate-y-1 active:shadow-none transition-all">
                ATTACK!
            </button>
        </div>
        
        <p class="mt-8 text-slate-500 text-xs">若人聲仍不夠激情，下一步將切換為純音效模式</p>
    </div>

    <script>
        // 1. 預載激情語音採樣 (選擇較大聲、具侵略性的音源)
        const voiceSamples = {
            'EXCELLENT': 'https://assets.mixkit.co/active_storage/sfx/2020/2020-preview.mp3', // 帶回音的慶祝
            'POWERFUL': 'https://assets.mixkit.co/active_storage/sfx/2577/2577-preview.mp3', // 複合重擊音
            'GREAT': 'https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'      // 閃光音
        };
        
        // 由於找高品質「吶喊」API 較難，這裡使用高音調處理的 SpeechSynthesis 作為備案，但加上「回響」
        function scream(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 1.1;  // 語速
            msg.pitch = 1.4; // 提高音調增加緊張感
            msg.volume = 1.0;
            window.speechSynthesis.speak(msg);
        }

        const bgm = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3');
        const impactSfx = new Audio('https://assets.mixkit.co/active_storage/sfx/2577/2577-preview.mp3');

        document.getElementById('btn-start').onclick = () => {
            bgm.loop = true; bgm.volume = 0.15; bgm.play();
            document.getElementById('overlay').style.display = 'none';
        };

        function triggerPassionAttack() {
            // 1. 播放重金屬撞擊音 (Mezastar 特色)
            impactSfx.currentTime = 0;
            impactSfx.volume = 0.8;
            impactSfx.play();

            // 2. 隨機激情語音
            const labels = ["EXCELLENT", "AMAZING", "POWERFUL", "YOU WIN"];
            const selected = labels[Math.floor(Math.random() * labels.length)];
            
            // 延遲 0.1 秒讓語音在爆炸聲中出現，模擬機台感
            setTimeout(() => {
                scream(selected);
            }, 100);

            // 3. 視覺震盪
            const anchor = document.getElementById('voice-anchor');
            anchor.innerHTML = `<h2 class="impact-text text-6xl font-black text-white italic">${selected}</h2>`;
            
            setTimeout(() => { anchor.innerHTML = ""; }, 1200);
        }
    </script>
</body>
</html>
