<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>強化戰鬥動效 - 模組測試 v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 強烈震動動畫 */
        @keyframes strong-shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-8px, -5px) rotate(-3deg); }
            30% { transform: translate(8px, 5px) rotate(3deg); }
            50% { transform: translate(-8px, 5px) rotate(-1deg); }
            70% { transform: translate(8px, -5px) rotate(3deg); }
            90% { transform: translate(-5px, 2px) rotate(-1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* 呼吸光芒動畫 */
        @keyframes aura-glow-enemy {
            from { filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.6)) brightness(1); }
            to { filter: drop-shadow(0 0 30px rgba(255, 50, 50, 0.9)) brightness(1.3); }
        }
        @keyframes aura-glow-player {
            from { filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.6)) brightness(1); }
            to { filter: drop-shadow(0 0 30px rgba(50, 200, 255, 0.9)) brightness(1.3); }
        }

        /* 快速閃爍 */
        @keyframes intense-flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .battle-active-enemy {
            animation: strong-shake 0.15s infinite, aura-glow-enemy 0.8s ease-in-out infinite alternate, intense-flash 0.3s infinite;
        }

        .battle-active-player {
            /* 玩家側同樣震動但光芒不同色 */
            animation: strong-shake 0.15s infinite, aura-glow-player 0.8s ease-in-out infinite alternate, intense-flash 0.3s infinite;
        }

        /* 逃跑動畫 (含搖晃位移) */
        .escape-sequence {
            transition: transform 4s cubic-bezier(0.45, 0.05, 0.55, 0.95), opacity 2s;
            transform: translateX(120vw) translateY(-20px) rotate(20deg) !important;
            animation: strong-shake 0.3s infinite !important; /* 逃跑時持續搖晃 */
        }
    </style>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-6xl grid grid-cols-3 gap-8 items-center bg-black/50 p-12 rounded-[3rem] border-4 border-slate-800 shadow-[0_0_50px_rgba(0,0,0,0.5)]">
        
        <div class="flex flex-col items-center">
            <div id="enemy" class="w-64 h-64 bg-contain bg-no-repeat bg-center transition-all"
                 style="background-image: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png');">
            </div>
            <p class="mt-4 text-red-500 font-black tracking-widest">ENEMY: 超夢</p>
        </div>

        <div class="text-center">
            <button onclick="toggleBattle()" id="battleBtn" class="bg-red-600 text-white text-3xl font-black px-12 py-6 rounded-full hover:bg-red-500 shadow-[0_0_20px_rgba(220,38,38,0.5)] active:scale-90 transition-all">
                進入對戰狀態
            </button>
            <p id="msg" class="mt-4 text-slate-400 font-mono"></p>
        </div>

        <div class="flex flex-col items-center">
            <div id="player" class="w-64 h-64 bg-contain bg-no-repeat bg-center transition-all"
                 style="background-image: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png'); transform: scaleX(-1);">
            </div>
            <p class="mt-4 text-blue-400 font-black tracking-widest">PLAYER: 皮卡丘</p>
        </div>

    </div>

    <script>
        let isBattling = false;

        function toggleBattle() {
            const enemy = document.getElementById('enemy');
            const player = document.getElementById('player');
            const btn = document.getElementById('battleBtn');
            const msg = document.getElementById('msg');

            if (!isBattling) {
                // 開始戰鬥：加入震動、光芒、閃爍
                enemy.classList.add('battle-active-enemy');
                player.classList.add('battle-active-player');
                btn.innerText = "模擬失敗 (逃跑)";
                btn.classList.replace('bg-red-600', 'bg-slate-700');
                msg.innerText = "對戰倒數中... 感覺到了嗎？這股壓迫感！";
                isBattling = true;
            } else {
                // 模擬失敗逃跑
                enemy.classList.remove('battle-active-enemy', 'intense-flash');
                enemy.classList.add('escape-sequence');
                player.classList.remove('battle-active-player');
                btn.style.display = 'none';
                msg.innerText = "超夢逃走了！(向右搖晃滑出螢幕)";
                
                setTimeout(() => {
                    alert("測試結束，重新整理可再次測試。");
                    location.reload();
                }, 4500);
            }
        }
    </script>
</body>
</html>
