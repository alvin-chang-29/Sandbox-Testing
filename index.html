<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>寶可夢數學 Mezastar Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Mezastar 暗色風格 */
        :root {
            --bg-dark: #0a0e17;
            --mezastar-blue: #1e3a8a;
            --mezastar-gold: #fbbf24;
            --glow-color: rgba(59, 130, 246, 0.5);
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            overflow: hidden; /* 防止 PWA 滾動 */
            height: 100vh;
        }

        /* 歡迎畫面：寶可夢爆炸背景 */
        #page-welcome {
            background: radial-gradient(circle, #2c3e50 0%, #000 100%);
            overflow: hidden;
        }

        .burst-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            opacity: 0.4;
            filter: blur(1px);
            animation: burst-move 10s infinite alternate;
        }

        @keyframes burst-move {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        .mon-burst-item {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: contain;
            transform-origin: center;
            animation: pop-out 0.5s ease-out forwards;
        }

        /* 高清精靈球 CSS */
        .pokeball-hd {
            width: 60px;
            height: 60px;
            background: linear-gradient(to bottom, #e74c3c 50%, #fff 50%);
            border-radius: 50%;
            border: 3px solid #333;
            position: relative;
            box-shadow: inset -5px -5px 0 rgba(0,0,0,0.1), 0 0 20px var(--glow-color);
        }
        .pokeball-hd::after {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 15px; height: 15px;
            background: white;
            border: 3px solid #333;
            border-radius: 50%;
            z-index: 10;
        }
        .pokeball-hd::before {
            content: "";
            position: absolute;
            top: 50%; width: 100%; height: 3px;
            background: #333;
            transform: translateY(-50%);
        }

        /* 遊戲畫面調整 */
        .page {
            display: none;
            height: 100vh;
            padding-top: env(safe-area-inset-top);
        }
        .page-active { display: flex; flex-direction: column; }

        .mezastar-card {
            background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
            border: 2px solid #30363d;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* 寶可夢放大 2 倍 */
        #enemy-mon-img, #my-mon-img {
            width: 280px !important; /* iPad 比例放大 */
            height: 280px !important;
            object-fit: contain;
            filter: drop-shadow(0 0 20px var(--glow-color));
            transition: transform 0.3s ease;
        }

        /* 按鈕質感 */
        .btn-action {
            background: linear-gradient(180deg, #3b82f6 0%, #1e40af 100%);
            border-bottom: 4px solid #1e3a8a;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .btn-option {
            background: #1f2937;
            border: 2px solid #374151;
            font-size: 2.5rem !important; /* 加大選項文字 */
        }
    </style>
</head>
<body>

    <div id="page-welcome" class="page page-active flex items-center justify-center relative p-10">
        <div id="burst-container" class="burst-bg"></div>
        
        <div class="mezastar-card p-10 rounded-[3rem] z-10 w-full max-w-xl text-center border-t-4 border-blue-500">
            <h1 class="text-5xl font-black mb-4 italic text-blue-400">MATH MEZASTAR</h1>
            <p class="text-xl font-bold text-slate-400 mb-8 uppercase italic tracking-widest">Kanto Master PWA</p>
            
            <input type="text" id="input-name" 
                class="w-full bg-slate-900 border-2 border-slate-700 p-6 rounded-2xl text-center text-2xl font-bold mb-8 text-white outline-none focus:border-blue-500" 
                placeholder="輸入訓練家姓名">
                
            <button onclick="checkAdminAndStart()" class="btn-action w-full py-6 rounded-2xl text-3xl font-black shadow-lg active:scale-95 transition-all">
                冒險開始
            </button>
        </div>
    </div>

    <div id="page-game" class="page bg-slate-950 p-6">
        <div class="flex justify-between items-center mb-8 px-4">
            <button onclick="confirmExit()" class="bg-slate-800 px-8 py-3 rounded-full text-xl font-bold">◀ 離開</button>
            <div class="pokeball-hd"></div>
            <div id="progress-box" class="bg-blue-900/50 border-2 border-blue-400 px-8 py-3 rounded-full text-xl font-black text-blue-300">
                連對: <span id="combo" class="text-yellow-400">0</span> / <span id="total-needed">1</span>
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center mb-10">
            <div id="battle-field" class="relative w-full flex justify-around items-center h-80">
                <div id="my-side" class="hidden">
                    <img id="my-mon-img" src="">
                </div>
                <div id="enemy-side" class="relative">
                    <img id="enemy-mon-img" src="" class="scale-150"> <p id="enemy-name" class="text-xl font-black text-white mt-8 bg-blue-600/80 px-6 py-1 rounded-full text-center italic"></p>
                </div>
            </div>

            <div class="mezastar-card mt-12 w-full max-w-2xl py-8 rounded-[2rem] text-center border-l-8 border-yellow-500">
                <div id="question" class="text-7xl font-black text-white italic tracking-tighter">?</div>
            </div>
        </div>

        <div id="options" class="grid grid-cols-2 gap-6 p-4 max-w-4xl mx-auto w-full mb-10"></div>
    </div>

    <script>
        // ... (保留 POKEDEX_DATA, EVOLUTION_CHAINS 等原始資料庫) ...

        // 動態生成歡迎畫面背景
        function initBurstBg() {
            const container = document.getElementById('burst-container');
            const demoIds = [1, 4, 7, 25, 133, 150, 144, 145, 146, 151, 6, 9, 3, 130, 143, 149, 243, 244, 245, 249, 250, 384, 382, 383, 483, 484, 1007, 1008];
            demoIds.forEach(id => {
                const img = document.createElement('img');
                img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
                img.className = 'mon-burst-item';
                container.appendChild(img);
            });
        }

        // 修改 switchPage 確保深色系切換
        function switchPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            const target = document.getElementById(id);
            target.classList.add('page-active');
            
            // iPad 適配：針對不同頁面調整背景
            if(id === 'page-game') {
                document.body.style.background = "radial-gradient(circle at center, #1a2a6c, #b21f1f, #fdbb2d)";
                document.body.style.backgroundSize = "400% 400%";
                document.body.style.animation = "gradientMove 15s ease infinite";
            } else {
                document.body.style.background = "var(--bg-dark)";
            }
        }

        // ... (其餘 handleWin, generateWild, nextRound 邏輯維持不變) ...

        window.onload = () => {
            initBurstBg();
            loadGame();
        };

        // 加入 PWA Service Worker 註冊代碼 (可視需求放入獨立檔案)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
