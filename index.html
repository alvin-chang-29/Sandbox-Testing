<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢對戰：雙關卡整合 v7.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 戰鬥動效 */
        @keyframes strong-shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-4px, 2px); } 75% { transform: translate(4px, -2px); } }
        .battling { animation: strong-shake 0.15s infinite; }
        
        /* 容器與層級 */
        .battle-center-container { position: relative; width: 100%; max-width: 400px; aspect-ratio: 1/1; }
        #grid, #block-layer { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr); gap: 4px; width: 100%; height: 100%; }
        #block-layer { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 20; }
        
        .block-unit { width: 85%; height: 85%; margin: auto; border-radius: 4px; transform: scale(0); transition: 0.3s; }
        .block-show { transform: scale(1); }

        /* 精靈球按鈕震動 */
        .pokeball-btn:active { animation: strong-shake 0.1s infinite; transform: scale(0.9); }
        
        /* 消失/顯現動畫 */
        .fade-out { opacity: 0; transform: translateX(-50px); pointer-events: none; transition: 0.5s; }
        .fade-in { opacity: 1; transform: translateX(0); transition: 0.5s; }
        
        .flash-red-target { z-index: 100 !important; background: #ef4444 !important; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center p-4 overflow-hidden">

    <div class="mb-6 bg-black/50 px-8 py-2 rounded-full border border-slate-700 text-xl font-bold">
        STEP: <span id="step-label" class="text-yellow-400">1. 方塊陣型</span>
    </div>

    <div class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-3 gap-8 items-center">
        <div id="enemy-side" class="flex flex-col items-center battling">
            <div class="w-48 h-48 md:w-64 md:h-64 bg-contain bg-no-repeat bg-center" style="background-image: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png');"></div>
            <div class="w-full bg-gray-800 h-4 rounded-full mt-4 border border-white">
                <div id="hp" class="bg-green-500 h-full w-full transition-all duration-500"></div>
            </div>
        </div>

        <div class="flex flex-col items-center overflow-hidden">
            <div class="text-5xl font-black mb-8">3 × 2 = <span id="q-res" class="text-red-500">?</span></div>

            <div id="panel-1" class="battle-center-container fade-in">
                <div id="grid" class="bg-slate-900/50 p-2 rounded-xl"></div>
                <div id="block-layer" class="p-2"></div>
            </div>

            <div id="panel-2" class="hidden opacity-0 flex flex-col items-center w-full max-w-[320px]">
                <div id="input-box" class="text-6xl font-mono bg-black w-full text-center py-6 rounded-2xl border-4 border-slate-700 text-green-400 mb-6">?</div>
                <div id="keypad" class="grid grid-cols-3 gap-3 w-full">
                    </div>
            </div>
        </div>

        <div class="flex flex-col items-center battling">
            <div class="w-48 h-48 md:w-64 md:h-64 bg-contain bg-no-repeat bg-center" style="background-image: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png'); transform: scaleX(-1);"></div>
            <p class="mt-4 text-blue-400 font-bold">皮卡丘</p>
        </div>
    </div>

    <script>
        const valA = 3, valB = 2, ans = 6;
        let step = 0, currentInput = "";

        function init() {
            const grid = document.getElementById('grid');
            for (let r = 0; r <= 9; r++) {
                for (let c = 0; c <= 9; c++) {
                    const d = document.createElement('div');
                    d.className = "flex items-center justify-center font-bold text-sm border border-slate-800 rounded cursor-pointer";
                    if (r === 0 && c === 0) d.innerText = "×";
                    else if (c === 0 && r > 0) { 
                        d.innerText = r; d.className += " text-yellow-400"; 
                        if(r===valA) d.classList.add('bg-yellow-900/50','border-yellow-400');
                        d.onclick = () => { if(step===0 && r===valA) startBlocks(); };
                    } else if (r === 0 && c > 0) {
                        d.innerText = c; d.className += " text-green-400 opacity-20";
                        d.id = `col-${c}`;
                        d.onclick = () => { if(step===1 && c===valB) fillBlocks(); };
                    } else {
                        d.id = `target-${r}-${c}`;
                        d.innerText = r*c; d.className += " text-transparent";
                        d.onclick = () => { if(step===2 && r===valA && c===valB) switchToStep2(); };
                    }
                    grid.appendChild(d);
                }
            }
        }

        function startBlocks() {
            step = 1;
            document.getElementById(`col-${valB}`).classList.replace('opacity-20', 'bg-green-900/50');
            for(let i=1; i<=valA; i++) createBlock(i, 1, 'bg-yellow-400');
        }

        function fillBlocks() {
            step = 2;
            for(let j=2; j<=valB; j++) for(let i=1; i<=valA; i++) createBlock(i, j, 'bg-green-500');
            document.getElementById(`target-${valA}-${valB}`).classList.add('flash-red-target', '!text-white');
        }

        function createBlock(r, c, cls) {
            const wrap = document.createElement('div');
            wrap.style.gridRow = r + 1; wrap.style.gridColumn = c + 1;
            const b = document.createElement('div');
            b.className = `block-unit ${cls}`;
            wrap.appendChild(b);
            document.getElementById('block-layer').appendChild(wrap);
            setTimeout(() => b.classList.add('block-show'), 50);
        }

        function switchToStep2() {
            const p1 = document.getElementById('panel-1');
            const p2 = document.getElementById('panel-2');
            p1.classList.add('fade-out');
            setTimeout(() => {
                p1.classList.add('hidden');
                p2.classList.remove('hidden');
                setTimeout(() => p2.classList.add('fade-in', 'opacity-100'), 50);
                document.getElementById('step-label').innerText = "2. 計算捕獲";
                document.getElementById('step-label').className = "text-red-500";
                initKeypad();
            }, 500);
        }

        function initKeypad() {
            const pad = document.getElementById('keypad');
            [1,2,3,4,5,6,7,8,9,'C',0,'OK'].forEach(k => {
                const b = document.createElement('button');
                if(k === 'OK') {
                    b.className = "pokeball-btn bg-white rounded-full flex items-center justify-center p-2 border-4 border-red-600";
                    b.innerHTML = `<div class="w-8 h-8 bg-red-600 rounded-full border-2 border-black flex items-center justify-center"><div class="w-2 h-2 bg-white rounded-full"></div></div>`;
                } else {
                    b.className = "bg-slate-700 p-4 rounded-xl text-2xl font-bold active:bg-blue-500";
                    b.innerText = k;
                }
                b.onclick = () => handleInput(k);
                pad.appendChild(b);
            });
        }

        function handleInput(k) {
            if(k === 'C') currentInput = "";
            else if(k === 'OK') {
                if(parseInt(currentInput) === ans) finishBattle();
                else { currentInput = ""; alert("哎呀！寶可夢掙脫了，再算一次！"); }
            } else if(currentInput.length < 2) currentInput += k;
            document.getElementById('input-box').innerText = currentInput || "?";
        }

        function finishBattle() {
            document.getElementById('q-res').innerText = ans;
            document.getElementById('hp').style.width = "0%";
            document.getElementById('enemy-side').classList.remove('battling');
            document.getElementById('panel-2').innerHTML = "<h2 class='text-4xl font-bold text-yellow-400 mt-10'>成功收服！</h2>";
        }

        init();
    </script>
</body>
</html>
