<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mezastar Math: Adventure v17.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Noto+Sans+TC:wght@900&display=swap');
        
        body { 
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif; 
            background: #020617; 
            color: white; 
            overflow: hidden; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 遊戲開始：爆炸與衝出螢幕效果 */
        .burst-container { perspective: 1000px; }
        .poke-burst {
            position: absolute;
            animation: burst-out 1.5s cubic-bezier(0.15, 0.85, 0.35, 1.2) forwards;
            opacity: 0;
        }
        @keyframes burst-out {
            0% { transform: translateZ(-500px) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateZ(500px) scale(3); opacity: 0; }
        }

        /* 戰鬥：屬性光芒渲染 */
        .aura-fire { filter: drop-shadow(0 0 35px #ef4444); }
        .aura-water { filter: drop-shadow(0 0 35px #3b82f6); }
        .aura-electric { filter: drop-shadow(0 0 35px #facc15); }
        .aura-grass { filter: drop-shadow(0 0 35px #22c55e); }

        /* 震動與 UI */
        .battling { animation: strong-shake 0.12s infinite; }
        @keyframes strong-shake { 0% { transform: translate(-2px, 2px); } 50% { transform: translate(2px, -2px); } 100% { transform: translate(-2px, 2px); } }

        .block-unit {
            width: 88%; height: 88%; margin: auto; border-radius: 6px;
            background: radial-gradient(circle at 30% 30%, #fbbf24, #d97706);
            transform: scale(0); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .block-show { transform: scale(1); }

        .guide-flash { animation: guide-pulse 0.6s infinite alternate; border: 3px solid #facc15 !important; }
        @keyframes guide-pulse { from { filter: brightness(1); } to { filter: brightness(1.8); box-shadow: 0 0 20px #facc15; } }

        .scene { position: absolute; inset: 0; width: 100%; height: 100%; transition: opacity 0.5s; }
        .hidden { display: none !important; }

        .hp-bg { background: #450a0a; border: 2px solid white; }
        .hp-fill { background: #ef4444; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>

    <div id="scene-start" class="scene flex flex-col items-center justify-center bg-black z-[1000]">
        <div class="burst-container relative w-64 h-64 flex items-center justify-center">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" class="poke-burst" style="animation-delay: 0.1s;">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png" class="poke-burst" style="animation-delay: 0.3s;">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/9.png" class="poke-burst" style="animation-delay: 0.5s;">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/3.png" class="poke-burst" style="animation-delay: 0.7s;">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png" class="poke-burst" style="animation-delay: 0.9s;">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/133.png" class="poke-burst" style="animation-delay: 1.1s;">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/94.png" class="poke-burst" style="animation-delay: 1.3s;">
        </div>
        <h1 class="text-5xl font-black italic text-blue-500 mb-10 z-10">MEZASTAR MATH</h1>
        <button onclick="changeScene('main')" class="bg-red-600 px-16 py-6 rounded-full text-2xl font-black border-4 border-white shadow-2xl z-10 active:scale-95 transition">一起抓夢吧！</button>
    </div>

    <div id="scene-main" class="scene hidden flex flex-col p-4">
        <div class="text-center py-4 bg-slate-900/80 rounded-2xl mb-4 border-b-4 border-blue-900">
            <div class="text-5xl font-black italic">
                <span id="q-a">?</span> × <span id="q-b">?</span> = <span id="q-ans" class="text-slate-800 px-4">?</span>
            </div>
        </div>

        <div class="flex-grow grid grid-cols-1 lg:grid-cols-3 gap-4 items-center">
            <div class="flex flex-col items-center">
                <div id="enemy-sprite" class="w-44 h-44 bg-contain bg-no-repeat bg-center transition-all"></div>
                <div class="mt-2 text-center">
                    <p id="e-name-zh" class="text-xl font-black">---</p>
                    <p id="e-name-other" class="text-[10px] text-slate-500 uppercase">--- / ---</p>
                    <div class="hp-bg w-48 h-4 rounded-full mt-2 overflow-hidden">
                        <div id="e-hp" class="hp-fill h-full w-full"></div>
                    </div>
                    <button onclick="resetBattle()" class="mt-4 text-xs bg-slate-800 px-4 py-1 rounded-full border border-slate-600">挑戰其他寶可夢</button>
                </div>
            </div>

            <div class="flex flex-col items-center">
                <div class="bg-slate-900 border-4 border-blue-500 w-full aspect-square max-w-[360px] p-2 relative rounded-3xl">
                    <div id="grid" class="grid grid-cols-10 grid-rows-10 gap-1 h-full w-full"></div>
                    <div id="block-layer" class="absolute inset-0 p-2 grid grid-cols-10 grid-rows-10 gap-1 pointer-events-none"></div>
                </div>
                <button id="btn-go" onclick="startBattle()" class="bg-blue-600 mt-6 px-10 py-4 rounded-2xl font-black italic text-xl border-b-4 border-blue-900">
                    上吧！<span class="p-name-display">皮卡丘</span>
                </button>
            </div>

            <div class="flex flex-col items-center">
                <div id="player-sprite" class="w-44 h-44 bg-contain bg-no-repeat bg-center" style="transform: scaleX(-1);"></div>
                <div class="mt-2 text-center">
                    <p class="p-name-display text-xl font-black text-blue-400">皮卡丘</p>
                    <p id="p-name-other" class="text-[10px] text-slate-500 uppercase">Pikachu / ピカチュウ</p>
                    <button onclick="openBag()" class="mt-4 bg-slate-800 px-6 py-2 rounded-xl border border-slate-600 flex items-center gap-2 mx-auto">
                        <span>🎒</span> <span class="font-bold text-sm">背包寶可夢</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="scene-capture" class="scene hidden flex flex-col items-center justify-center bg-black/95 z-[2000]">
        <div id="cap-sprite" class="w-64 h-64 bg-contain bg-no-repeat bg-center mb-8 animate-bounce"></div>
        <div class="bg-slate-900 p-8 rounded-3xl border-2 border-yellow-500 text-center">
            <h2 id="cap-name-zh" class="text-4xl font-black text-yellow-400 italic">---</h2>
            <p id="cap-name-other" class="text-slate-400 text-sm font-bold uppercase">--- / ---</p>
            <p class="text-white text-2xl font-black mt-4">成功收服了！</p>
        </div>
        <button onclick="changeScene('main')" class="mt-10 bg-red-600 px-12 py-4 rounded-xl font-black text-white">下一個挑戰</button>
    </div>

    <div id="scene-bag" class="scene hidden bg-slate-950 p-6 z-[3000] overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-black italic text-blue-400">背包 BAG</h2>
            <button onclick="closeBag()" class="bg-slate-800 w-10 h-10 rounded-full">✕</button>
        </div>
        <div id="bag-grid" class="grid grid-cols-3 sm:grid-cols-5 gap-4"></div>
    </div>

    <script>
        const db = new Dexie("MezastarAdventureDB_v2");
        db.version(1).stores({ bag: 'id, name, en, jp' });

        const AUDIO = {
            start: new Audio(), main: new Audio(), battle: new Audio(), capture: new Audio()
        };

        let valA, valB, ans, playerPoke = { id: 25, name: "皮卡丘", en: "Pikachu", jp: "ピカチュウ" };
        let enemyPoke = {};

        // 30隻常見寶可夢清單 (旅途/地平線)
        const COMMON_30 = [
            {id: 25, name: "皮卡丘", en: "Pikachu", jp: "ピカチュウ"},
            {id: 1003, name: "噴火龍", en: "Charizard", jp: "リザードン"},
            {id: 906, name: "新葉喵", en: "Sprigatito", jp: "ニャオハ"},
            {id: 909, name: "呆火鱷", en: "Fuecoco", jp: "ホゲータ"},
            {id: 912, name: "潤水鴨", en: "Quaxly", jp: "クワッス"},
            {id: 810, name: "敲音猴", en: "Grookey", jp: "サルノリ"},
            {id: 813, name: "騰蹴小將", en: "Raboot", jp: "ラビフット"},
            {id: 816, name: "淚眼蜥", en: "Sobble", jp: "メッソン"},
            {id: 448, name: "路卡利歐", en: "Lucario", jp: "ルカリオ"},
            {id: 133, name: "伊布", en: "Eevee", jp: "イーブイ"},
            {id: 658, name: "甲賀忍蛙", en: "Greninja", jp: "ゲッコウガ"},
            {id: 150, name: "超夢", en: "Mewtwo", jp: "ミュウツー"},
            // ...以此類推擴充至30隻
        ];

        async function init() {
            if (await db.bag.count() === 0) await db.bag.bulkAdd(COMMON_30);
            buildGrid();
            resetBattle();
        }

        function changeScene(s) {
            document.querySelectorAll('.scene').forEach(sc => sc.classList.add('hidden'));
            document.getElementById(`scene-${s}`).classList.remove('hidden');
            // 音樂切換邏輯預留
            if(s === 'main') { resetBattle(); }
        }

        function resetBattle() {
            valA = Math.floor(Math.random() * 8) + 2;
            valB = Math.floor(Math.random() * 8) + 2;
            ans = valA * valB;
            
            // 隨機敵方
            const randIdx = Math.floor(Math.random() * 898) + 1;
            enemyPoke = { id: randIdx, name: "對手", en: "Unknown", jp: "アンノウン" };
            
            document.getElementById('q-a').innerText = valA;
            document.getElementById('q-b').innerText = valB;
            document.getElementById('q-ans').innerText = "?";
            document.getElementById('q-ans').onclick = null;
            document.getElementById('enemy-sprite').style.backgroundImage = `url(https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${randIdx}.png)`;
            document.getElementById('e-hp').style.width = "100%";
            document.getElementById('enemy-sprite').classList.remove('battling', 'aura-fire');
            document.getElementById('player-sprite').classList.remove('battling', 'aura-electric');
            document.getElementById('btn-go').classList.remove('hidden');
            
            // 我方顯示
            document.getElementById('player-sprite').style.backgroundImage = `url(https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${playerPoke.id}.png)`;
            document.querySelectorAll('.p-name-display').forEach(el => el.innerText = playerPoke.name);
            document.getElementById('p-name-other').innerText = `${playerPoke.en} / ${playerPoke.jp}`;

            document.getElementById('block-layer').innerHTML = "";
            document.querySelectorAll('.guide-flash').forEach(el => el.classList.remove('guide-flash'));
        }

        function startBattle() {
            document.getElementById('btn-go').classList.add('hidden');
            document.getElementById('enemy-sprite').classList.add('battling', 'aura-fire');
            document.getElementById('player-sprite').classList.add('battling', 'aura-electric');
            
            document.getElementById('q-a').classList.add('guide-flash');
            document.getElementById(`row-${valA}`).classList.add('guide-flash');
        }

        function buildGrid() {
            const grid = document.getElementById('grid');
            for (let r = 0; r <= 9; r++) {
                for (let c = 0; c <= 9; c++) {
                    const d = document.createElement('div');
                    d.className = "flex items-center justify-center text-[10px] border border-slate-800";
                    if (c === 0 && r > 0) { d.innerText = r; d.id = `row-${r}`; d.onclick = () => handleRow(r); }
                    else if (r === 0 && c > 0) { d.innerText = c; d.id = `col-${c}`; d.onclick = () => handleCol(c); }
                    grid.appendChild(d);
                }
            }
        }

        function handleRow(r) {
            if(r === valA) {
                document.getElementById(`row-${valA}`).classList.remove('guide-flash');
                for(let i=1; i<=valA; i++) createBlock(i, 1);
                document.getElementById(`col-${valB}`).classList.add('guide-flash');
            }
        }

        function handleCol(c) {
            if(c === valB) {
                document.getElementById(`col-${valB}`).classList.remove('guide-flash');
                for(let j=2; j<=valB; j++) setTimeout(() => { for(let i=1; i<=valA; i++) createBlock(i, j); }, (j-1)*150);
                setTimeout(() => {
                    document.getElementById('q-ans').innerText = ans;
                    document.getElementById('q-ans').classList.add('guide-flash');
                    document.getElementById('q-ans').onclick = finalize;
                }, valB * 150);
            }
        }

        function finalize() {
            document.getElementById('q-ans').classList.remove('guide-flash');
            document.getElementById('e-hp').style.width = "0%";
            setTimeout(() => {
                changeScene('capture');
                document.getElementById('cap-sprite').style.backgroundImage = document.getElementById('enemy-sprite').style.backgroundImage;
            }, 1000);
        }

        function createBlock(r, c) {
            const wrap = document.createElement('div');
            wrap.style.gridRow = r + 1; wrap.style.gridColumn = c + 1;
            const b = document.createElement('div'); b.className = "block-unit";
            wrap.appendChild(b); document.getElementById('block-layer').appendChild(wrap);
            setTimeout(() => b.classList.add('block-show'), 50);
        }

        async function openBag() {
            document.getElementById('scene-bag').classList.remove('hidden');
            const items = await db.bag.toArray();
            const list = document.getElementById('bag-grid');
            list.innerHTML = items.map(i => `
                <div onclick="selectPoke(${i.id},'${i.name}','${i.en}','${i.jp}')" class="bg-slate-800 p-4 rounded-xl text-center active:scale-90 transition cursor-pointer">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${i.id}.png" class="w-16 h-16 mx-auto">
                    <p class="text-[10px] mt-2">${i.name}</p>
                </div>
            `).join('');
        }

        function selectPoke(id, n, e, j) {
            playerPoke = {id, name: n, en: e, jp: j};
            closeBag();
            resetBattle();
        }

        function closeBag() { document.getElementById('scene-bag').classList.add('hidden'); }

        init();
    </script>
</body>
</html>
