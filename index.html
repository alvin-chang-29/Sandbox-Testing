<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>博士的珠算講座 v8.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #0c1222; color: white; margin: 0; overflow: hidden; }
        
        /* 左右佈局容器 */
        .main-container { display: grid; grid-template-cols: 1fr 1fr; height: 100vh; width: 100vw; }

        /* 左側：博士教學區 */
        .instructor-side { 
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 2rem; border-right: 4px solid #fbbf24; position: relative;
        }
        .instructor-img { width: 100%; max-width: 400px; filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.5)); }
        
        /* RPG 對話框樣式 */
        .dialog-box {
            background: rgba(255, 255, 255, 0.95); color: #1e293b;
            border: 4px solid #3b82f6; border-radius: 1.5rem;
            padding: 1.5rem; width: 90%; margin-top: -50px; z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative;
        }

        /* 右側：算盤區 */
        .abacus-side { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #020617; }

        /* 算盤核心 */
        .abacus-frame { 
            background: #451a03; border: 10px solid #78350f; border-radius: 2.5rem; 
            width: 340px; height: 450px; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .abacus-bar { position: absolute; top: 120px; width: 100%; height: 16px; background: #270e02; z-index: 10; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        .rod { position: absolute; width: 8px; height: 100%; background: #1e293b; left: 50%; transform: translateX(-50%); }

        /* 珠子樣式 */
        .bead { 
            width: 70px; height: 38px; border-radius: 50% / 100%; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative; z-index: 20; border: 1px solid rgba(0,0,0,0.3);
        }
        .bead-top { background: linear-gradient(to bottom, #fb923c, #ea580c); box-shadow: 0 4px #9a3412; }
        .bead-bottom { background: linear-gradient(to bottom, #fde047, #ca8a04); box-shadow: 0 4px #854d0e; }
        .bead-active { filter: brightness(1.2) saturate(1.1); }

        /* 閃爍提示特效 */
        @keyframes bead-glow {
            0%, 100% { box-shadow: 0 0 0px #fff; outline: 0px solid #fff; }
            50% { box-shadow: 0 0 25px #fbbf24, inset 0 0 10px #fff; outline: 4px solid #fff; transform: scale(1.05); }
        }
        .hint-bead { animation: bead-glow 1s infinite; z-index: 100 !important; }

        @media (max-width: 768px) {
            .main-container { grid-template-columns: 1fr; }
            .instructor-side { height: 40vh; }
            .abacus-side { height: 60vh; }
            .dialog-box { margin-top: 0; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="instructor-side">
            <img id="prof-img" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/10186.png" class="instructor-img">
            <div class="dialog-box">
                <p id="dialog-text" class="text-lg font-black italic">歡迎來到珠算講座！</p>
                <div class="flex justify-end mt-4">
                    <button onclick="AbacusTutorial.next()" class="bg-blue-600 text-white px-6 py-2 rounded-full font-black text-sm shadow-lg active:scale-95 transition-all">點擊繼續 ❯</button>
                </div>
            </div>
        </div>

        <div class="abacus-side">
            <div class="abacus-frame flex justify-around px-4">
                <div class="abacus-bar"></div>
                
                <div class="relative w-20 h-full flex flex-col pt-6">
                    <div class="rod"></div>
                    <div id="tens-top" class="bead bead-top mx-auto"></div>
                    <div class="mt-[140px] flex flex-col gap-1.5">
                        <div id="tens-b1" class="bead bead-bottom mx-auto"></div>
                        <div id="tens-b2" class="bead bead-bottom mx-auto"></div>
                        <div id="tens-b3" class="bead bead-bottom mx-auto"></div>
                        <div id="tens-b4" class="bead bead-bottom mx-auto"></div>
                    </div>
                </div>

                <div class="relative w-20 h-full flex flex-col pt-6">
                    <div class="rod"></div>
                    <div id="ones-top" class="bead bead-top mx-auto"></div>
                    <div class="mt-[140px] flex flex-col gap-1.5">
                        <div id="ones-b1" class="bead bead-bottom mx-auto"></div>
                        <div id="ones-b2" class="bead bead-bottom mx-auto"></div>
                        <div id="ones-b3" class="bead bead-bottom mx-auto"></div>
                        <div id="ones-b4" class="bead bead-bottom mx-auto"></div>
                    </div>
                </div>
            </div>

            <div class="mt-8 flex gap-12 text-center">
                <div><span class="text-slate-500 font-bold block mb-1 uppercase text-xs">Tens</span><div id="v-tens" class="text-4xl font-black">0</div></div>
                <div><span class="text-yellow-500 font-bold block mb-1 uppercase text-xs">Ones</span><div id="v-ones" class="text-4xl font-black text-yellow-400">0</div></div>
            </div>
        </div>
    </div>

    <script>
        const AbacusTutorial = {
            step: 0,
            state: { tens: {t:0, b:0}, ones: {t:0, b:0} },
            scripts: [
                { text: "你好！我是博士。這就是傳統的算盤，透過左右撥動來計算數字喔！", action: () => { this.reset(); } },
                { text: "我們先練習『7 + 8』。第一步，在個位撥出 7：一顆上珠、兩顆下珠。", action: () => { 
                    this.setHint('ones-top', 'ones-b2');
                    this.move('ones', 'top', 5); this.move('ones', 'bottom', 2); 
                } },
                { text: "現在個位是 7 了。要加 8，但個位珠子不夠。記得口訣嗎？『加 8 等於進 10 減 2』！", action: () => { this.clearHint(); } },
                { text: "我們先在左邊『十位檔』撥上一顆下珠，代表進位 10！", action: () => { 
                    this.setHint('tens-b1');
                    this.move('tens', 'bottom', 1); 
                } },
                { text: "最後，把個位的兩顆下珠『減掉』，也就是撥回下方的位置。", action: () => { 
                    this.setHint('ones-b2');
                    this.move('ones', 'bottom', 0); 
                } },
                { text: "成功了！算盤現在顯示 15。這就是珠算的進位魔法！", action: () => { this.clearHint(); } }
            ],
            move(col, type, val) {
                this.state[col][type === 'top' ? 't' : 'b'] = val;
                this.updateUI();
            },
            reset() { this.state = { tens: {t:0, b:0}, ones: {t:0, b:0} }; this.updateUI(); this.clearHint(); },
            updateUI() {
                ['tens', 'ones'].forEach(col => {
                    const t = document.getElementById(`${col}-top`);
                    t.style.transform = this.state[col].t === 5 ? "translateY(60px)" : "translateY(0)";
                    for(let i=1; i<=4; i++) {
                        const b = document.getElementById(`${col}-b${i}`);
                        b.style.transform = i <= this.state[col].b ? "translateY(-60px)" : "translateY(0)";
                    }
                });
                document.getElementById('v-tens').innerText = (this.state.tens.t + this.state.tens.b) * 10;
                document.getElementById('v-ones').innerText = this.state.ones.t + this.state.ones.b;
            },
            setHint(...ids) {
                this.clearHint();
                ids.forEach(id => document.getElementById(id).classList.add('hint-bead'));
            },
            clearHint() {
                document.querySelectorAll('.hint-bead').forEach(el => el.classList.remove('hint-bead'));
            },
            next() {
                if (this.step < this.scripts.length - 1) {
                    this.step++;
                    document.getElementById('dialog-text').innerText = this.scripts[this.step].text;
                    this.scripts[this.step].action();
                } else {
                    alert("講座結束！你真有天分！");
                }
            }
        };

        window.onload = () => { AbacusTutorial.updateUI(); document.getElementById('dialog-text').innerText = AbacusTutorial.scripts[0].text; };
    </script>
</body>
</html>
