<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokémon Cry System - v13.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .poke-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .poke-card:active { transform: scale(0.9) rotate(-5deg); }
        .cry-wave {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border: 4px solid #fbbf24; border-radius: 50%;
            animation: ripple 0.6s ease-out forwards;
            opacity: 0; pointer-events: none;
        }
        @keyframes ripple {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div id="overlay" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center">
        <button id="btn-unlock" class="bg-blue-600 px-16 py-8 rounded-full font-black text-2xl shadow-2xl">
            LOAD POKE-CRIES
        </button>
    </div>

    <div class="text-center w-full max-w-lg">
        <h2 class="text-blue-400 font-black italic tracking-widest mb-10 text-xl">點擊寶可夢聽聽看叫聲！</h2>

        <div class="grid grid-cols-2 gap-8">
            <div onclick="playCry(25)" class="poke-card relative bg-slate-800 p-6 rounded-3xl border-2 border-yellow-500/30">
                <div id="ripple-25"></div>
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" class="w-32 h-32 mx-auto drop-shadow-xl">
                <p class="mt-4 font-black text-yellow-500">PIKACHU</p>
            </div>

            <div onclick="playCry(6)" class="poke-card relative bg-slate-800 p-6 rounded-3xl border-2 border-red-500/30">
                <div id="ripple-6"></div>
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png" class="w-32 h-32 mx-auto drop-shadow-xl">
                <p class="mt-4 font-black text-red-500">CHARIZARD</p>
            </div>
        </div>

        <div class="mt-16 p-4 bg-slate-900 rounded-2xl border border-slate-700">
            <p class="text-xs text-slate-500 leading-relaxed">
                提示：皮卡丘會發出可愛的人聲，<br>噴火龍則是經典的 8-bit 電子咆哮音。
            </p>
        </div>
    </div>

    <script>
        // 音效管理器
        const cries = {
            // 皮卡丘 (使用人聲採樣)
            25: new Audio('https://www.myinstants.com/media/sounds/pikachu_hi.mp3'),
            // 噴火龍 (使用官方原始叫聲音效)
            6: new Audio('https://play.pokemonshowdown.com/audio/cries/charizard.mp3')
        };

        const sfxPop = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');

        document.getElementById('btn-unlock').onclick = () => {
            // 預解鎖所有叫聲
            Object.values(cries).forEach(c => {
                c.play().then(() => { c.pause(); c.currentTime = 0; });
            });
            document.getElementById('overlay').style.display = 'none';
        };

        function playCry(id) {
            // 1. 播放叫聲
            const cry = cries[id];
            if(cry) {
                cry.currentTime = 0;
                cry.volume = 0.8;
                cry.play();
            }

            // 2. 播放基礎點擊音
            sfxPop.currentTime = 0;
            sfxPop.volume = 0.2;
            sfxPop.play();

            // 3. 視覺波紋特效
            const rippleContainer = document.getElementById(`ripple-${id}`);
            const ripple = document.createElement('div');
            ripple.className = 'cry-wave';
            rippleContainer.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }
    </script>
</body>
</html>
