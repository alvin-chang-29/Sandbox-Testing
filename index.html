<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mezastar Math Pro - v14.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { font-family: 'Orbitron', sans-serif; background: #020617; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .mezastar-border { border: 2px solid #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .hp-bar { transition: width 0.5s ease-out; background: linear-gradient(90deg, #10b981, #3b82f6); }
        
        /* 方塊動態 */
        .block-unit {
            width: 40px; height: 40px; margin: 3px; border-radius: 8px;
            background: linear-gradient(135deg, #fbbf24, #d97706);
            box-shadow: 0 4px 0 #78350f;
            transform: scale(0); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .block-show { transform: scale(1); }
        
        /* 進化全螢幕光芒 */
        #evo-overlay {
            position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 200;
        }
        .evo-flash { animation: flash-white 3s ease-in-out forwards; }
        @keyframes flash-white {
            0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; }
        }

        /* 隱藏的 Alert 替代品 */
        #custom-modal { display: none; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div id="overlay" class="fixed inset-0 bg-black z-[300] flex flex-col items-center justify-center">
        <h1 class="text-4xl font-black italic text-blue-500 mb-8">MEZASTAR MATH</h1>
        <button id="start-btn" class="bg-blue-600 px-16 py-8 rounded-full font-black text-2xl shadow-2xl active:scale-95 transition">
            GET READY!
        </button>
    </div>

    <div id="evo-overlay"></div>

    <div id="custom-modal" class="fixed inset-0 z-[400] flex items-center justify-center bg-black/80 p-6">
        <div class="bg-slate-800 border-2 border-blue-500 p-8 rounded-3xl text-center max-w-xs w-full">
            <h3 id="modal-title" class="text-2xl font-black text-yellow-400 mb-4">EVOLVED!</h3>
            <p id="modal-body" class="text-slate-300 text-sm mb-8">Your Pokemon has reached a new form.</p>
            <button onclick="location.reload()" class="bg-blue-600 w-full py-4 rounded-xl font-bold">NEXT BATTLE</button>
        </div>
    </div>

    <div class="w-full max-w-md">
        <div class="mezastar-border bg-slate-900/90 p-6 rounded-[2.5rem] relative overflow-hidden">
            <div id="quest-text" class="absolute inset-0 flex items-center justify-center text-5xl font-black italic text-yellow-400 pointer-events-none z-50"></div>

            <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 class="text-xl font-black italic text-blue-300">CHARIZARD</h2>
                    <div class="w-48 bg-slate-800 h-3 rounded-full mt-2 border border-slate-700">
                        <div id="hp-indicator" class="hp-bar h-full w-full"></div>
                    </div>
                </div>
                <div class="text-right text-[10px] text-slate-500">SCORE: <span id="score-val">0</span></div>
            </div>

            <div id="stage" class="min-h-[180px] bg-black/20 rounded-3xl p-4 flex flex-wrap justify-center content-start mb-6"></div>

            <div class="grid grid-cols-2 gap-3">
                <div class="col-span-2 bg-slate-800 p-4 rounded-2xl flex justify-between items-center border border-slate-700">
                    <span id="formula" class="text-3xl font-black">? × ? =</span>
                    <input id="ans-input" type="number" pattern="\d*" class="bg-black border-2 border-blue-500 w-28 p-3 text-center text-3xl rounded-xl focus:outline-none">
                </div>
                <button onclick="checkAnswer()" class="bg-gradient-to-b from-blue-500 to-blue-700 py-6 rounded-2xl font-black italic text-xl shadow-lg active:translate-y-1">ATTACK!</button>
                <button onclick="nextQuestion()" class="bg-slate-700/50 py-6 rounded-2xl font-bold text-sm text-slate-400">SKIP</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = { targetScore: 3 }; // 測試用，3分進化
        
        // 預置音效物件
        const sfx = {
            bgm: new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3'),
            pop: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            hit: new Audio('https://assets.mixkit.co/active_storage/sfx/2577/2577-preview.mp3'),
            evo: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3')
        };

        let currentAns = 0, score = 0;

        // 啟動與解鎖
        document.getElementById('start-btn').onclick = function() {
            // 同步激活所有音軌
            Object.values(sfx).forEach(track => {
                track.play().then(() => { track.pause(); track.currentTime = 0; });
            });
            
            sfx.bgm.loop = true;
            sfx.bgm.volume = 0.15;
            sfx.bgm.play(); // 播放背景音樂

            document.getElementById('overlay').style.display = 'none';
            nextQuestion();
        };

        function nextQuestion() {
            const stage = document.getElementById('stage');
            stage.innerHTML = "";
            const a = Math.floor(Math.random() * 8) + 2;
            const b = Math.floor(Math.random() * 8) + 2;
            currentAns = a * b;
            document.getElementById('formula').innerText = `${a} × ${b} =`;
            document.getElementById('ans-input').value = "";
            document.getElementById('ans-input').focus();
            
            // 動態生成方塊
            for(let i=0; i < currentAns; i++) {
                setTimeout(() => {
                    const block = document.createElement('div');
                    block.className = 'block-unit';
                    stage.appendChild(block);
                    sfx.pop.cloneNode().play(); // 播放啵啵聲
                    requestAnimationFrame(() => block.classList.add('block-show'));
                }, i * 20);
            }
        }

        function checkAnswer() {
            const val = parseInt(document.getElementById('ans-input').value);
            if(val === currentAns) {
                score++;
                document.getElementById('score-val').innerText = score;
                sfx.hit.currentTime = 0; sfx.hit.play(); // 播放打擊聲

                if(score >= CONFIG.targetScore) {
                    performEvolution();
                } else {
                    showText("EXCELLENT!");
                    setTimeout(nextQuestion, 1000);
                }
            } else {
                showText("MISS!", "text-red-500");
            }
        }

        function showText(txt, color="text-yellow-400") {
            const el = document.getElementById('quest-text');
            el.innerText = txt;
            el.className = `absolute inset-0 flex items-center justify-center text-5xl font-black italic ${color} animate-bounce z-50`;
            setTimeout(() => { el.innerText = ""; }, 800);
        }

        // 進化儀式：核心修復點
        function performEvolution() {
            sfx.bgm.pause(); // 停止背景音樂
            sfx.evo.play();  // 播放上升音
            
            // 觸發白光閃爍動畫
            const evoOverlay = document.getElementById('evo-overlay');
            evoOverlay.classList.add('evo-flash');
            
            showText("EVOLVING...", "text-white");

            // 3秒後顯示自定義彈窗，取代原生 Alert
            setTimeout(() => {
                sfx.hit.play();
                document.getElementById('custom-modal').style.display = 'flex';
                // 這裡存檔到 Dexie
                const db = new Dexie("MezastarMathDB");
                db.version(1).stores({ progress: '++id, date, score' });
                db.progress.add({ date: new Date().toLocaleString(), score: score });
            }, 3000);
        }
    </script>
</body>
</html>
