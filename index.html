<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evolution Ceremony - v13.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        
        .evo-font { font-family: 'Orbitron', sans-serif; }
        
        /* 進化光芒動畫 */
        .evo-glow {
            animation: pulse-white 0.5s infinite alternate;
        }
        @keyframes pulse-white {
            from { filter: brightness(1) drop-shadow(0 0 10px white); }
            to { filter: brightness(2.5) drop-shadow(0 0 40px white); }
        }

        /* 背景震動 */
        .shake { animation: shake-screen 0.1s infinite; }
        @keyframes shake-screen {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(1px, 1px); }
        }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center justify-center p-6 overflow-hidden">

    <div id="overlay" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center">
        <button id="btn-init" class="bg-purple-600 px-16 py-8 rounded-full font-black text-2xl shadow-[0_0_30px_#a855f7]">
            READY TO EVOLVE
        </button>
    </div>

    <div class="text-center w-full max-w-sm">
        <div id="stage" class="relative w-64 h-64 mx-auto mb-12 flex items-center justify-center">
            <div id="poke-sprite" class="w-full h-full bg-contain bg-no-repeat bg-center"
                 style="background-image:url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/133.png')">
            </div>
            <div id="energy-ring" class="absolute inset-0 border-4 border-blue-400 rounded-full scale-0 opacity-0 transition-all duration-300"></div>
        </div>

        <h2 id="evo-text" class="evo-font text-2xl font-black italic tracking-widest text-blue-400 mb-8">POKÉMON READY</h2>

        <button id="btn-evolve" onclick="startEvolution()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 py-6 rounded-2xl font-black italic text-2xl shadow-lg active:scale-95 transition">
            TRIGGER EVOLUTION
        </button>
    </div>

    <script>
        // 音效配置
        const sfx = {
            riser: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'), // 能量上升
            explosion: new Audio('https://assets.mixkit.co/active_storage/sfx/2577/2577-preview.mp3'), // 最終進化
            sparkle: new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3'), // 亮粉聲
            bgm: new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3')
        };

        document.getElementById('btn-init').onclick = () => {
            sfx.bgm.loop = true; sfx.bgm.volume = 0.1; sfx.bgm.play();
            document.getElementById('overlay').style.display = 'none';
        };

        function startEvolution() {
            const sprite = document.getElementById('poke-sprite');
            const ring = document.getElementById('energy-ring');
            const text = document.getElementById('evo-text');
            const btn = document.getElementById('btn-evolve');

            btn.disabled = true;
            btn.style.opacity = 0.5;

            // 1. 蓄力階段 (The Build-up)
            sfx.bgm.volume = 0.02; // 背景音樂淡出
            sfx.riser.play();
            sprite.classList.add('evo-glow');
            text.innerText = "EVOLVING...";
            text.className = "evo-font text-2xl font-black italic tracking-widest text-yellow-400 animate-pulse";
            
            // 畫面開始震動
            document.body.classList.add('shake');

            // 2. 轉折與爆炸 (The Climax)
            setTimeout(() => {
                document.body.classList.remove('shake');
                sprite.style.transform = "scale(0)"; // 瞬間收縮
                
                setTimeout(() => {
                    // 進化完成爆炸
                    sfx.explosion.play();
                    sfx.sparkle.play();
                    
                    // 更換圖片 (伊布 -> 太陽伊布)
                    sprite.style.backgroundImage = "url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/196.png')";
                    sprite.style.transform = "scale(1.2)";
                    sprite.classList.remove('evo-glow');
                    
                    // 視覺大放射
                    ring.classList.replace('scale-0', 'scale-150');
                    ring.classList.replace('opacity-0', 'opacity-100');
                    
                    text.innerText = "EVOLVED!";
                    text.className = "evo-font text-4xl font-black italic tracking-tighter text-white";
                    document.body.style.backgroundColor = "#1e1b4b";
                    
                    setTimeout(() => {
                        document.body.style.backgroundColor = "black";
                        ring.classList.add('opacity-0');
                        sfx.bgm.volume = 0.1; // 音樂恢復
                        btn.disabled = false;
                        btn.style.opacity = 1;
                    }, 1000);

                }, 200);
            }, 3000); // 3秒蓄力
        }
    </script>
</body>
</html>
