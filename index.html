<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mezastar Math: Ultimate v43.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Noto+Sans+TC:wght@900&display=swap');
        body { font-family: 'Orbitron', 'Noto Sans TC', sans-serif; background: #020617; color: white; overflow: hidden; user-select: none; }
        
        /* 視覺特效 */
        .burst-stage { perspective: 1200px; position: relative; width: 100vw; height: 50vh; overflow: hidden; }
        .poke-burst-unit { position: absolute; width: 150px; height: 150px; top: 50%; left: 50%; margin: -75px; opacity: 0; animation: burst-fly 3s ease-in infinite; }
        @keyframes burst-fly { 0% { transform: translateZ(-1000px) scale(0); opacity: 0; } 30% { opacity: 1; } 100% { transform: translateZ(1200px) scale(8); opacity: 0; } }
        .matrix-scale { transform: scale(1.5); transform-origin: center; z-index: 10; }
        .poke-large { width: 320px; height: 320px; transition: transform 0.3s ease; }
        .aura-glow { filter: drop-shadow(0 0 45px currentColor); }
        .battling { animation: strong-shake 0.1s infinite; }
        @keyframes strong-shake { 0% { transform: translate(-3px, 3px); } 50% { transform: translate(3px, -3px); } }
        
        #guide-line-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .dash-line { stroke: #facc15; stroke-width: 6; stroke-dasharray: 12, 12; animation: dash-move 0.5s linear infinite; }
        @keyframes dash-move { to { stroke-dashoffset: -24; } }
        .guide-flash { animation: guide-pulse 0.6s infinite alternate; border: 4px solid #facc15 !important; color: #facc15 !important; }
        
        .block-unit { 
            width: 90%; height: 90%; margin: auto; border-radius: 8px; 
            background: radial-gradient(circle at 30% 30%, var(--block-color-light, #fbbf24), var(--block-color-dark, #d97706)); 
            transform: scale(0); transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        .block-show { transform: scale(1); }
        .hp-fill { background: #ef4444; transition: width 0.5s ease-out; }
        .scene { position: absolute; inset: 0; transition: opacity 0.5s; background: #020617; }
        .hidden { display: none !important; }
        .poke-info-box { text-align: center; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 1.5rem; border: 2px solid rgba(255,255,255,0.1); width: 100%; min-height: 140px; }

        /* DJ 按鈕 */
        .dj-btn { cursor: pointer; transition: 0.3s; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.2); opacity: 1; } }
    </style>
</head>
<body>

    <svg id="guide-line-svg" class="hidden"><line id="svg-line" class="dash-line" x1="0" y1="0" x2="0" y2="0"/></svg>

    <div id="scene-start" class="scene flex flex-col items-center justify-center z-[1000]">
        <div class="burst-stage" id="burst-box"></div>
        <div class="z-50 text-center -mt-20">
            <h1 class="text-7xl font-black italic text-blue-500 mb-12 drop-shadow-2xl">MEZASTAR MATH</h1>
            <button onclick="unlockAudioAndStart()" class="bg-red-600 px-24 py-8 rounded-full text-4xl font-black border-4 border-white shadow-[0_0_50px_#ef4444] active:scale-95 transition">一起抓夢吧！</button>
        </div>
    </div>

    <div id="scene-main" class="scene hidden flex flex-col p-4 overflow-hidden">
        <div class="absolute top-6 right-10 z-[200] flex flex-col items-center">
            <div onclick="nextDJTrack()" class="dj-btn text-6xl">🎧</div>
            <p id="track-info" class="text-[10px] text-blue-400 font-bold mt-2 bg-black/50 px-3 py-1 rounded-full uppercase">Music: 1 (冒險)</p>
        </div>

        <div class="h-[18vh] flex items-center justify-center">
            <div id="formula-box" class="inline-flex items-center border-[8px] border-yellow-400 p-6 bg-black/60 rounded-[2.5rem] text-[90px] font-black italic shadow-xl">
                <span id="q-a">?</span> <span class="mx-6 text-blue-500">×</span> <span id="q-b">?</span> 
                <span class="mx-6 text-blue-500">=</span> <span id="q-ans" class="text-slate-800 transition-all">?</span>
            </div>
        </div>

        <div class="flex-grow flex items-center justify-between px-10 relative">
            <div id="enemy-box" class="flex flex-col items-center w-1/4">
                <div id="enemy-sprite" class="poke-large bg-contain bg-no-repeat bg-center aura-glow text-red-500"></div>
                <div class="poke-info-box mt-4">
                    <p id="e-name-zh" class="text-2xl font-black mb-1 text-white">搜尋中...</p>
                    <p id="e-name-en" class="text-[10px] text-slate-300 font-bold uppercase tracking-widest leading-none"></p>
                    <p id="e-name-jp" class="text-[10px] text-slate-400 font-bold leading-tight mb-1"></p>
                    <p id="e-type" class="text-xs text-yellow-500 font-bold"></p>
                    <div class="w-full h-5 bg-red-950 rounded-full mt-3 overflow-hidden border border-white">
                        <div id="e-hp" class="hp-fill h-full w-full"></div>
                    </div>
                    <button onclick="refreshEnemy()" class="mt-4 bg-slate-800 hover:bg-slate-700 px-6 py-2 rounded-full text-[10px] border border-slate-600 transition">挑戰其他寶可夢</button>
                </div>
            </div>

            <div class="flex flex-col items-center justify-center">
                <div class="matrix-scale bg-slate-900 border-4 border-blue-500 w-[280px] h-[280px] p-2 relative rounded-2xl shadow-2xl">
                    <div id="grid" class="grid grid-cols-10 grid-rows-10 gap-1 h-full w-full"></div>
                    <div id="block-layer" class="absolute inset-0 p-2 grid grid-cols-10 grid-rows-10 gap-1 pointer-events-none"></div>
                </div>
                <button id="btn-go" onclick="startCombat()" class="bg-blue-600 mt-24 px-12 py-4 rounded-2xl font-black italic text-2xl border-b-[8px] border-blue-900 shadow-2xl">上吧！<span class="p-name-zh">皮卡丘</span></button>
            </div>

            <div id="player-box" class="flex flex-col items-center w-1/4">
                <div id="player-sprite" class="poke-large bg-contain bg-no-repeat bg-center aura-glow text-blue-500" style="transform: scaleX(-1);"></div>
                <div class="poke-info-box mt-4">
                    <p class="p-name-zh text-2xl font-black text-blue-400 mb-1">---</p>
                    <p id="p-name-en" class="text-[10px] text-slate-300 uppercase leading-none"></p>
                    <p id="p-name-jp" class="text-[10px] text-slate-400 leading-tight mb-1"></p>
                    <p id="p-type" class="text-xs text-blue-500 font-bold"></p>
                    <button onclick="openBag()" class="mt-4 bg-slate-800 hover:bg-slate-700 px-10 py-3 rounded-2xl border-2 border-slate-500 active:scale-90 transition">🎒 背包</button>
                </div>
            </div>
        </div>
    </div>

    <div id="scene-capture" class="scene hidden flex flex-col items-center justify-center z-[2000] p-10">
        <div id="cap-sprite" class="w-[450px] h-[450px] bg-contain bg-no-repeat bg-center mb-10 animate-bounce"></div>
        <div class="bg-slate-900 p-10 rounded-[3rem] border-8 border-yellow-500 text-center shadow-2xl">
            <h2 id="cap-name-zh" class="text-5xl font-black text-yellow-400 italic mb-2">---</h2>
            <p id="cap-name-lang" class="text-slate-400 text-lg font-bold uppercase tracking-widest leading-none"></p>
            <p class="text-white text-3xl font-black mt-4">成功收服了！！</p>
        </div>
        <div class="flex gap-10 mt-10">
            <button onclick="changeScene('main')" class="bg-slate-700 px-16 py-8 rounded-3xl font-black text-2xl">繼續冒險</button>
            <button onclick="captureAndStore()" class="bg-red-600 px-16 py-8 rounded-3xl font-black text-2xl ball-shake">收服寶可夢</button>
        </div>
    </div>

    <div id="scene-bag" class="scene hidden bg-slate-950 p-12 z-[3000] overflow-y-auto">
        <div class="flex justify-between items-center mb-12 border-b-8 border-blue-900 pb-8">
            <h2 class="text-6xl font-black italic text-blue-400">POKEMON BAG</h2>
            <button onclick="changeScene('main')" class="bg-red-600 w-20 h-20 rounded-full text-5xl font-bold border-4 border-white">✕</button>
        </div>
        <div id="bag-grid" class="grid grid-cols-5 gap-10"></div>
    </div>

    <script>
        // --- 音樂引擎 (8-bit Web Audio) ---
        let audioCtx = null;
        let nextNoteTime = 0;
        let currentTempo = 120;
        let musicTimer = null;
        let currentTrack = 0;

        const TRACKS = [
            { name: "冒險序曲 (快)", tempo: 140, notes: [440, 493, 523, 587, 659, 698, 783, 880] },
            { name: "平靜小鎮 (慢)", tempo: 80, notes: [261, 329, 392, 523, 493, 392, 329] },
            { name: "戰鬥激鬥 (極快)", tempo: 170, notes: [110, 123, 110, 130, 110, 146] },
            { name: "可愛胖丁 (優雅)", tempo: 90, notes: [349, 440, 523, 440, 349, 440, 523] },
            { name: "喵喵惡作劇 (輕快)", tempo: 130, notes: [220, 261, 220, 329, 220, 392] },
            { name: "噴火龍咆哮 (激昂)", tempo: 150, notes: [196, 220, 246, 261, 293, 329] },
            { name: "機台 Mezastar (節奏)", tempo: 125, notes: [523, 523, 587, 523, 698, 659] },
            { name: "史詩傳奇 (重厚)", tempo: 100, notes: [130, 164, 196, 164, 130, 110] },
            { name: "森林漫步 (清新)", tempo: 110, notes: [440, 554, 659, 880, 659, 554] },
            { name: "勝利嘉年華 (快樂)", tempo: 145, notes: [523, 659, 783, 1046, 783, 659] }
        ];

        function playNote(freq, dur) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        function musicLoop() {
            const track = TRACKS[currentTrack];
            const noteIndex = Math.floor(audioCtx.currentTime * (track.tempo / 60)) % track.notes.length;
            playNote(track.notes[noteIndex], 0.2);
            musicTimer = setTimeout(musicLoop, (60 / track.tempo) * 500);
        }

        function unlockAudioAndStart() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                musicLoop();
            }
            changeScene('main');
        }

        function nextDJTrack() {
            currentTrack = (currentTrack + 1) % TRACKS.length;
            document.getElementById('track-info').innerText = `Music: ${currentTrack + 1} (${TRACKS[currentTrack].name})`;
        }

        // --- 核心邏輯 ---
        const db = new Dexie("MezastarV43DB");
        db.version(1).stores({ bag: 'id, name, en, jp, type, count, img' });

        const LOCAL_DICT = {
            25: { zh: "皮卡丘", en: "PIKACHU", jp: "ピカチュウ", type: "⚡ 電系" },
            6: { zh: "噴火龍", en: "CHARIZARD", jp: "リザードン", type: "🔥 火系" },
            10037: { zh: "超級噴火龍Y", en: "MEGA CHARIZARD Y", jp: "メガリザードンY", type: "🔥 火系" },
            10153: { zh: "噴火龍(極巨化)", en: "G-MAX CHARIZARD", jp: "キョダイマックスリザードン", type: "🔥 火系" },
            52: { zh: "喵喵", en: "MEOWTH", jp: "ニャース", type: "⚪ 一般系" },
            39: { zh: "胖丁", en: "JIGGLYPUFF", jp: "プリン", type: "⚪ 妖精系" },
            448: { zh: "路卡利歐", en: "LUCARIO", jp: "ルカリオ", type: "👊 格鬥系" },
            906: { zh: "新葉喵", en: "SPRIGATITO", jp: "ニャオハ", type: "🍃 草系" },
            150: { zh: "超夢", en: "MEWTWO", jp: "ミュウツー", type: "🔮 超能力" }
        };

        let valA, currentB = 1, playerPoke = LOCAL_DICT[25], enemyPoke = {}, currentStep = 'wait';

        async function init() {
            if (await db.bag.count() === 0) {
                await db.bag.bulkAdd(Object.keys(LOCAL_DICT).map(id => ({
                    id: parseInt(id), name: LOCAL_DICT[id].zh, en: LOCAL_DICT[id].en, jp: LOCAL_DICT[id].jp, type: LOCAL_DICT[id].type, count: 1,
                    img: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`
                })));
            }
            updatePlayerUI(); initStartScene(); buildGrid(); refreshEnemy();
        }

        function updatePlayerUI() {
            const spriteUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${playerPoke.id || 25}.png`;
            document.getElementById('player-sprite').style.backgroundImage = `url(${spriteUrl})`;
            document.querySelectorAll('.p-name-zh').forEach(el => el.innerText = playerPoke.zh || playerPoke.name);
            document.getElementById('p-name-en').innerText = playerPoke.en;
            document.getElementById('p-name-jp').innerText = playerPoke.jp;
            document.getElementById('p-type').innerText = playerPoke.type;
            
            const colorMap = { "🔥 火系":{l:"#f87171",d:"#991b1b"}, "⚡ 電系":{l:"#fbbf24",d:"#d97706"}, "💧 水系":{l:"#60a5fa",d:"#1e3a8a"}, "🍃 草系":{l:"#4ade80",d:"#064e3b"} };
            const colors = colorMap[playerPoke.type] || colorMap["⚡ 電系"];
            document.documentElement.style.setProperty('--block-color-light', colors.l);
            document.documentElement.style.setProperty('--block-color-dark', colors.d);
        }

        async function refreshEnemy() {
            document.getElementById('e-name-zh').innerText = "精挑細選中...";
            let found = false;
            while (!found) {
                const randomID = Math.floor(Math.random() * 1025) + 1;
                try {
                    const res = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${randomID}`);
                    const data = await res.json();
                    const zh = data.names.find(n => n.language.name === "zh-Hant");
                    if (zh) {
                        const ja = data.names.find(n => n.language.name === "ja")?.name;
                        const en = data.names.find(n => n.language.name === "en")?.name;
                        enemyPoke = { id: randomID, zh: zh.name, en: en.toUpperCase(), jp: ja, type: "✨ 挑戰者" };
                        found = true;
                    }
                } catch(e) {}
            }
            document.getElementById('enemy-sprite').style.backgroundImage = `url(https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${enemyPoke.id}.png)`;
            document.getElementById('e-name-zh').innerText = enemyPoke.zh;
            document.getElementById('e-name-en').innerText = enemyPoke.en;
            document.getElementById('e-name-jp').innerText = enemyPoke.jp;
            document.getElementById('e-type').innerText = enemyPoke.type;
            resetBattleUI();
        }

        function resetBattleUI() {
            valA = Math.floor(Math.random() * 8) + 2; currentB = 1; currentStep = 'wait';
            document.getElementById('q-a').innerText = valA; document.getElementById('q-b').innerText = currentB;
            document.getElementById('q-ans').innerText = "?"; document.getElementById('q-ans').className = "text-slate-800";
            document.getElementById('e-hp').style.width = "100%";
            document.getElementById('block-layer').innerHTML = "";
            document.getElementById('guide-line-svg').classList.add('hidden');
            document.getElementById('btn-go').classList.remove('hidden');
            clearFlashes();
        }

        function startCombat() {
            currentStep = 'selectA'; document.getElementById('btn-go').classList.add('hidden');
            document.getElementById('enemy-box').classList.add('battling'); document.getElementById('player-box').classList.add('battling');
            updateGuide();
        }

        function updateGuide() {
            clearFlashes(); const svg = document.getElementById('guide-line-svg'); svg.classList.add('hidden');
            if(currentStep === 'selectA') {
                const aEl = document.getElementById('q-a'); const rEl = document.getElementById(`row-${valA}`);
                aEl.classList.add('guide-flash'); rEl.classList.add('guide-flash'); drawGuide(aEl, rEl);
            } else if(currentStep === 'selectB') {
                const bEl = document.getElementById('q-b'); const cEl = document.getElementById(`col-${currentB}`);
                bEl.classList.add('guide-flash'); cEl.classList.add('guide-flash'); drawGuide(bEl, cEl);
            } else if(currentStep === 'finish') { document.getElementById('q-ans').classList.add('guide-flash'); }
        }

        function drawGuide(el1, el2) {
            const svg = document.getElementById('guide-line-svg'); const line = document.getElementById('svg-line');
            const r1 = el1.getBoundingClientRect(); const r2 = el2.getBoundingClientRect();
            line.setAttribute('x1', r1.left + r1.width/2); line.setAttribute('y1', r1.top + r1.height/2);
            line.setAttribute('x2', r2.left + r2.width/2); line.setAttribute('y2', r2.top + r2.height/2);
            svg.classList.remove('hidden');
        }

        function handleRow(r) { if(currentStep === 'selectA' && r === valA) { currentStep = 'selectB'; for(let i=1; i<=valA; i++) createBlock(i, 1); updateGuide(); } }
        function handleCol(c) {
            if(currentStep === 'selectB' && c === currentB) {
                if(currentB > 1) { for(let i=1; i<=valA; i++) createBlock(i, currentB); }
                currentStep = 'finish'; showAnsFinal();
            }
        }

        function showAnsFinal() {
            const qa = document.getElementById('q-ans'); qa.innerText = valA * currentB;
            qa.className = "text-yellow-400 guide-flash cursor-pointer px-4 border-4 border-yellow-400 rounded-3xl";
            qa.onclick = () => {
                const newHp = 100 - (currentB * 11.1); document.getElementById('e-hp').style.width = newHp + "%";
                if(currentB < 9) { currentB++; currentStep = 'selectB'; document.getElementById('q-b').innerText = currentB; document.getElementById('q-ans').innerText="?"; updateGuide(); }
                else {
                    changeScene('capture');
                    document.getElementById('cap-sprite').style.backgroundImage = document.getElementById('enemy-sprite').style.backgroundImage;
                    document.getElementById('cap-name-zh').innerText = enemyPoke.zh;
                }
            };
        }

        async function captureAndStore() {
            const existing = await db.bag.get(enemyPoke.id);
            if(existing) await db.bag.update(enemyPoke.id, { count: (existing.count || 1) + 1 });
            else await db.bag.add({...enemyPoke, name: enemyPoke.zh, count: 1, img: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${enemyPoke.id}.png`});
            openBag();
        }

        async function openBag() {
            changeScene('bag');
            const items = await db.bag.toArray();
            const grid = document.getElementById('bag-grid');
            grid.innerHTML = items.map(i => `
                <div onclick="selectPoke(${i.id})" class="bg-slate-800 p-8 rounded-[3rem] text-center border-4 border-slate-700 hover:border-blue-500 cursor-pointer relative shadow-xl transition">
                    <img src="${i.img}" class="w-full h-auto scale-125">
                    <p class="text-xl font-black text-white mt-4">${i.name}</p>
                    ${i.count > 1 ? `<div class="absolute bottom-4 right-4 bg-red-600 text-white px-3 py-1 rounded-full text-lg font-black">x${i.count}</div>` : ''}
                </div>
            `).join('');
        }

        function selectPoke(id) { db.bag.get(id).then(p => { playerPoke = {id: p.id, zh: p.name, en: p.en, jp: p.jp, type: p.type}; changeScene('main'); updatePlayerUI(); resetBattleUI(); }); }
        function initStartScene() {
            const box = document.getElementById('burst-box');
            [25, 6, 150, 52, 39, 906, 448, 133, 384, 10153].forEach((id, i) => {
                const img = document.createElement('img'); img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
                img.className = 'poke-burst-unit'; img.style.animationDelay = `${i * 0.3}s`;
                box.appendChild(img);
            });
        }
        function buildGrid() {
            const grid = document.getElementById('grid'); grid.innerHTML = "";
            for (let r = 0; r <= 9; r++) {
                for (let c = 0; c <= 9; c++) {
                    const d = document.createElement('div'); d.className = "flex items-center justify-center border border-slate-800 font-bold text-xs cursor-pointer";
                    if (c === 0 && r > 0) { d.innerText = r; d.id = `row-${r}`; d.onclick = () => handleRow(r); }
                    else if (r === 0 && c > 0) { d.innerText = c; d.id = `col-${c}`; d.onclick = () => handleCol(c); }
                    grid.appendChild(d);
                }
            }
        }
        function createBlock(r, c) {
            const wrap = document.createElement('div'); wrap.style.gridRow = r + 1; wrap.style.gridColumn = c + 1;
            const b = document.createElement('div'); b.className = "block-unit"; wrap.appendChild(b); document.getElementById('block-layer').appendChild(wrap);
            setTimeout(() => b.classList.add('block-show'), 50);
        }
        function changeScene(s) { document.querySelectorAll('.scene').forEach(sc => sc.classList.add('hidden')); document.getElementById(`scene-${s}`).classList.remove('hidden'); }
        function clearFlashes() { document.querySelectorAll('.guide-flash').forEach(el => el.classList.remove('guide-flash')); }
        init();
    </script>
</body>
</html>
