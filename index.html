<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>櫻木博士的珠算講座 v9.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #020617; color: white; margin: 0; overflow: hidden; }
        
        /* 強制左右佈局 */
        .desktop-layout { display: flex; flex-direction: row; height: 100vh; width: 100vw; }

        /* 左側：博士教學區 (佔 45%) */
        .instructor-pane { 
            flex: 0 0 45%; background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 3rem; border-right: 6px solid #fbbf24; position: relative;
        }
        /* 修復：直接使用櫻木博士立繪形象 */
        .professor-img { width: 90%; max-height: 70vh; object-fit: contain; filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.6)); }
        
        /* RPG 對話框 */
        .poke-dialog {
            width: 90%; background: rgba(255, 255, 255, 0.95); color: #1e293b;
            border: 5px solid #3b82f6; border-radius: 1rem; padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-weight: 900; position: relative;
        }

        /* 右側：算盤區 (佔 55%) */
        .abacus-pane { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0c1222; }

        /* 算盤框體 */
        .abacus-frame { 
            background: #451a03; border: 12px solid #78350f; border-radius: 3rem; 
            width: 360px; height: 480px; position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .abacus-bar { position: absolute; top: 130px; width: 100%; height: 18px; background: #270e02; z-index: 10; border-top: 2px solid #5d2a0a; }
        .rod { position: absolute; width: 8px; height: 100%; background: #1e293b; left: 50%; transform: translateX(-50%); }

        /* 珠子動態 */
        .bead { 
            width: 75px; height: 40px; border-radius: 50% / 100%; 
            transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
            z-index: 20; border: 1px solid rgba(0,0,0,0.4);
        }
        .bead-top { background: linear-gradient(to bottom, #fb923c, #ea580c); box-shadow: 0 5px #9a3412; }
        .bead-bottom { background: linear-gradient(to bottom, #fde047, #ca8a04); box-shadow: 0 5px #d97706; }
        
        /* 🔥 新增：閃爍與虛線引導特效 */
        @keyframes hint-glow-dashed {
            0%, 100% { border-color: rgba(255,255,255,1); box-shadow: 0 0 0px #fbbf24; transform: scale(1); }
            50% { border-color: rgba(251,191,36, 1); box-shadow: 0 0 25px #fbbf24, 0 0 50px #fff; transform: scale(1.1); }
        }
        .hint-bead { 
            animation: hint-glow-dashed 1s infinite !important; 
            z-index: 100; 
            border: 3px dashed white !important; /* 強制虛線 */
            outline: 2px solid #fbbf24; /* 增加黃色外框 */
        }

        .value-label { font-size: 0.75rem; color: #64748b; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; }
    </style>
</head>
<body>

    <div class="desktop-layout">
        <div class="instructor-pane">
            <img id="prof-img" src="https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/10186.png" class="professor-img" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/10186.png'">
            
            <div class="poke-dialog">
                <p id="dialog-text" class="text-xl">載入中...</p>
                <div class="flex justify-end mt-4">
                    <button onclick="AbacusTutorial.next()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-2 rounded-full font-black text-sm shadow-lg transition-all active:scale-95">點擊繼續 ❯</button>
                </div>
            </div>
        </div>

        <div class="abacus-pane">
            <div class="abacus-frame flex justify-around px-6">
                <div class="abacus-bar"></div>
                
                <div id="col-tens" class="relative w-24 h-full flex flex-col pt-6">
                    <div class="rod"></div>
                    <div id="tens-top" class="bead bead-top mx-auto"></div>
                    <div class="mt-[150px] flex flex-col gap-2">
                        <div id="tens-b1" class="bead bead-bottom mx-auto"></div>
                        <div id="tens-b2" class="bead bead-bottom mx-auto"></div>
                        <div id="tens-b3" class="bead bead-bottom mx-auto"></div>
                        <div id="tens-b4" class="bead bead-bottom mx-auto"></div>
                    </div>
                </div>

                <div id="col-ones" class="relative w-24 h-full flex flex-col pt-6">
                    <div class="rod"></div>
                    <div id="ones-top" class="bead bead-top mx-auto"></div>
                    <div class="mt-[150px] flex flex-col gap-2">
                        <div id="ones-b1" class="bead bead-bottom mx-auto"></div>
                        <div id="ones-b2" class="bead bead-bottom mx-auto"></div>
                        <div id="ones-b3" class="bead bead-bottom mx-auto"></div>
                        <div id="ones-b4" class="bead bead-bottom mx-auto"></div>
                    </div>
                </div>
            </div>

            <div class="mt-12 flex gap-16 text-center">
                <div><span class="value-label">Tens</span><div id="v-tens" class="text-5xl font-black">0</div></div>
                <div><span class="value-label" style="color: #eab308;">Ones</span><div id="v-ones" class="text-5xl font-black text-yellow-400">0</div></div>
            </div>
        </div>
    </div>

    <script>
        const AbacusTutorial = {
            step: 0,
            state: { tens: {t:0, b:0}, ones: {t:0, b:0} },
            scripts: [
                { text: "你好！我是櫻木博士。珠算能幫你建立很棒的數感，我們從基礎開始吧！", action: () => { this.reset(); } },
                { text: "這是一道進位題：『7 + 8』。我們先在個位撥出 7。", action: () => { 
                    // 教學重點：個位撥入一顆上珠(5)、兩顆下珠(2)
                    this.setHint('ones-top', 'ones-b1', 'ones-b2');
                    this.move('ones', 'top', 5); this.move('ones', 'bottom', 2); 
                } },
                { text: "個位只剩下一顆下珠，不夠加 8，我們使用口訣：『加 8 等於進 10 減 2』！", action: () => { this.clearHint(); } },
                { text: "首先，在左邊的『十位檔』撥上一顆下珠，代表『進 10』！", action: () => { 
                    // 引導閃爍：十位第一顆下珠
                    this.setHint('tens-b1');
                    this.move('tens', 'bottom', 1); 
                } },
                { text: "最後，把個位的兩顆下珠減掉，完成『減 2』。", action: () => { 
                    // 引導閃爍：個位剛才那兩顆下珠
                    this.setHint('ones-b1', 'ones-b2');
                    this.move('ones', 'bottom', 0); 
                } },
                { text: "完成了！算盤現在顯示 15。你學會珠算的進位魔法了嗎？", action: () => { this.clearHint(); } }
            ],
            move(col, type, val) {
                this.state[col][type === 'top' ? 't' : 'b'] = val;
                this.updateUI();
            },
            reset() { this.state = { tens: {t:0, b:0}, ones: {t:0, b:0} }; this.updateUI(); this.clearHint(); },
            updateUI() {
                ['tens', 'ones'].forEach(col => {
                    const t = document.getElementById(`${col}-top`);
                    t.style.transform = this.state[col].t === 5 ? "translateY(70px)" : "translateY(0)";
                    for(let i=1; i<=4; i++) {
                        const b = document.getElementById(`${col}-b${i}`);
                        b.style.transform = i <= this.state[col].b ? "translateY(-70px)" : "translateY(0)";
                    }
                });
                document.getElementById('v-tens').innerText = (this.state.tens.t + this.state.tens.b) * 10;
                document.getElementById('v-ones').innerText = this.state.ones.t + this.state.ones.b;
            },
            setHint(...ids) {
                this.clearHint();
                ids.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.classList.add('hint-bead');
                });
            },
            clearHint() {
                document.querySelectorAll('.hint-bead').forEach(el => el.classList.remove('hint-bead'));
            },
            next() {
                if (this.step < this.scripts.length - 1) {
                    this.step++;
                    document.getElementById('dialog-text').innerText = this.scripts[this.step].text;
                    this.scripts[this.step].action();
                } else {
                    alert("講座結束！你真有天分！");
                }
            }
        };

        window.onload = () => { 
            AbacusTutorial.updateUI(); 
            document.getElementById('dialog-text').innerText = AbacusTutorial.scripts[0].text; 
        };
    </script>
</body>
</html>
