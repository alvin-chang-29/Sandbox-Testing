<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢數學對戰 PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto+Sans+TC', sans-serif; overflow: hidden; touch-action: manipulation; }
        .mezastar-gradient { background: radial-gradient(circle, #2a0845 0%, #000000 100%); }
        .jelly { animation: jelly 0.5s ease; }
        @keyframes jelly {
            0% { transform: scale(1, 1); }
            30% { transform: scale(1.25, 0.75); }
            40% { transform: scale(0.75, 1.25); }
            50% { transform: scale(1.15, 0.85); }
            65% { transform: scale(0.95, 1.05); }
            75% { transform: scale(1.05, 0.95); }
            100% { transform: scale(1, 1); }
        }
        .shake { animation: shake 0.5s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
        }
        .launch-out { animation: launchOut 2s ease-in forwards; }
        @keyframes launchOut {
            0% { transform: translateZ(-1000px) scale(0.1); opacity: 0; }
            50% { transform: translateZ(0) scale(1); opacity: 1; }
            100% { transform: translateZ(500px) scale(3); opacity: 0; }
        }
        .grid-matrix { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; }
        .dashed-line { stroke-dasharray: 5; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -10; } }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <div id="app" class="relative w-screen h-screen overflow-hidden">
        
        <section id="scene-start" class="absolute inset-0 mezastar-gradient flex flex-col items-center justify-center z-50">
            <div id="start-pokemon-container" class="relative w-full h-64 overflow-hidden mb-10"></div>
            <h1 class="text-4xl font-black mb-8 italic text-yellow-400">POKÉMON MATH</h1>
            <button onclick="changeScene('hub')" class="bg-red-600 hover:bg-red-500 text-white px-10 py-5 rounded-full text-2xl font-bold border-4 border-white shadow-2xl animate-bounce">
                一起抓夢吧！
            </button>
        </section>

        <section id="scene-hub" class="hidden absolute inset-0 bg-blue-900 p-4 flex flex-col">
            <div class="flex justify-between items-start mb-4">
                <div id="enemy-info" class="w-1/3 text-center">
                    <div class="h-2 w-full bg-gray-700 rounded-full mb-1"><div id="enemy-hp-bar" class="h-full bg-green-500 w-full rounded-full transition-all"></div></div>
                    <img id="enemy-img" src="" class="w-full scale-150 mb-2">
                    <p id="enemy-name" class="text-xs font-bold leading-tight"></p>
                </div>
                
                <div id="hub-question" class="text-3xl font-black text-yellow-300 self-center">? × ? = ?</div>

                <div id="player-info" class="w-1/3 text-center">
                    <img id="player-img" src="" class="w-full scale-150 mb-2">
                    <p id="player-name" class="text-xs font-bold leading-tight"></p>
                    <button onclick="openBag()" class="mt-2 bg-gray-800 p-2 rounded-lg text-xs">🎒 背包</button>
                </div>
            </div>

            <div class="flex-grow flex items-center justify-center">
                <div id="hub-matrix" class="grid-matrix w-full opacity-30 scale-125"></div>
            </div>

            <div class="h-24 flex items-center justify-center gap-4">
                <button id="btn-battle" onclick="startBattle()" class="bg-yellow-500 text-black px-6 py-3 rounded-xl font-black text-xl border-b-4 border-yellow-700">
                    上吧！皮卡丘
                </button>
            </div>
        </section>

        <section id="scene-bag" class="hidden absolute inset-0 bg-gray-800 z-[60] p-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">我的寶可夢</h2>
                <button onclick="changeScene('hub')" class="bg-red-500 w-10 h-10 rounded-full font-bold">X</button>
            </div>
            <div id="bag-list" class="grid grid-cols-5 gap-2 overflow-y-auto h-5/6"></div>
        </section>

        <section id="scene-combat" class="hidden absolute inset-0 bg-red-900 p-4 flex flex-col">
            <div id="combat-arena" class="flex justify-between mb-4">
                <div class="w-1/3"><img id="c-enemy-img" class="shake w-full scale-125"></div>
                <div id="combat-q" class="text-4xl font-black text-white self-center">
                    <span id="q-y" class="p-1">?</span> × <span id="q-x" class="p-1">?</span> = <span id="q-ans" class="border-2 border-dashed border-yellow-400 px-2 opacity-50">?</span>
                </div>
                <div class="w-1/3"><img id="c-player-img" class="shake w-full scale-125"></div>
            </div>
            
            <div id="combat-matrix" class="grid-matrix flex-grow bg-white/10 rounded-lg p-2 relative"></div>
            <div id="combat-feedback" class="absolute top-1/2 left-1/4 -translate-y-1/2 text-yellow-400 font-black text-3xl hidden">攻擊效果絕佳！！</div>
        </section>

        <section id="scene-capture" class="hidden absolute inset-0 mezastar-gradient flex flex-col items-center justify-center z-50">
            <div class="relative flex items-center justify-center w-full">
                <img id="cap-enemy-img" class="w-64 h-64 animate-bounce">
                <div class="absolute left-10 top-1/2">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" class="w-20 h-20 rotate-12 opacity-80 animate-pulse">
                </div>
            </div>
            <h2 id="cap-name" class="text-2xl font-black my-6">寶可夢 收服!!</h2>
            <div class="flex gap-4">
                <button onclick="newGame()" class="bg-blue-600 px-6 py-3 rounded-lg font-bold">繼續冒險</button>
                <button onclick="saveAndBag()" class="bg-red-600 px-6 py-3 rounded-lg font-bold shake">收服寶可夢 (球)</button>
            </div>
        </section>

    </div>

    <script>
        // --- 初始化資料庫 ---
        const db = new Dexie("PokeMathDB");
        db.version(1).stores({ inventory: 'id, name, count, sprites, types' });

        let state = {
            currentEnemy: null,
            currentPlayer: { id: 25, name: '皮卡丘 (Pikachu)', sprites: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png' },
            question: { y: 0, x: 0, ans: 0 },
            step: 'y' // y -> x -> ans
        };

        const COMMON_POKEMON = [1,4,7,25,133,150,252,255,258,384,448,658,722,744,810,813,816,906,909,912,1000,1007,1008,1011,1014,1017,1020,1024,25,52]; // 30隻

        // --- 核心邏輯 ---
        async function init() {
            renderStartScene();
            await loadPlayer();
            generateQuestion();
            renderMatrix('hub-matrix');
        }

        function renderStartScene() {
            const container = document.getElementById('start-pokemon-container');
            for(let i=0; i<10; i++) {
                const img = document.createElement('img');
                img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${COMMON_POKEMON[i]}.png`;
                img.className = "absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-32 launch-out";
                img.style.animationDelay = `${i * 0.4}s`;
                container.appendChild(img);
            }
        }

        async function loadPlayer() {
            const player = await db.inventory.get(state.currentPlayer.id) || state.currentPlayer;
            state.currentPlayer = player;
            document.getElementById('player-img').src = player.sprites;
            document.getElementById('player-name').innerText = player.name;
            document.getElementById('btn-battle').innerText = `上吧！${player.name.split(' ')[0]}`;
        }

        async function generateQuestion() {
            const y = Math.floor(Math.random() * 9) + 1;
            const x = Math.floor(Math.random() * 9) + 1;
            state.question = { y, x, ans: y * x };
            document.getElementById('hub-question').innerText = `${y} × ${x} = ?`;
            
            // 隨機抓一個敵人
            const rid = COMMON_POKEMON[Math.floor(Math.random() * COMMON_POKEMON.length)];
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${rid}`);
            const data = await res.json();
            state.currentEnemy = {
                id: data.id,
                name: data.name,
                sprites: data.sprites.other['official-artwork'].front_default
            };
            document.getElementById('enemy-img').src = state.currentEnemy.sprites;
            document.getElementById('enemy-name').innerText = data.name.toUpperCase();
        }

        function renderMatrix(targetId, interactive = false) {
            const container = document.getElementById(targetId);
            container.innerHTML = '';
            for(let i=0; i<100; i++) {
                const cell = document.createElement('div');
                const r = Math.floor(i/10);
                const c = i%10;
                cell.className = "aspect-square flex items-center justify-center text-[8px] rounded-sm ";
                
                if(r===0 && c>0) { cell.innerText = c; cell.classList.add('bg-blue-500'); cell.id = `x-${c}`; }
                else if(c===0 && r>0) { cell.innerText = r; cell.classList.add('bg-red-500'); cell.id = `y-${r}`; }
                else if(r>0 && c>0) { cell.classList.add('bg-white/10'); cell.id = `cell-${r}-${c}`; }
                else { cell.classList.add('bg-transparent'); }
                
                if(interactive) {
                    cell.onclick = () => handleMatrixClick(r, c);
                }
                container.appendChild(cell);
            }
        }

        function startBattle() {
            changeScene('combat');
            document.getElementById('c-enemy-img').src = state.currentEnemy.sprites;
            document.getElementById('c-player-img').src = state.currentPlayer.sprites;
            document.getElementById('q-y').innerText = state.question.y;
            document.getElementById('q-x').innerText = state.question.x;
            state.step = 'y';
            renderMatrix('combat-matrix', true);
            guideStep();
        }

        function guideStep() {
            // 重置樣式
            document.querySelectorAll('[id^="x-"], [id^="y-"], #q-ans').forEach(el => el.classList.remove('animate-pulse', 'bg-yellow-400', 'scale-125'));
            
            if(state.step === 'y') {
                const el = document.getElementById(`y-${state.question.y}`);
                el.classList.add('animate-pulse', 'bg-yellow-400', 'scale-125');
            } else if(state.step === 'x') {
                const el = document.getElementById(`x-${state.question.x}`);
                el.classList.add('animate-pulse', 'bg-yellow-400', 'scale-125');
            } else if(state.step === 'ans') {
                document.getElementById('q-ans').classList.add('animate-pulse', 'bg-yellow-400', 'opacity-100');
                document.getElementById('q-ans').innerText = state.question.ans;
            }
        }

        function handleMatrixClick(r, c) {
            if(state.step === 'y' && r === state.question.y && c === 0) {
                state.step = 'x';
                spawnJelly(r, 1);
                guideStep();
            } else if(state.step === 'x' && c === state.question.x && r === 0) {
                state.step = 'ans';
                for(let i=2; i<=state.question.x; i++) {
                    setTimeout(() => spawnJelly(state.question.y, i), i * 100);
                }
                guideStep();
            }
        }

        document.getElementById('q-ans').onclick = () => {
            if(state.step === 'ans') {
                triggerAttack();
            }
        };

        function spawnJelly(r, c) {
            const cell = document.getElementById(`cell-${r}-${c}`);
            cell.classList.remove('bg-white/10');
            cell.classList.add('bg-yellow-500', 'jelly');
        }

        function triggerAttack() {
            document.getElementById('combat-feedback').classList.remove('hidden');
            setTimeout(() => {
                changeScene('capture');
                document.getElementById('cap-enemy-img').src = state.currentEnemy.sprites;
                document.getElementById('cap-name').innerText = `${state.currentEnemy.name.toUpperCase()} 收服!!`;
            }, 1500);
        }

        async function saveAndBag() {
            const existing = await db.inventory.get(state.currentEnemy.id);
            if(existing) {
                await db.inventory.update(state.currentEnemy.id, { count: existing.count + 1 });
            } else {
                await db.inventory.add({ ...state.currentEnemy, count: 1 });
            }
            openBag();
        }

        async function openBag() {
            changeScene('bag');
            const list = document.getElementById('bag-list');
            list.innerHTML = '';
            const all = await db.inventory.toArray();
            all.forEach(p => {
                const div = document.createElement('div');
                div.className = "bg-gray-700 p-1 rounded relative";
                div.innerHTML = `
                    <img src="${p.sprites}" class="w-full">
                    <div class="text-[10px] text-center truncate">${p.name}</div>
                    <div class="absolute bottom-0 right-0 bg-yellow-500 text-black text-[10px] px-1 font-bold">x${p.count || 1}</div>
                `;
                div.onclick = async () => {
                    state.currentPlayer = p;
                    await loadPlayer();
                    changeScene('hub');
                };
                list.appendChild(div);
            });
        }

        function changeScene(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`scene-${id}`).classList.remove('hidden');
        }

        function newGame() {
            generateQuestion();
            changeScene('hub');
        }

        init();
    </script>
</body>
</html>
