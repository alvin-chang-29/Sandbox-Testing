<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢珠算修行 v8.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: manipulation; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .bead { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .active-glow { box-shadow: 0 0 15px rgba(255, 255, 255, 0.8); border: 2px solid white; }
        @keyframes poke-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .poke-animate { animation: poke-bounce 1s infinite; }
    </style>
</head>
<body class="bg-slate-900 overflow-hidden">

<div id="app" class="flex flex-col h-screen max-w-md mx-auto relative">
    
    <div id="battle-scene" class="h-1/3 m-4 rounded-3xl border-4 border-white shadow-2xl relative flex items-center justify-around transition-colors duration-700 bg-green-400">
        <div class="bg-white/90 p-4 rounded-2xl shadow-inner text-center min-w-[80px]">
            <div class="text-xs font-bold text-slate-500 uppercase">目標數</div>
            <div id="target-number" class="text-5xl font-black text-slate-800">1</div>
        </div>

        <div class="text-center">
            <div id="target-pokemon" class="text-8xl poke-animate drop-shadow-lg">🌱</div>
            <div id="pokemon-name" class="mt-2 bg-black/30 px-3 py-1 rounded-full text-white text-sm font-bold">妙蛙種子</div>
        </div>
    </div>

    <div class="px-6 text-center">
        <div id="instruction-msg" class="text-yellow-400 font-bold text-lg drop-shadow-md">👆 撥動 1 顆精靈球來攻擊！</div>
    </div>

    <div class="flex-1 flex items-center justify-center p-4">
        <div id="abacus-frame" class="w-full bg-orange-100 p-8 rounded-[40px] border-[10px] border-amber-900 shadow-2xl relative">
            <div class="absolute w-full h-4 bg-amber-900 left-0 top-[85px] z-20 shadow-md border-y border-amber-800"></div>
            
            <div class="flex justify-center relative h-72">
                <div class="rod w-20 h-full flex flex-col items-center relative">
                    <div class="absolute w-2 h-full bg-slate-400 rounded-full shadow-inner"></div>
                    
                    <div id="bead-5" class="bead upper w-16 h-12 bg-red-500 rounded-full shadow-lg z-30 cursor-pointer border-b-8 border-red-700" 
                         style="transform: translateY(0px);" onclick="toggleUpperBead()"></div>
                    
                    <div class="h-16"></div> <div class="bead lower w-16 h-12 bg-blue-500 rounded-full shadow-lg z-30 cursor-pointer border-b-8 border-blue-700 my-1" 
                         style="transform: translateY(60px);" onclick="handleLowerClick(0)"></div>
                    <div class="bead lower w-16 h-12 bg-blue-500 rounded-full shadow-lg z-30 cursor-pointer border-b-8 border-blue-700 my-1" 
                         style="transform: translateY(60px);" onclick="handleLowerClick(1)"></div>
                    <div class="bead lower w-16 h-12 bg-blue-500 rounded-full shadow-lg z-30 cursor-pointer border-b-8 border-blue-700 my-1" 
                         style="transform: translateY(60px);" onclick="handleLowerClick(2)"></div>
                    <div class="bead lower w-16 h-12 bg-blue-500 rounded-full shadow-lg z-30 cursor-pointer border-b-8 border-blue-700 my-1" 
                         style="transform: translateY(60px);" onclick="handleLowerClick(3)"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="p-4 text-center text-slate-500 text-xs">
        寶可夢珠算修行程式 v8.1 | 初學者模式
    </div>
</div>

<script>
    // --- 1. 課程資料庫 ---
    const CURRICULUM = [
        { id: "L1", target: 1, pokemon: "🌱", name: "妙蛙種子", color: "bg-green-400" },
        { id: "L2", target: 2, pokemon: "💧", name: "傑尼龜", color: "bg-blue-400" },
        { id: "L3", target: 3, pokemon: "🔥", name: "小火龍", color: "bg-red-400" }
    ];

    let currentLevelIndex = 0;
    let lowerBeadsState = [0, 0, 0, 0]; // 0: 遠離, 1: 靠樑
    let upperBeadState = 0; // 0: 遠離, 1: 靠樑

    // --- 2. 算盤核心邏輯 ---

    function handleLowerClick(index) {
        // 判斷是要向上還是向下
        const isMovingUp = lowerBeadsState[index] === 0;
        
        // 更新狀態：連動邏輯
        lowerBeadsState = lowerBeadsState.map((state, i) => {
            if (isMovingUp) {
                return (i <= index) ? 1 : state; // 點擊點以上的全部帶上去
            } else {
                return (i >= index) ? 0 : state; // 點擊點以下的全部帶下來
            }
        });
        
        renderAbacus();
        checkResult();
    }

    function toggleUpperBead() {
        upperBeadState = (upperBeadState === 0) ? 1 : 0;
        renderAbacus();
        checkResult();
    }

    function renderAbacus() {
        // 渲染地珠
        const lowerBeads = document.querySelectorAll('.lower');
        lowerBeads.forEach((bead, i) => {
            // 靠樑位置 Y=0, 遠離位置 Y=60
            bead.style.transform = lowerBeadsState[i] === 1 ? 'translateY(0px)' : 'translateY(60px)';
            if(lowerBeadsState[i] === 1) bead.classList.add('active-glow');
            else bead.classList.remove('active-glow');
        });

        // 渲染天珠
        const upperBead = document.getElementById('bead-5');
        // 天珠向下靠近樑才是 5
        upperBead.style.transform = upperBeadState === 1 ? 'translateY(25px)' : 'translateY(0px)';
        if(upperBeadState === 1) upperBead.classList.add('active-glow');
        else upperBead.classList.remove('active-glow');
    }

    // --- 3. 遊戲流程控制 ---

    function checkResult() {
        const currentSum = (upperBeadState * 5) + lowerBeadsState.reduce((a, b) => a + b, 0);
        const target = CURRICULUM[currentLevelIndex].target;

        if (currentSum === target) {
            triggerCapture();
        }
    }

    function triggerCapture() {
        const pokemonEl = document.getElementById('target-pokemon');
        const msgEl = document.getElementById('instruction-msg');

        // 視覺特效
        pokemonEl.style.transform = "scale(0.2) rotate(360deg)";
        pokemonEl.style.transition = "all 0.8s ease-in";
        msgEl.innerText = "✨ Gotcha! 成功捕獲！ ✨";
        msgEl.style.color = "#4ade80";

        // 下一關
        setTimeout(() => {
            currentLevelIndex++;
            if (currentLevelIndex < CURRICULUM.length) {
                initLevel();
            } else {
                msgEl.innerText = "🏆 恭喜完成初步修行！(L1-L3)";
                alert("你太棒了！所有的修行都完成囉！");
            }
        }, 1500);
    }

    function initLevel() {
        const level = CURRICULUM[currentLevelIndex];
        
        // 更新 UI
        document.getElementById('target-number').innerText = level.target;
        document.getElementById('target-pokemon').innerText = level.pokemon;
        document.getElementById('target-pokemon').style.transform = "scale(1) rotate(0deg)";
        document.getElementById('pokemon-name').innerText = level.name;
        document.getElementById('battle-scene').className = `h-1/3 m-4 rounded-3xl border-4 border-white shadow-2xl relative flex items-center justify-around transition-colors duration-700 ${level.color}`;
        
        const msgEl = document.getElementById('instruction-msg');
        msgEl.innerText = `👆 撥動 ${level.target} 顆精靈球來攻擊！`;
        msgEl.style.color = "#facc15";

        // 歸零
        lowerBeadsState = [0, 0, 0, 0];
        upperBeadState = 0;
        renderAbacus();
    }

    // 初始化第一關
    window.onload = initLevel;

</script>
</body>
</html>
