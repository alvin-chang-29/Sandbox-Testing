<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大木博士的珠算教室 v8.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #0f172a; color: white; margin: 0; overflow: hidden; }
        
        /* 教學區域佈局 */
        #tutorial-scene { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        /* 上方：大木博士與 RPG 對話框 */
        .tutorial-header { height: 40vh; background: linear-gradient(to bottom, #1d4ed8, #0f172a); display: flex; padding: 2rem; position: relative; border-bottom: 6px solid #fbbf24; }
        .poke-dialog { background: rgba(255, 255, 255, 0.9); color: #1e293b; border-radius: 1.5rem; padding: 1.5rem; border: 6px solid #3b82f6; position: absolute; left: 160px; top: 40px; right: 40px; font-weight: bold; line-height: 1.6; box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        .poke-dialog::after { content: ''; position: absolute; left: -20px; top: 30px; border-top: 15px solid transparent; border-bottom: 15px solid transparent; border-right: 20px solid #3b82f6; }

        /* 下方：實作算盤區 */
        .abacus-area { height: 60vh; background: #0f172a; display: flex; flex-direction: column; items: center; justify-content: center; position: relative; }

        /* 算盤框體加固 */
        .abacus-frame { background: #451a03; border: 10px solid #78350f; border-radius: 2rem; position: relative; width: 320px; height: 400px; box-shadow: 0 25px 60px rgba(0,0,0,0.6); }
        .abacus-bar { position: absolute; top: 110px; left: 0; width: 100%; height: 15px; background: #270e02; z-index: 10; box-shadow: 0 3px 5px rgba(0,0,0,0.5); }
        .rod { position: absolute; width: 8px; height: 100%; background: #1e293b; left: 50%; transform: translateX(-50%); border-radius: 4px; }

        /* 珠子物理樣式 (預設皆熄滅於兩側) */
        .bead { width: 68px; height: 35px; border-radius: 50% / 100%; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; z-index: 20; border: 1px solid rgba(0,0,0,0.3); }
        .bead-top { background: linear-gradient(to bottom, #fb923c, #ea580c); box-shadow: 0 4px #9a3412; }
        .bead-bottom { background: linear-gradient(to bottom, #fde047, #ca8a04); box-shadow: 0 4px #854d0e; }
        .bead-active { filter: brightness(1.2) saturate(1.2); }

        /* 動態提示閃爍 */
        @keyframes pulse-hint { 0%, 100% { outline: 0px solid yellow; box-shadow: 0 0 0px yellow; } 50% { outline: 4px solid white; box-shadow: 0 0 20px yellow, inset 0 0 10px white; } }
        .hint-focus { animation: pulse-hint 1s infinite; z-index: 100 !important; }
    </style>
</head>
<body>

    <div id="tutorial-scene">
        <div class="tutorial-header">
            <div class="flex flex-col items-center">
                <img id="oak-img" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/10186.png" class="w-28 h-28 object-contain drop-shadow-lg transition-transform" style="filter: brightness(1);">
                <div class="bg-yellow-400 text-blue-900 text-xs font-bold px-3 py-1 rounded-full mt-2 border-2 border-white shadow-md">大木博士</div>
            </div>
            
            <div class="poke-dialog">
                <p id="oak-text" class="text-sm">正在載入珠算講座內容...</p>
                <button id="next-btn" onclick="AbacusTutorial.next()" class="absolute bottom-3 right-3 bg-blue-600 text-white px-5 py-1.5 rounded-full text-xs font-black shadow-lg shadow-blue-900/50 active:scale-95 transition-all">點擊繼續 ❯</button>
            </div>
        </div>

        <div class="abacus-area">
            <div class="abacus-frame flex justify-around px-4">
                <div class="abacus-bar"></div>
                
                <div id="col-tens" class="relative w-20 h-full flex flex-col pt-4 overflow-hidden">
                    <div class="rod"></div>
                    <div id="tens-top" class="bead bead-top mx-auto translate-y-0"></div>
                    <div id="tens-b1" class="bead bead-bottom mx-auto mt-[130px]"></div>
                    <div id="tens-b2" class="bead bead-bottom mx-auto mt-1"></div>
                    <div id="tens-b3" class="bead bead-bottom mx-auto mt-1"></div>
                    <div id="tens-b4" class="bead bead-bottom mx-auto mt-1"></div>
                </div>

                <div id="col-ones" class="relative w-20 h-full flex flex-col pt-4 overflow-hidden">
                    <div class="rod"></div>
                    <div id="ones-top" class="bead bead-top mx-auto translate-y-0"></div>
                    <div id="ones-b1" class="bead bead-bottom mx-auto mt-[130px]"></div>
                    <div id="ones-b2" class="bead bead-bottom mx-auto mt-1"></div>
                    <div id="ones-b3" class="bead bead-bottom mx-auto mt-1"></div>
                    <div id="ones-b4" class="bead bead-bottom mx-auto mt-1"></div>
                </div>
            </div>
            
            <div class="mt-6 flex gap-10 text-center">
                <div><p class="text-xs text-slate-500 tracking-widest mb-1">十位</p><p id="val-tens" class="text-3xl font-black">0</p></div>
                <div><p class="text-xs text-slate-500 tracking-widest mb-1">個位</p><p id="val-ones" class="text-3xl font-black text-yellow-400">0</p></div>
            </div>
        </div>
    </div>

    <script>
        const AbacusTutorial = {
            step: 0,
            state: { tens: {t:0, b:0}, ones: {t:0, b:0} },
            scripts: [
                { text: "你好！我是大木博士。算盤是很神祕的計數工具！", action: () => { this.reset(); } },
                { text: "首先，靠近這條黃色『樑』的珠子才算分數喔！", action: () => { this.focusBar(); } },
                { text: "上面的橘色珠子，一顆代表『5』。看好了，我把它撥下來（靠近樑）！", action: () => { this.focusBead('ones-top'); this.move('ones', 'top', 5); } },
                { text: "下面的黃色珠子，每一顆代表『1』。撥上去三顆，現在個位就是 8 了！", action: () => { this.focusBead('ones-b3', true); this.move('ones', 'bottom', 3); } },
                { text: "現在個位是 8。接著我們要挑戰『加 7』！", action: () => { this.clearHint(); } },
                { text: "但是個位只剩下一顆珠子，不夠加 7，怎麼辦？這時候要進位！", action: () => {} },
                { text: "我們利用口訣：『加 7 等於進 10 減 3』。我們先在左邊『十位檔』撥上一顆下珠。", action: () => { this.focusBead('tens-b1'); this.move('tens', 'bottom', 1); } },
                { text: "最後，記得把個位『撥掉 3 顆』珠子（熄滅它）！", action: () => { this.focusBead('ones-b3', true); this.move('ones', 'bottom', 0); } },
                { text: "看！算盤現在顯示 1 個十和 5 個一，答案就是 15！很神奇吧！", action: () => { this.clearHint(); } }
            ],
            move(col, type, val) {
                this.state[col][type === 'top' ? 't' : 'b'] = val;
                this.updateUI();
            },
            reset() { this.state = { tens: {t:0, b:0}, ones: {t:0, b:0} }; this.updateUI(); },
            updateUI() {
                ['tens', 'ones'].forEach(col => {
                    const t = document.getElementById(`${col}-top`);
                    // 撥下來靠近樑 = translate 55px
                    t.style.transform = this.state[col].t === 5 ? "translateY(55px)" : "translateY(0)";
                    t.classList.toggle('bead-active', this.state[col].t === 5);
                    
                    for(let i=1; i<=4; i++) {
                        const b = document.getElementById(`${col}-b${i}`);
                        // 撥上去靠近樑 = translate -55px
                        b.style.transform = i <= this.state[col].b ? "translateY(-55px)" : "translateY(0)";
                        b.classList.toggle('bead-active', i <= this.state[col].b);
                    }
                });
                document.getElementById('val-tens').innerText = (this.state.tens.t + this.state.tens.b) * 10;
                document.getElementById('val-ones').innerText = this.state.ones.t + this.state.ones.b;
            },
            clearHint() {
                document.querySelectorAll('.hint-focus').forEach(el => el.classList.remove('hint-focus'));
                document.getElementById('oak-img').style.transform = "scale(1)";
                document.getElementById('oak-img').style.filter = "brightness(1)";
                document.getElementById('tuto-scene').style.opacity = "1";
            },
            focusBar() {
                document.querySelector('.abacus-bar').classList.add('hint-focus');
                document.getElementById('oak-img').style.transform = "scale(1.1)";
            },
            focusBead(id, multi = false) {
                this.clearHint();
                document.getElementById(id).classList.add('hint-focus');
            },
            next() {
                if (this.step < this.scripts.length - 1) {
                    this.step++;
                    document.getElementById('oak-text').innerText = this.scripts[this.step].text;
                    this.scripts[this.step].action();
                } else {
                    alert("講座結束！你學會 $7+7=15$ 的過程了嗎？準備挑戰對戰題目吧！");
                }
            }
        };

        // 啟動 (window.onload 加固)
        window.addEventListener('load', () => {
            AbacusTutorial.scripts[0].action(); 
            document.getElementById('oak-text').innerText = AbacusTutorial.scripts[0].text;
            AbacusTutorial.updateUI();
        });
    </script>
</body>
</html>
