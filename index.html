<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mezastar Voice Master - v13.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&display=swap');
        .voice-text {
            font-family: 'Bungee', cursive;
            animation: text-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes text-pop {
            0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(5deg); opacity: 1; }
        }
        .combo-glow { text-shadow: 0 0 20px #fbbf24; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center p-6 overflow-hidden">

    <div id="overlay" class="fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center">
        <h1 class="text-blue-500 font-black text-4xl mb-12 italic">VOICE SYSTEM</h1>
        <button id="btn-start" class="bg-yellow-500 text-black px-16 py-8 rounded-full font-black text-2xl animate-pulse">
            GET READY!
        </button>
    </div>

    <div class="w-full max-w-sm text-center relative">
        <div id="voice-display" class="h-20 flex items-center justify-center mb-4">
            </div>

        <div class="bg-slate-900 p-8 rounded-[3rem] border-4 border-blue-600 shadow-2xl relative">
            <div class="absolute -top-6 -right-4 bg-yellow-500 text-black px-4 py-2 rounded-full font-black italic transform rotate-12">
                COMBO: <span id="combo-count">0</span>
            </div>
            
            <div class="w-full aspect-square bg-slate-800 rounded-2xl mb-8 flex items-center justify-center border-2 border-slate-700">
                <p class="text-6xl font-black italic text-blue-400">3 × 4</p>
            </div>

            <button onclick="successAction()" class="w-full bg-gradient-to-b from-blue-400 to-blue-700 py-6 rounded-2xl font-black italic text-3xl shadow-lg active:scale-95 transition">
                ATTACK!
            </button>
        </div>
    </div>

    <script>
        // 音效與語音庫 (使用 Web Audio 合成語音或高品質採樣)
        const sounds = {
            bgm: new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3'),
            impact: new Audio('https://assets.mixkit.co/active_storage/sfx/2577/2577-preview.mp3')
        };

        // 語音短句庫 (模擬熱血旁白)
        const voicePhrases = ["GREAT!", "EXCELLENT!", "AMAZING!", "YOU GOT IT!", "POWERFUL!"];
        let combo = 0;

        document.getElementById('btn-start').onclick = () => {
            sounds.bgm.loop = true;
            sounds.bgm.volume = 0.1;
            sounds.bgm.play();
            document.getElementById('overlay').style.display = 'none';
        };

        function successAction() {
            // 1. 播放攻擊音效
            sounds.impact.currentTime = 0;
            sounds.impact.play();

            // 2. 更新 Combo
            combo++;
            document.getElementById('combo-count').innerText = combo;

            // 3. 語音激勵 (使用瀏覽器內建語音合成，確保 100% 成功且不佔空間)
            const speech = new SpeechSynthesisUtterance();
            const phrase = voicePhrases[Math.floor(Math.random() * voicePhrases.length)];
            
            speech.text = phrase;
            speech.lang = 'en-US';
            speech.rate = 1.2; // 語速快一點比較熱血
            speech.pitch = 1.1; // 音調高一點
            speech.volume = 1.0;

            // 語音播放時稍微降低 BGM
            sounds.bgm.volume = 0.03;
            window.speechSynthesis.speak(speech);
            speech.onend = () => { sounds.bgm.volume = 0.1; };

            // 4. 視覺彈出
            const display = document.getElementById('voice-display');
            display.innerHTML = `<h2 class="voice-text text-5xl font-black text-yellow-400 italic combo-glow">${phrase}</h2>`;
            
            // 1秒後清空
            setTimeout(() => { display.innerHTML = ""; }, 1000);
        }
    </script>
</body>
</html>
