<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢數學對戰 v8.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; overflow: hidden; background: #000; }
        .scene { position: absolute; inset: 0; transition: opacity 0.5s; }
        .hidden { display: none !important; }
        
        /* M1: Mezastar Animation */
        .poke-zoom {
            animation: pokeZoom 2s ease-in forwards;
            opacity: 0;
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%) scale(0.1);
        }
        @keyframes pokeZoom {
            0% { transform: translate(-50%, -50%) scale(0.1); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(4); opacity: 0; }
        }

        /* Jelly Block Effects */
        .jelly-block { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .jelly-block.is-active { transform: scale(0.9); }
        
        /* HP Bar Animation */
        .hp-transition { transition: width 0.5s ease-out; }
    </style>
</head>
<body>

    <div id="start-scene" class="scene flex flex-col items-center justify-center bg-gradient-to-b from-blue-900 to-black text-white">
        <div id="animation-container" class="relative w-full h-64 overflow-hidden"></div>
        <h1 class="text-4xl font-black italic mb-10 tracking-tighter text-yellow-400">POKÉMON MATH</h1>
        <button onclick="SceneManager.to('main-hub')" class="bg-yellow-400 text-blue-900 px-12 py-4 rounded-full text-2xl font-black shadow-[0_0_20px_rgba(250,204,21,0.5)] active:scale-95 transition-transform">
            一起抓夢吧！
        </button>
    </div>

    <div id="main-hub" class="scene hidden flex flex-col p-4 bg-slate-100">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-slate-800">準備戰鬥</h2>
            <div id="math-mode-status" class="bg-blue-600 text-white px-3 py-1 rounded-full text-sm">加法模式</div>
        </div>

        <div class="flex flex-1 items-center justify-around gap-2">
            <div class="flex-1 text-center">
                <img id="enemy-img" src="" class="w-40 h-40 mx-auto object-contain drop-shadow-xl">
                <p id="enemy-names" class="text-xs font-bold text-gray-600 mt-2"></p>
            </div>
            
            <div class="text-4xl font-black italic text-red-600">VS</div>

            <div class="flex-1 text-center">
                <img id="player-img" src="" class="w-40 h-40 mx-auto object-contain drop-shadow-xl">
                <p id="player-names" class="text-xs font-bold text-gray-600 mt-2"></p>
                <button onclick="SceneManager.to('bag-scene')" class="mt-2 bg-white border-2 border-slate-300 rounded-lg p-1 shadow-sm active:scale-90">
                    <span class="text-lg">🎒 背包</span>
                </button>
            </div>
        </div>

        <div class="p-6 bg-white rounded-3xl shadow-xl mb-8 text-center">
            <button id="go-battle-btn" onclick="SceneManager.to('battle-scene')" class="w-full bg-gradient-to-r from-red-500 to-orange-500 text-white py-4 rounded-2xl text-xl font-black shadow-lg">
                上吧！皮卡丘
            </button>
        </div>
    </div>

    <div id="bag-scene" class="scene hidden flex flex-col bg-white p-4">
        <div class="flex justify-between items-center mb-4 border-b pb-2">
            <h2 class="text-2xl font-black">我的寶可夢</h2>
            <button onclick="SceneManager.to('main-hub')" class="text-2xl font-bold p-2">✕</button>
        </div>
        <div id="bag-grid" class="grid grid-cols-5 gap-2 overflow-y-auto pb-20">
            </div>
    </div>

    <div id="battle-scene" class="scene hidden flex flex-col items-center justify-between p-4 bg-slate-900 text-white">
        <div class="flex bg-slate-800 rounded-full p-1 border border-white/20 mt-2">
            <button onclick="JellyBattle.setMode('addition')" id="btn-add" class="px-6 py-1 rounded-full text-sm font-bold bg-blue-500">加法</button>
            <button onclick="JellyBattle.setMode('subtraction')" id="btn-sub" class="px-6 py-1 rounded-full text-sm font-bold">減法</button>
        </div>

        <div id="math-question" class="text-5xl font-black text-yellow-400 my-4 italic">7 + 8 = ?</div>

        <div id="jelly-grid" class="grid grid-cols-10 gap-1 p-2 bg-white/5 rounded-xl border border-white/20 shadow-2xl" style="width: 340px; height: 340px;"></div>

        <div class="w-full flex justify-center gap-4 mb-8">
            <button onclick="JellyBattle.resetGame()" class="bg-gray-600 px-6 py-3 rounded-2xl font-bold">重置</button>
            <button onclick="JellyBattle.validate()" class="bg-red-600 px-10 py-3 rounded-2xl font-bold text-xl shadow-lg shadow-red-500/50">精靈球 OK!</button>
        </div>
    </div>

    <script>
        // --- Data & Initialization ---
        const db = new Dexie("PokeMathDB");
        db.version(1).stores({ pokemon: 'id, name, name_en, name_jp, sprite, count' });

        const DEFAULT_POKES = [
            {id: 25, name: "皮卡丘", name_en: "Pikachu", name_jp: "ピカチュウ", sprite: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png"},
            {id: 1, name: "妙蛙種子", name_en: "Bulbasaur", name_jp: "フシギダネ", sprite: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png"},
            {id: 4, name: "小火龍", name_en: "Charmander", name_jp: "ヒトカゲ", sprite: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png"},
            {id: 7, name: "傑尼龜", name_en: "Squirtle", name_jp: "ゼニガメ", sprite: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/7.png"},
            {id: 906, name: "新葉喵", name_en: "Sprigatito", name_jp: "ニャオハ", sprite: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/906.png"},
            {id: 909, name: "呆火鱷", name_en: "Fuecoco", name_jp: "ホゲータ", sprite: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/909.png"},
            {id: 912, name: "潤水鴨", name_en: "Quaxly", name_jp: "クワッス", sprite: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/912.png"}
        ];

        let state = {
            player: DEFAULT_POKES[0],
            enemy: DEFAULT_POKES[4],
            mode: 'addition'
        };

        // --- Scene Manager ---
        const SceneManager = {
            to(id) {
                document.querySelectorAll('.scene').forEach(s => s.classList.add('hidden'));
                document.getElementById(id).classList.remove('hidden');
                if(id === 'main-hub') this.updateHub();
                if(id === 'battle-scene') JellyBattle.resetGame();
                if(id === 'bag-scene') this.renderBag();
            },
            updateHub() {
                document.getElementById('player-img').src = state.player.sprite;
                document.getElementById('player-names').innerText = `${state.player.name}\n${state.player.name_en}`;
                document.getElementById('go-battle-btn').innerText = `上吧！ ${state.player.name}`;
                
                // Random Enemy
                state.enemy = DEFAULT_POKES[Math.floor(Math.random()*DEFAULT_POKES.length)];
                document.getElementById('enemy-img').src = state.enemy.sprite;
                document.getElementById('enemy-names').innerText = `${state.enemy.name}\n${state.enemy.name_en}`;
            },
            async renderBag() {
                const bagGrid = document.getElementById('bag-grid');
                bagGrid.innerHTML = '';
                DEFAULT_POKES.forEach(p => {
                    const div = document.createElement('div');
                    div.className = "text-center p-2 border rounded-xl active:bg-blue-100";
                    div.innerHTML = `<img src="${p.sprite}" class="w-full"> <p class="text-[10px] font-bold">${p.name}</p>`;
                    div.onclick = () => { state.player = p; this.to('main-hub'); };
                    bagGrid.appendChild(div);
                });
            }
        };

        // --- M4: Battle Logic ---
        const JellyBattle = {
            selectedCount: 0,
            targetAnswer: 0,
            
            setMode(m) {
                state.mode = m;
                document.getElementById('btn-add').className = m === 'addition' ? 'px-6 py-1 rounded-full text-sm font-bold bg-blue-500' : 'px-6 py-1 rounded-full text-sm font-bold';
                document.getElementById('btn-sub').className = m === 'subtraction' ? 'px-6 py-1 rounded-full text-sm font-bold bg-red-500' : 'px-6 py-1 rounded-full text-sm font-bold';
                this.resetGame();
            },

            resetGame() {
                this.selectedCount = 0;
                const grid = document.getElementById('jelly-grid');
                grid.innerHTML = '';
                for(let i=0; i<100; i++) {
                    const b = document.createElement('div');
                    b.className = "jelly-block w-full h-full bg-white/10 rounded-sm border border-white/5";
                    b.onclick = () => this.toggle(b);
                    grid.appendChild(b);
                }
                this.generate();
            },

            generate() {
                const q = document.getElementById('math-question');
                if(state.mode === 'addition') {
                    let a = Math.floor(Math.random()*9)+1;
                    let b = Math.floor(Math.random()*9)+1;
                    this.targetAnswer = a + b;
                    q.innerText = `${a} + ${b} = ?`;
                } else {
                    let a = Math.floor(Math.random()*10)+10;
                    let b = Math.floor(Math.random()*9)+1;
                    this.targetAnswer = a - b;
                    q.innerText = `${a} - ${b} = ?`;
                    this.prefill(a);
                }
            },

            prefill(n) {
                const blocks = document.querySelectorAll('.jelly-block');
                for(let i=0; i<n; i++) {
                    blocks[i].classList.add('is-active');
                    this.selectedCount++;
                }
                this.updateColors();
            },

            toggle(el) {
                if(el.classList.contains('is-active')) {
                    el.classList.remove('is-active');
                    this.selectedCount--;
                } else {
                    el.classList.add('is-active');
                    this.selectedCount++;
                }
                this.updateColors();
            },

            updateColors() {
                const actives = document.querySelectorAll('.jelly-block.is-active');
                const all = document.querySelectorAll('.jelly-block');
                all.forEach(b => b.style.backgroundColor = "");
                actives.forEach((b, i) => {
                    const group = Math.floor(i / 10);
                    b.style.backgroundColor = group % 2 === 0 ? "#fbbf24" : "#f97316";
                });
            },

            validate() {
                if(this.selectedCount === this.targetAnswer) {
                    alert("✨ 攻擊效果絕佳！收服成功！");
                    SceneManager.to('main-hub');
                } else {
                    alert("❌ 數量不對喔，再試試看！");
                }
            }
        };

        // --- M1: Start Animation ---
        function startIntro() {
            const container = document.getElementById('animation-container');
            let count = 0;
            const interval = setInterval(() => {
                const p = DEFAULT_POKES[count % DEFAULT_POKES.length];
                const img = document.createElement('img');
                img.src = p.sprite;
                img.className = 'poke-zoom';
                container.appendChild(img);
                count++;
                if(count > 10) clearInterval(interval);
            }, 400);
        }

        window.onload = () => {
            startIntro();
            SceneManager.updateHub();
        };
    </script>
</body>
</html>
