<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mezastar Pure Impact - v13.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fascinate+Inline&family=Rubik+Mono+One&display=swap');
        
        .impact-font { font-family: 'Rubik Mono One', sans-serif; }
        
        /* 震憾文字動畫 */
        .text-burst {
            animation: burst 0.6s cubic-bezier(0.15, 0.85, 0.35, 1.2) forwards;
            filter: drop-shadow(0 0 10px currentColor);
        }
        @keyframes burst {
            0% { transform: scale(0.2) translateY(50px); opacity: 0; letter-spacing: -10px; }
            50% { transform: scale(1.3) translateY(-10px); opacity: 1; letter-spacing: 5px; }
            100% { transform: scale(1) translateY(0); opacity: 1; letter-spacing: 2px; }
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center p-6 overflow-hidden">

    <div id="overlay" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center">
        <button id="btn-ready" class="bg-blue-600 px-16 py-8 rounded-full font-black text-2xl shadow-[0_0_40px_rgba(37,99,235,0.6)] active:scale-95 transition-all">
            BATTLE READY
        </button>
    </div>

    <div class="text-center w-full max-w-sm">
        <div id="status-display" class="h-32 flex items-center justify-center"></div>

        <div class="bg-slate-900 border-4 border-blue-500 rounded-[3rem] p-10 shadow-2xl relative">
            <div id="combo-tag" class="absolute -top-6 -left-4 bg-red-600 px-4 py-1 rounded italic font-bold text-sm">COMBO x0</div>
            
            <p class="text-7xl font-black italic mb-10 text-blue-400 tracking-tighter">8 × 9</p>
            
            <div class="grid grid-cols-1 gap-4">
                <button onclick="triggerImpact('EXCELLENT')" class="bg-gradient-to-r from-yellow-400 to-orange-600 py-6 rounded-2xl font-black italic text-2xl shadow-lg active:translate-y-1">EXCELLENT HIT!</button>
                <button onclick="triggerImpact('GREAT')" class="bg-gradient-to-r from-blue-400 to-blue-600 py-4 rounded-xl font-bold italic text-lg opacity-80">GREAT HIT</button>
            </div>
        </div>
    </div>

    <script>
        // 核心音效庫：使用更具物理衝擊感的音源
        const sfx = {
            bgm: new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3'),
            good: new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3'),
            great: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
            excellent: new Audio('https://assets.mixkit.co/active_storage/sfx/2577/2577-preview.mp3') // 最重的金屬重擊
        };

        let combo = 0;

        document.getElementById('btn-ready').onclick = () => {
            sfx.bgm.loop = true; sfx.bgm.volume = 0.15; sfx.bgm.play();
            document.getElementById('overlay').style.display = 'none';
        };

        function triggerImpact(type) {
            // 1. 根據等級選擇音效
            const targetSfx = sfx[type.toLowerCase()];
            targetSfx.currentTime = 0;
            targetSfx.volume = type === 'EXCELLENT' ? 0.9 : 0.5;
            targetSfx.play();

            // 2. 更新 Combo
            combo++;
            document.getElementById('combo-tag').innerText = `COMBO x${combo}`;

            // 3. 視覺文字爆發
            const display = document.getElementById('status-display');
            const color = type === 'EXCELLENT' ? 'text-yellow-400' : 'text-blue-300';
            display.innerHTML = `<h2 class="text-burst impact-font text-5xl ${color}">${type}</h2>`;
            
            // 震動回饋 (簡單模擬)
            if(type === 'EXCELLENT') {
                document.body.classList.add('bg-red-900');
                setTimeout(() => document.body.classList.remove('bg-red-900'), 100);
            }

            setTimeout(() => { display.innerHTML = ""; }, 800);
        }
    </script>
</body>
</html>
