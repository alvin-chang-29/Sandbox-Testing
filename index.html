<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Q彈方塊測試 - v9.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 核心Ｑ彈動畫 */
        .block-unit {
            width: 50px; height: 50px;
            margin: 4px; border-radius: 8px;
            transform: scale(0);
            /* 模擬彈簧效果的貝茲曲線 */
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 
                inset -4px -4px 0px rgba(0,0,0,0.2), 
                0 4px 6px rgba(0,0,0,0.3);
        }
        .block-show { transform: scale(1); }
        
        /* 顏色定義 */
        .bg-yellow-block { background-color: #facc15; border: 2px solid #ca8a04; }
        .bg-green-block { background-color: #22c55e; border: 2px solid #166534; }
    </style>
</head>
<body class="bg-slate-950 text-white flex flex-col items-center justify-center min-h-screen p-4">

    <div class="text-center mb-10">
        <h1 class="text-2xl font-bold text-blue-400 mb-2">方塊堆疊觸感測試</h1>
        <p class="text-slate-500 italic text-sm">點擊下方按鈕，感受 3 × 4 的彈跳節奏</p>
    </div>

    <div id="container" class="bg-slate-900 p-8 rounded-[2rem] border-2 border-slate-800 flex flex-wrap max-w-sm justify-start content-start min-h-[300px]">
        </div>

    <div class="mt-10 flex gap-4">
        <button onclick="popBlocks('yellow', 3)" class="bg-yellow-500 text-black px-6 py-3 rounded-xl font-black shadow-lg active:scale-95 transition">
            噴發黃色方塊 (被乘數)
        </button>
        <button onclick="popBlocks('green', 9)" class="bg-green-500 text-white px-6 py-3 rounded-xl font-black shadow-lg active:scale-95 transition">
            補齊綠色方塊 (乘數)
        </button>
    </div>

    <script>
        function popBlocks(color, count) {
            const container = document.getElementById('container');
            const colorClass = color === 'yellow' ? 'bg-yellow-block' : 'bg-green-block';
            
            for (let i = 0; i < count; i++) {
                // 延遲生成，製造節奏感
                setTimeout(() => {
                    const b = document.createElement('div');
                    b.className = `block-unit ${colorClass}`;
                    container.appendChild(b);
                    
                    // 強制瀏覽器重繪後啟動動畫
                    requestAnimationFrame(() => {
                        b.classList.add('block-show');
                    });
                }, i * 80); // 每個方塊間隔 80ms 噴發
            }
        }
    </script>
</body>
</html>
