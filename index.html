<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone 音效終極修正 - v10.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .block-unit { width: 50px; height: 50px; margin: 4px; border-radius: 8px; transform: scale(0); transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); background: #facc15; }
        .block-show { transform: scale(1); }
        #overlay { position: fixed; inset: 0; background: #020617; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center">

    <div id="overlay">
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-black text-yellow-500 mb-2">第一代音效啟動器</h1>
            <p class="text-slate-500 text-sm">請確認 iPhone 左側靜音開關已關閉</p>
        </div>
        <button id="unlock-btn" class="bg-white text-black px-12 py-5 rounded-full font-black text-xl shadow-2xl active:scale-90 transition-all">
            點我開啟聲音 (Tap to Start)
        </button>
    </div>

    <div id="container" class="bg-slate-900 p-8 rounded-[2rem] flex flex-wrap max-w-sm min-h-[200px]"></div>
    
    <button onclick="playPop(1)" class="mt-10 bg-blue-600 px-10 py-4 rounded-xl font-bold">測試方塊聲</button>

    <script>
        // 1. 定義音效清單
        const AUDIO_URLS = {
            pop: 'https://actions.google.com/google_assistant/sounds/library/cartoon/pop_01.mp3', // 換一個極短且穩定的來源
            bgm: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' // 測試用 BGM
        };

        const cache = {};
        let isUnlocked = false;

        // 2. 預載
        Object.keys(AUDIO_URLS).forEach(key => {
            cache[key] = new Audio(AUDIO_URLS[key]);
            cache[key].load();
        });

        // 3. iPhone 解鎖核心邏輯
        const unlockBtn = document.getElementById('unlock-btn');
        
        // 同時監聽 click 和 touchstart 以確保 iOS 響應
        ['click', 'touchstart'].forEach(evt => {
            unlockBtn.addEventListener(evt, function() {
                if (isUnlocked) return;

                // 播放並立即暫停所有音效 (這能解鎖 iOS 限制)
                Object.values(cache).forEach(audio => {
                    audio.play().then(() => {
                        audio.pause();
                        audio.currentTime = 0;
                    }).catch(e => console.log("Unlock failed", e));
                });

                // 播放背景音樂
                cache.bgm.loop = true;
                cache.bgm.volume = 0.2;
                cache.bgm.play();

                isUnlocked = true;
                document.getElementById('overlay').style.display = 'none';
                console.log("Audio Unlocked!");
            }, { passive: false });
        });

        function playPop(count) {
            const container = document.getElementById('container');
            const b = document.createElement('div');
            b.className = 'block-unit';
            container.appendChild(b);
            
            // iPhone 播放複本
            const s = cache.pop.cloneNode();
            s.volume = 0.5;
            s.play();
            
            setTimeout(() => b.classList.add('block-show'), 50);
        }
    </script>
</body>
</html>
