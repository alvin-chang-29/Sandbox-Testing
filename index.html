<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢地平線：英勇淺蔥號閱讀大冒險</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; touch-action: manipulation; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
        .bg-sky { background: linear-gradient(to bottom, #7dd3fc, #e0f2fe); }
        .terastal-active { animation: glow 1.5s infinite; border-color: #a7f3d0 !important; }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 5px #34d399; } 50% { box-shadow: 0 0 20px #34d399; } }
        .btn-pop:active { transform: scale(0.9); }
        .stage-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-sky min-h-screen flex flex-col items-center">

    <div id="home-screen" class="w-full max-w-md h-screen flex flex-col p-6 text-center">
        <div class="mt-8 mb-4 bg-white/90 rounded-3xl p-6 shadow-xl border-2 border-blue-200">
            <h1 class="text-2xl font-black text-blue-900">英勇淺蔥號 冒險地圖</h1>
            <p class="text-blue-700 font-bold mt-1">點擊艙房，開始特訓！</p>
        </div>

        <div class="grid grid-cols-1 gap-4 mt-4 overflow-y-auto pb-32">
            <button onclick="startStage('deck')" class="stage-card bg-yellow-400 border-4 border-white p-4 rounded-3xl shadow-lg flex items-center">
                <div class="w-24 h-24 bg-white/50 rounded-2xl mr-4 p-2 flex items-center justify-center">
                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJAAAACQCAMAAADU1vEAAAAAdVBMVEUAAAD///8/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f3/LpM4pAAAAAnRSTlMAAQGU/N0AAAAJcEhZcwAADsMAAA7DAcdvqGQAAAAXSURBVHja7cEBDAAAAMIg+69eA61XAAAAAAY4DQIAAbYAm5wAAAAASUVORK5CYII=" class="w-full h-full object-contain" alt="Pikachu"> </div>
                <div class="text-left">
                    <span class="text-xl font-bold block text-yellow-900">🚢 甲板特訓</span>
                    <span class="text-sm text-yellow-800">設施與動作指令</span>
                </div>
            </button>

            <button onclick="startStage('kitchen')" class="stage-card bg-orange-400 border-4 border-white p-4 rounded-3xl shadow-lg flex items-center">
                <div class="w-24 h-24 bg-white/50 rounded-2xl mr-4 p-2 flex items-center justify-center">
                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJAAAACQCAMAAADU1vEAAAAAdVBMVEUAAAD///8/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f3/LpM4pAAAAAnRSTlMAAQGU/N0AAAAJcEhZcwAADsMAAA7DAcdvqGQAAAAXSURBVHja7cEBDAAAAMIg+69eA61XAAAAAAY4DQIAAbYAm5wAAAAASUVORK5CYII=" class="w-full h-full object-contain" alt="Fuecoco"> </div>
                <div class="text-left">
                    <span class="text-xl font-bold block text-orange-900">🍳 美味廚房</span>
                    <span class="text-sm text-orange-800">辨識 Short Vowels</span>
                </div>
            </button>

            <button onclick="startStage('warehouse')" class="stage-card bg-blue-500 border-4 border-white p-4 rounded-3xl shadow-lg flex items-center text-white">
                <div class="w-24 h-24 bg-white/50 rounded-2xl mr-4 p-2 flex items-center justify-center">
                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJAAAACQCAMAAADU1vEAAAAAdVBMVEUAAAD///8/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f3/LpM4pAAAAAnRSTlMAAQGU/N0AAAAJcEhZcwAADsMAAA7DAcdvqGQAAAAXSURBVHja7cEBDAAAAMIg+69eA61XAAAAAAY4DQIAAbYAm5wAAAAASUVORK5CYII=" class="w-full h-full object-contain" alt="Tinkaton"> </div>
                <div class="text-left">
                    <span class="text-xl font-bold block">🔧 秘密倉庫</span>
                    <span class="text-sm opacity-90">Ending Sounds 修理</span>
                </div>
            </button>
        </div>

        <div class="fixed bottom-6 left-0 right-0 px-6 max-w-md mx-auto">
            <div class="bg-white/95 rounded-2xl p-4 shadow-2xl border-2 border-green-200">
                <div class="flex justify-between items-center mb-1">
                    <span class="font-black text-green-700 text-sm">太晶化進度 (收集海地鼠)</span>
                    <span id="energy-text" class="text-lg font-black text-green-600">0%</span>
                </div>
                <div class="w-full bg-gray-200 h-5 rounded-full overflow-hidden">
                    <div id="energy-bar" class="bg-green-400 h-full transition-all duration-700" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="game-screen" class="hidden fixed inset-0 bg-white z-50 flex flex-col">
        <header class="p-4 flex justify-between items-center bg-blue-50 border-b">
            <button onclick="goHome()" class="text-blue-600 font-bold bg-white px-4 py-2 rounded-full shadow-sm btn-pop">← 返回</button>
            <div id="stage-title" class="font-black text-blue-900 text-lg"></div>
            <div id="crystal-icon" class="w-10 h-10 flex items-center justify-center">💎</div>
        </header>

        <main class="flex-grow flex flex-col p-6 items-center justify-between overflow-y-auto pb-10">
            <div class="text-center w-full">
                <p class="text-sm font-bold text-gray-400 mb-2 tracking-widest uppercase">READ ALOUD</p>
                <div id="question-text" class="text-6xl font-black text-blue-600 mb-4 drop-shadow-sm uppercase tracking-tighter"></div>
                <div id="sentence-hint" class="text-xl text-gray-600 font-medium px-4 leading-snug"></div>
            </div>

            <div id="options-grid" class="grid grid-cols-2 gap-4 w-full max-w-md my-8"></div>

            <div class="w-full bg-blue-50 rounded-3xl p-4 flex items-center border-2 border-blue-100 shadow-inner mt-auto">
                <div class="w-24 h-24 bg-white rounded-2xl shadow-sm flex items-center justify-center p-2 mr-4 border border-blue-100">
                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJAAAACQCAMAAADU1vEAAAAAdVBMVEUAAAD///8/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f38/Pz9fX18/Pz9/f3/LpM4pAAAAAnRSTlMAAQGU/N0AAAAJcEhZcwAADsMAAA7DAcdvqGQAAAAXSURBVHja7cEBDAAAAMIg+69eA61XAAAAAAY4DQIAAbYAm5wAAAAASUVORK5CYII=" class="w-full h-full object-contain" alt="Liko"> </div>
                <div class="flex-grow text-left">
                    <p class="text-xs font-black text-blue-400">莉可 Liko</p>
                    <p class="text-blue-900 font-bold leading-tight" id="pkmn-msg">點擊單字來練習讀音！</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 遊戲數據數據 (擴充 2x 單字量)
        const stageData = {
            deck: {
                title: "甲板特訓",
                words: [
                    { w: "swings", s: "We play on the swings." },
                    { w: "slide", s: "Go down the slide!" },
                    { w: "seesaw", s: "Fuecoco is on the seesaw." },
                    { w: "monkey bars", s: "Climb the monkey bars!" },
                    { w: "kick", s: "Kick the ball!" },
                    { w: "climb", s: "Climb up the ladder." },
                    { w: "crawl", s: "Crawl through the tube." },
                    { w: "stop", s: "Stop! Be careful." }
                ]
            },
            kitchen: {
                title: "美味廚房",
                words: [
                    { w: "ham", s: "Fuecoco likes ham." },
                    { w: "jam", s: "Put jam on the bread." },
                    { w: "egg", s: "Murdock needs an egg." },
                    { w: "cup", s: "Drink from the blue cup." },
                    { w: "pan", s: "Cook in the hot pan." },
                    { w: "mix", s: "Mix the yam in the pot." },
                    { w: "hot", s: "Watch out! It is hot." },
                    { w: "red", s: "The red apple is good." }
                ]
            },
            warehouse: {
                title: "秘密倉庫",
                words: [
                    { w: "desk", s: "Put tools on the desk." },
                    { w: "fork", s: "Tinkaton needs a fork." },
                    { w: "log", s: "Is the frog on the log?" },
                    { w: "web", s: "A spider is on the web." },
                    { w: "box", s: "Look in the box!" },
                    { w: "rock", s: "The rock is very big." },
                    { w: "bug", s: "Don't touch the bug." },
                    { w: "shed", s: "Go to the tool shed." }
                ]
            }
        };

        let energy = 0;
        let currentKey = '';

        function startStage(key) {
            currentKey = key;
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('stage-title').innerText = stageData[key].title;
            nextQuestion();
        }

        function nextQuestion() {
            const data = stageData[currentKey];
            const target = data.words[Math.floor(Math.random() * data.words.length)];
            
            document.getElementById('question-text').innerText = target.w;
            document.getElementById('sentence-hint').innerText = target.s;
            document.getElementById('pkmn-msg').innerText = "找到正確的單字盾牌！";

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';

            // 生成隨機選項 (A/B 對比訓練)
            let choices = [target.w];
            while(choices.length < 4) {
                let randomW = data.words[Math.floor(Math.random() * data.words.length)].w;
                if(!choices.includes(randomW)) choices.push(randomW);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(c => {
                const btn = document.createElement('button');
                btn.className = "bg-white border-4 border-blue-100 p-6 rounded-3xl text-2xl font-black text-blue-800 shadow-md btn-pop active:border-blue-400 active:bg-blue-50";
                btn.innerText = c;
                btn.onclick = () => checkAnswer(c, target.w);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(ans, correct) {
            if(ans === correct) {
                energy = Math.min(energy + 10, 100);
                updateUI();
                document.getElementById('pkmn-msg').innerText = "太棒了！我們走吧！Pika!";
                
                if(energy === 100) {
                    document.getElementById('energy-bar').classList.add('terastal-active');
                    document.getElementById('pkmn-msg').innerText = "能量滿點！解鎖太晶收集卡！";
                }
                
                setTimeout(nextQuestion, 1200);
            } else {
                document.getElementById('pkmn-msg').innerText = "嗯... 再找找看？";
            }
        }

        function updateUI() {
            document.getElementById('energy-bar').style.width = energy + '%';
            document.getElementById('energy-text').innerText = energy + '%';
        }

        function goHome() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
        }

        // 註冊 Service Worker 實現離線遊玩
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log(err));
            });
        }
    </script>
</body>
</html>
