<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Audio API 終極測試 - v10.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center justify-center min-h-screen p-6">

    <div id="unlock-screen" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center">
        <h1 class="text-3xl font-bold text-yellow-500 mb-6">音訊硬體啟動器</h1>
        <p class="text-slate-400 mb-8 text-center text-sm">此按鈕將透過 Web Audio API<br>直接啟動 iPhone 音訊通道</p>
        <button id="master-unlock" class="bg-white text-black px-16 py-6 rounded-full font-black text-2xl shadow-2xl active:bg-yellow-400">
            啟動音效
        </button>
    </div>

    <div class="text-center">
        <div class="mb-10 p-6 bg-slate-800 rounded-3xl border border-slate-700">
            <p id="audio-status" class="text-red-500 font-bold">狀態：尚未啟動</p>
        </div>
        <button onclick="playBip()" class="bg-blue-600 px-12 py-6 rounded-2xl font-bold text-2xl active:scale-90 transition">
            播放測試音
        </button>
    </div>

    <script>
        let audioCtx = null;

        // 啟動函數
        document.getElementById('master-unlock').addEventListener('click', function() {
            // 1. 初始化 AudioContext
            window.AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();

            // 2. 建立一個無聲的緩衝區並播放，這能解鎖 iOS 的硬體限制
            const buffer = audioCtx.createBuffer(1, 1, 22050);
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            source.start(0);

            // 3. 檢查狀態是否變為 'running'
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            document.getElementById('audio-status').innerText = "狀態：音訊硬體已啟動！";
            document.getElementById('audio-status').className = "text-green-500 font-bold";
            document.getElementById('unlock-screen').style.display = 'none';
        });

        // 使用震盪器產生 8-bit 風格的嗶聲 (不需要任何外部檔案)
        function playBip() {
            if (!audioCtx) return;
            
            // 確保環境是運行中的
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'square'; // 8-bit 方波感
            oscillator.frequency.setValueAtTime(440, audioCtx.currentTime); // A4 音
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }
    </script>
</body>
</html>
