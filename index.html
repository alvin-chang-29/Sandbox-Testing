<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>櫻木博士的珠算教室 v9.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #020617; margin: 0; overflow: hidden; }

        /* 強制左右固定比例：左 45% 右 55% */
        .game-container { display: flex; width: 100vw; height: 100vh; flex-direction: row !important; }

        /* 左側：櫻木博士區 */
        .left-side { flex: 0 0 45%; background: #1e3a8a; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 20px; border-right: 8px solid #fbbf24; }
        .prof-img { width: 95%; max-height: 75vh; object-fit: contain; }
        
        /* RPG 對話框 */
        .dialog { width: 90%; background: white; color: #1e293b; border: 6px solid #3b82f6; border-radius: 20px; padding: 20px; font-size: 1.2rem; font-weight: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* 右側：算盤區 */
        .right-side { flex: 0 0 55%; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* 算盤實體 */
        .abacus { background: #451a03; border: 12px solid #78350f; border-radius: 40px; width: 340px; height: 460px; position: relative; }
        .beam { position: absolute; top: 120px; width: 100%; height: 16px; background: #270e02; z-index: 50; }
        .rod { position: absolute; width: 8px; height: 100%; background: #1e293b; left: 50%; transform: translateX(-50%); }

        /* 珠子樣式 */
        .bead { width: 70px; height: 38px; border-radius: 40%; border: 1px solid rgba(0,0,0,0.5); transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 60; cursor: pointer; }
        .top { background: #fb923c; box-shadow: 0 4px #9a3412; }
        .btm { background: #fde047; box-shadow: 0 4px #ca8a04; }

        /* ✨ 虛線閃爍提示特效 */
        @keyframes flash-guide {
            0%, 100% { outline: 0px solid white; transform: scale(1); filter: brightness(1); }
            50% { outline: 6px dashed #ffffff; transform: scale(1.15); filter: brightness(1.5); outline-offset: 4px; }
        }
        .guide { animation: flash-guide 0.8s infinite !important; z-index: 100 !important; border: 2px solid white !important; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="left-side">
            <img src="https://tw.portal-pokemon.com/play/resources/pokedex/img/pm/00880092c4e207b1277a06d09bc177656608992e.png" class="prof-img">
            <div class="dialog">
                <p id="msg">哈囉！我是櫻木博士。珠算能鍛鍊你的大腦，我們來試試 7 + 8 的進位教學吧！</p>
                <button onclick="Tuto.next()" class="mt-4 float-right bg-blue-600 text-white px-6 py-2 rounded-full text-sm font-black">下一步 ❯</button>
            </div>
        </div>

        <div class="right-side">
            <div class="abacus flex justify-around px-6">
                <div class="beam"></div>
                <div class="relative w-20 h-full flex flex-col pt-4">
                    <div class="rod"></div>
                    <div id="t-up" class="bead top mx-auto"></div>
                    <div class="mt-[135px] flex flex-col gap-2">
                        <div id="t-d1" class="bead btm mx-auto"></div>
                        <div id="t-d2" class="bead btm mx-auto"></div>
                        <div id="t-d3" class="bead btm mx-auto"></div>
                        <div id="t-d4" class="bead btm mx-auto"></div>
                    </div>
                </div>
                <div class="relative w-20 h-full flex flex-col pt-4">
                    <div class="rod"></div>
                    <div id="o-up" class="bead top mx-auto"></div>
                    <div class="mt-[135px] flex flex-col gap-2">
                        <div id="o-d1" class="bead btm mx-auto"></div>
                        <div id="o-d2" class="bead btm mx-auto"></div>
                        <div id="o-d3" class="bead btm mx-auto"></div>
                        <div id="o-d4" class="bead btm mx-auto"></div>
                    </div>
                </div>
            </div>
            
            <div class="mt-8 flex gap-20">
                <div class="text-center"><p class="text-slate-500 text-xs">十位</p><p id="val-t" class="text-5xl font-black text-white">0</p></div>
                <div class="text-center"><p class="text-yellow-500 text-xs">個位</p><p id="val-o" class="text-5xl font-black text-yellow-400">0</p></div>
            </div>
        </div>
    </div>

    <script>
        const Tuto = {
            step: 0,
            pos: { t:{u:0, d:0}, o:{u:0, d:0} },
            steps: [
                { txt: "第一步：在個位撥出 7。也就是一顆上珠(5)和兩顆下珠(2)！", run: () => { 
                    this.hint('o-up', 'o-d1', 'o-d2');
                    this.move('o', 5, 2); 
                }},
                { txt: "現在要加 8，個位不夠了！口訣是：『加 8 等於進 10 減 2』。", run: () => this.hint() },
                { txt: "注意看左邊！我們先在十位撥上一顆下珠，這就是『進 10』！", run: () => { 
                    this.hint('t-d1');
                    this.move('t', 0, 1); 
                }},
                { txt: "最後，把個位剛才的兩顆珠子『撥開』，這就是『減 2』。", run: () => { 
                    this.hint('o-d1', 'o-d2');
                    this.move('o', 5, 0); 
                }},
                { txt: "太棒了！算盤顯示 15。你已經學會最難的進位了！", run: () => this.hint() }
            ],
            move(c, u, d) { this.pos[c] = {u, d}; this.sync(); },
            sync() {
                ['t', 'o'].forEach(c => {
                    document.getElementById(`${c}-up`).style.transform = this.pos[c].u === 5 ? "translateY(65px)" : "translateY(0)";
                    for(let i=1; i<=4; i++) {
                        document.getElementById(`${c}-d${i}`).style.transform = i <= this.pos[c].d ? "translateY(-65px)" : "translateY(0)";
                    }
                });
                document.getElementById('val-t').innerText = (this.pos.t.u + this.pos.t.d) * 10;
                document.getElementById('val-o').innerText = this.pos.o.u + this.pos.o.dn || (this.pos.o.u + this.pos.o.d);
            },
            hint(...ids) {
                document.querySelectorAll('.guide').forEach(el => el.classList.remove('guide'));
                ids.forEach(id => document.getElementById(id).classList.add('guide'));
            },
            next() {
                if(this.step < this.steps.length) {
                    const s = this.steps[this.step];
                    document.getElementById('msg').innerText = s.txt;
                    s.run();
                    this.step++;
                } else {
                    alert("講座結束！你真有天分！");
                    location.reload();
                }
            }
        };
        window.onload = () => Tuto.sync();
    </script>
</body>
</html>
