<div id="tutorial-scene" class="scene hidden flex flex-col items-center p-6 bg-slate-900 text-white overflow-y-auto">
    <div class="w-full flex justify-between items-center mb-4">
        <h2 class="text-2xl font-black text-yellow-400 italic">算盤大師教室</h2>
        <button onclick="SceneManager.to('battle-scene')" class="text-xl">✕</button>
    </div>

    <div id="tutorial-card" class="w-full bg-slate-800 rounded-3xl p-6 border-2 border-indigo-500 shadow-2xl mb-6 min-h-[300px] flex flex-col justify-center items-center text-center">
        <div id="tutorial-icon" class="text-6xl mb-4">🧮</div>
        <h3 id="tutorial-title" class="text-xl font-bold mb-2 text-indigo-300">歡迎來到算盤世界</h3>
        <p id="tutorial-desc" class="text-slate-300 leading-relaxed">算盤是古代的超級電腦！讓我們一起學習怎麼使用它吧。</p>
    </div>

    <div id="tuto-abacus" class="abacus-frame relative w-64 h-80 rounded-2xl overflow-hidden flex justify-center px-4 mb-6 pointer-events-none opacity-50">
        <div class="abacus-bar"></div>
        <div class="relative w-20 h-full flex flex-col justify-between py-4">
            <div class="rod"></div>
            <div id="tuto-top" class="bead bead-top mx-auto"></div>
            <div class="flex flex-col-reverse gap-1 mb-2">
                <div id="tuto-b4" class="bead bead-bottom mx-auto"></div>
                <div id="tuto-b3" class="bead bead-bottom mx-auto"></div>
                <div id="tuto-b2" class="bead bead-bottom mx-auto"></div>
                <div id="tuto-b1" class="bead bead-bottom mx-auto"></div>
            </div>
        </div>
    </div>

    <div class="flex gap-4 w-full">
        <button id="tuto-prev" onclick="AbacusTutorial.prev()" class="flex-1 bg-slate-700 py-4 rounded-2xl font-bold opacity-50">上一步</button>
        <button id="tuto-next" onclick="AbacusTutorial.next()" class="flex-2 bg-indigo-600 py-4 rounded-2xl font-black text-xl px-8 shadow-lg shadow-indigo-900/40">下一步</button>
    </div>
</div>

<script>
// --- Abacus Tutorial Logic ---
const AbacusTutorial = {
    step: 0,
    steps: [
        {
            title: "認識算盤結構",
            desc: "中間橫的那條叫「樑」。靠近樑的珠子才算分數喔！",
            icon: "🏗️",
            action: () => { document.getElementById('tuto-abacus').style.opacity = "1"; }
        },
        {
            title: "下珠：每一顆是 1",
            desc: "下面的珠子，撥上去一顆就是 1，兩顆就是 2。",
            icon: "➊",
            action: () => { 
                this.resetBeads();
                document.getElementById('tuto-b1').style.transform = "translateY(-55px)";
                document.getElementById('tuto-b1').classList.add('bead-active');
            }
        },
        {
            title: "上珠：這一顆是 5",
            desc: "上面的珠子比較特別，撥下來一顆就代表 5 喔！",
            icon: "➎",
            action: () => { 
                this.resetBeads();
                document.getElementById('tuto-top').style.transform = "translateY(55px)";
                document.getElementById('tuto-top').classList.add('bead-active');
            }
        },
        {
            title: "個位與十位",
            desc: "右邊這排是「個位」，左邊那排是「十位」。就像數字 15 是由 10 和 5 組成的。",
            icon: "🔢",
            action: () => { this.resetBeads(); }
        },
        {
            title: "挑戰開始！",
            desc: "現在你已經知道基本規則了，去打敗對手並收服寶可夢吧！",
            icon: "🚀",
            action: () => { }
        }
    ],

    render() {
        const s = this.steps[this.step];
        document.getElementById('tutorial-title').innerText = s.title;
        document.getElementById('tutorial-desc').innerText = s.desc;
        document.getElementById('tutorial-icon').innerText = s.icon;
        s.action();

        document.getElementById('tuto-prev').style.opacity = this.step === 0 ? "0.5" : "1";
        document.getElementById('tuto-next').innerText = this.step === this.steps.length - 1 ? "完成教學" : "下一步";
    },

    next() {
        if (this.step < this.steps.length - 1) {
            this.step++;
            this.render();
        } else {
            SceneManager.to('battle-scene');
        }
    },

    prev() {
        if (this.step > 0) {
            this.step--;
            this.render();
        }
    },

    resetBeads() {
        document.getElementById('tuto-top').style.transform = "translateY(0)";
        document.getElementById('tuto-top').classList.remove('bead-active');
        [1,2,3,4].forEach(i => {
            const b = document.getElementById(`tuto-b${i}`);
            b.style.transform = "translateY(0)";
            b.classList.remove('bead-active');
        });
    }
};
</script>
