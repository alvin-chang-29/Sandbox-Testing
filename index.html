<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-bit Battle BGM Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pixel-border { border: 4px solid white; box-shadow: 8px 8px 0px #334155; }
        .bg-gb { background-color: #8bac0f; } /* 經典 GameBoy 綠 */
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-6">

    <div id="setup" class="fixed inset-0 bg-black z-50 flex items-center justify-center">
        <button id="start-bgm" class="bg-red-600 px-12 py-6 rounded-full font-black text-2xl animate-pulse">
            ⚔️ 進入戰鬥！
        </button>
    </div>

    <div class="pixel-border bg-gb p-8 w-full max-w-sm text-slate-900 font-mono">
        <h2 class="text-2xl font-black mb-4 underline">BATTLE MODE</h2>
        <div class="space-y-4">
            <p>Music: 8-bit Synth</p>
            <p>Status: <span id="music-status" class="font-bold">PLAYING...</span></p>
            <div class="flex gap-2">
                <div class="w-4 h-8 bg-slate-800 animate-bounce" style="animation-delay: 0.1s"></div>
                <div class="w-4 h-12 bg-slate-800 animate-bounce" style="animation-delay: 0.2s"></div>
                <div class="w-4 h-6 bg-slate-800 animate-bounce" style="animation-delay: 0.3s"></div>
            </div>
        </div>
        <button onclick="toggleMusic()" class="mt-8 bg-slate-800 text-white px-4 py-2 text-sm">STOP / PLAY</button>
    </div>

    <script>
        let audioCtx = null;
        let isPlaying = false;
        let nextNoteTime = 0;
        let timerID = null;
        const lookAhead = 25.0; // 檢查頻率 (ms)
        const scheduleAheadTime = 0.1; // 預約時間 (s)

        // 樂譜定義 (頻率)
        const bassLine = [110, 110, 123, 110, 146, 110, 123, 138]; // 低音軌 A2, B2, D3...
        const leadLine = [440, 0, 440, 0, 554, 554, 0, 659];      // 主旋律 A4, C#5, E5
        let currentStep = 0;
        const tempo = 140; // BPM
        const stepDuration = 60.0 / tempo / 2; // 八分音符長度

        function initAudio() {
            window.AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            nextNoteTime = audioCtx.currentTime;
            isPlaying = true;
            scheduler();
        }

        function scheduleNote(step, time) {
            // 軌道 1: Bass (Triangle Wave 較溫和)
            playOsc(bassLine[step % 8], 'triangle', time, stepDuration, 0.15);
            
            // 軌道 2: Lead (Square Wave 尖銳感)
            if (leadLine[step % 8] !== 0) {
                playOsc(leadLine[step % 8], 'square', time, stepDuration * 0.8, 0.05);
            }
        }

        function playOsc(freq, type, startTime, duration, vol) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, startTime);
            gain.gain.setValueAtTime(vol, startTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
                scheduleNote(currentStep, nextNoteTime);
                nextNoteTime += stepDuration;
                currentStep++;
            }
            timerID = setTimeout(scheduler, lookAhead);
        }

        function toggleMusic() {
            if (isPlaying) {
                clearTimeout(timerID);
                isPlaying = false;
                document.getElementById('music-status').innerText = "PAUSED";
            } else {
                nextNoteTime = audioCtx.currentTime;
                isPlaying = true;
                scheduler();
                document.getElementById('music-status').innerText = "PLAYING...";
            }
        }

        document.getElementById('start-bgm').onclick = () => {
            initAudio();
            document.getElementById('setup').style.display = 'none';
        };
    </script>
</body>
</html>
