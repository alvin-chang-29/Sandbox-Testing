<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mezastar Math - Ultimate Assembly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { font-family: 'Orbitron', sans-serif; background: #020617; color: white; overflow: hidden; }
        
        .mezastar-ui { background: rgba(15, 23, 42, 0.9); border: 2px solid #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .tab-btn { transition: all 0.3s; border-bottom: 3px solid transparent; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
        
        /* Ｑ彈方塊 [Content Lab] */
        .block-unit {
            width: 35px; height: 35px; margin: 2px; border-radius: 6px;
            background: linear-gradient(135deg, #fbbf24, #d97706);
            transform: scale(0); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .block-show { transform: scale(1); }

        /* 進化光芒 [Engine Lab] */
        #evo-light {
            position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 1000;
        }
        .evo-flash-anim { animation: flash 3s forwards; }
        @keyframes flash { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="evo-light"></div>

    <div class="flex flex-col h-screen max-w-md mx-auto relative">
        
        <nav class="flex justify-around p-4 bg-slate-900 border-b border-slate-800 z-50">
            <button onclick="switchTab('battle')" id="nav-battle" class="tab-btn tab-active font-black italic">BATTLE</button>
            <button onclick="switchTab('bag')" id="nav-bag" class="tab-btn font-black italic">BAG</button>
            <button onclick="switchTab('data')" id="nav-data" class="tab-btn font-black italic">DATA</button>
        </nav>

        <main class="flex-grow overflow-y-auto p-4 relative">
            
            <section id="tab-battle" class="space-y-4">
                <div class="mezastar-ui rounded-[2rem] p-6 relative">
                    <div id="combat-fx" class="absolute inset-0 flex items-center justify-center pointer-events-none z-50"></div>
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-16 h-16 bg-slate-800 rounded-xl p-1">
                                <img id="active-poke-img" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png" class="w-full h-full object-contain">
                            </div>
                            <h2 id="active-poke-name" class="font-black italic text-blue-400">小火龍</h2>
                        </div>
                        <div class="text-right">
                            <div class="text-[10px] text-slate-500 uppercase">EXP Gauge</div>
                            <div class="w-24 bg-slate-800 h-2 rounded-full overflow-hidden mt-1">
                                <div id="exp-bar" class="bg-blue-500 h-full transition-all duration-500" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>

                    <div id="block-stage" class="min-h-[160px] bg-black/40 rounded-3xl p-4 flex flex-wrap justify-center content-start"></div>
                </div>

                <div class="mezastar-ui rounded-3xl p-6 space-y-4">
                    <div class="flex justify-between items-center bg-black/50 p-4 rounded-2xl border border-blue-900">
                        <span id="formula" class="text-3xl font-black italic text-white">4 × 3 = ?</span>
                        <input id="ans-input" type="number" pattern="\d*" class="w-24 bg-transparent border-b-2 border-blue-500 text-3xl text-center focus:outline-none">
                    </div>
                    <button onclick="processAttack()" class="w-full bg-blue-600 py-6 rounded-2xl font-black italic text-2xl shadow-lg active:scale-95 transition">ATTACK!</button>
                </div>
            </section>

            <section id="tab-bag" class="hidden space-y-4">
                <h2 class="text-2xl font-black italic text-blue-500 mb-4">COLLECTION</h2>
                <div id="poke-list" class="grid grid-cols-2 gap-4">
                    </div>
            </section>

            <section id="tab-data" class="hidden space-y-4">
                <h2 class="text-2xl font-black italic text-cyan-400 mb-4">ANALYTICS</h2>
                <div class="mezastar-ui rounded-2xl p-6">
                    <canvas id="statChart" class="w-full h-48"></canvas>
                    <div id="history-log" class="mt-6 space-y-2 text-xs">
                        </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // --- 數據庫初始化 [Analytics Lab] ---
        const db = new Dexie("MezastarUltimateDB");
        db.version(1).stores({ logs: '++id, timestamp, formula, isCorrect, timeTaken', collection: 'id, name, level, exp' });

        // --- 核心遊戲變數 ---
        let currentAns = 0, currentExp = 0, currentLevel = 1;
        let startTime = Date.now();
        const POKEDEX = [
            { id: 4, name: "小火龍", evolutions: [4, 5, 6] },
            { id: 7, name: "傑尼龜", evolutions: [7, 8, 9] },
            { id: 1, name: "妙蛙種子", evolutions: [1, 2, 3] }
        ];
        let myTeam = POKEDEX[0];

        // --- 標籤切換系統 ---
        function switchTab(tabName) {
            ['battle', 'bag', 'data'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
                document.getElementById(`nav-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');
            document.getElementById(`nav-${tabName}`).classList.add('tab-active');
            if(tabName === 'data') renderAnalytics();
            if(tabName === 'bag') renderBag();
        }

        // --- 戰鬥與方塊生成 [Content Lab] ---
        function generateQuestion() {
            const a = Math.floor(Math.random() * 8) + 2;
            const b = Math.floor(Math.random() * 8) + 2;
            currentAns = a * b;
            document.getElementById('formula').innerText = `${a} × ${b} = ?`;
            document.getElementById('ans-input').value = "";
            startTime = Date.now();

            const stage = document.getElementById('block-stage');
            stage.innerHTML = "";
            for(let i=0; i<currentAns; i++) {
                setTimeout(() => {
                    const b = document.createElement('div');
                    b.className = 'block-unit';
                    stage.appendChild(b);
                    requestAnimationFrame(() => b.classList.add('block-show'));
                }, i * 20);
            }
        }

        async function processAttack() {
            const userAns = parseInt(document.getElementById('ans-input').value);
            const timeTaken = (Date.now() - startTime) / 1000;
            const isCorrect = userAns === currentAns;

            // 紀錄數據 [Analytics Lab]
            await db.logs.add({ timestamp: Date.now(), formula: document.getElementById('formula').innerText, isCorrect, timeTaken });

            if(isCorrect) {
                currentExp += 25;
                document.getElementById('exp-bar').style.width = currentExp + "%";
                showCombatText("EXCELLENT!", "text-yellow-400");
                if(currentExp >= 100) triggerEvolution();
                else setTimeout(generateQuestion, 1200);
            } else {
                showCombatText("MISS!", "text-red-500");
            }
        }

        // --- 進化儀式 [Engine Lab] ---
        function triggerEvolution() {
            const light = document.getElementById('evo-light');
            light.classList.add('evo-flash-anim');
            showCombatText("EVOLVING!", "text-purple-400");

            setTimeout(() => {
                currentLevel = Math.min(3, currentLevel + 1);
                currentExp = 0;
                document.getElementById('exp-bar').style.width = "0%";
                const newId = myTeam.evolutions[currentLevel - 1];
                document.getElementById('active-poke-img').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${newId}.png`;
                
                light.classList.remove('evo-flash-anim');
                generateQuestion();
            }, 3000);
        }

        function showCombatText(txt, color) {
            const fx = document.getElementById('combat-fx');
            fx.innerHTML = `<h2 class="text-4xl font-black italic ${color} animate-bounce">${txt}</h2>`;
            setTimeout(() => fx.innerHTML = "", 1000);
        }

        // --- 數據呈現 [Analytics Lab] ---
        async function renderAnalytics() {
            const logs = await db.logs.orderBy('timestamp').reverse().limit(5).toArray();
            const history = document.getElementById('history-log');
            history.innerHTML = logs.map(l => `
                <div class="flex justify-between border-b border-slate-800 pb-1">
                    <span>${l.formula}</span>
                    <span class="${l.isCorrect ? 'text-green-500' : 'text-red-500'}">${l.isCorrect ? 'SUCCESS' : 'FAIL'} (${l.timeTaken}s)</span>
                </div>
            `).join('');
        }

        // 初始化
        generateQuestion();
    </script>
</body>
</html>
