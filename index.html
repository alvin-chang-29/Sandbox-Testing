<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMath Master v38.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        :root { --pkm-red: #ff1f1f; --pkm-blue: #3b82f6; }
        body { font-family: 'PingFang TC', sans-serif; touch-action: manipulation; overflow: hidden; }
        .grid-cell { transition: all 0.2s; position: relative; }
        .highlight-row { background-color: rgba(59, 130, 246, 0.2); }
        .highlight-col { background-color: rgba(239, 68, 68, 0.2); }
        .highlight-cross { background-color: rgba(168, 85, 247, 0.4) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .pokeball-btn { filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); active: scale(0.9); }
        #pokemon-sprite { transition: transform 60s linear; }
        .runaway { transform: translateX(120vw) !important; }
    </style>
</head>
<body class="bg-slate-100 flex flex-col h-screen">

    <div class="h-1/3 bg-gradient-to-b from-blue-400 to-green-100 relative overflow-hidden p-4">
        <div id="battle-scene" class="flex justify-between items-end h-full pb-4">
            <div id="player-side" class="w-1/3 text-center">
                <div class="bg-white/80 rounded-full py-1 px-3 text-xs font-bold mb-2">玩家</div>
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" class="w-12 mx-auto">
            </div>
            
            <div id="enemy-side" class="w-2/3 text-right relative">
                <div class="inline-block bg-white/90 rounded-lg p-2 shadow-sm mr-4 mb-2 min-w-[120px]">
                    <div id="pkm-name" class="font-bold text-sm">載入中...</div>
                    <div class="w-full bg-gray-200 h-2 rounded-full mt-1">
                        <div id="pkm-hp" class="bg-green-500 h-2 rounded-full w-full transition-all duration-500"></div>
                    </div>
                </div>
                <img id="pokemon-sprite" src="" class="w-24 h-24 object-contain ml-auto">
            </div>
        </div>
    </div>

    <div id="math-ui" class="bg-white shadow-inner p-4 flex-1">
        <div class="flex justify-between items-center mb-4">
            <div class="text-lg font-black text-slate-700">對戰挑戰：<span id="target-math" class="text-blue-600">-- x --</span></div>
            <div id="timer-display" class="font-mono text-xl text-red-500">00s</div>
        </div>

        <div id="matrix-container" class="grid grid-cols-10 gap-1 bg-gray-200 p-1 rounded border-2 border-slate-300 overflow-auto h-64">
            </div>

        <div class="flex mt-4 gap-4 items-center">
            <input id="answer-input" type="number" placeholder="?" 
                   class="flex-1 text-2xl border-b-4 border-blue-500 text-center focus:outline-none bg-transparent">
            <button id="catch-btn" class="pokeball-btn">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" class="w-14 h-14">
            </button>
        </div>
    </div>

    <script>
        // --- 初始化資料庫 ---
        const db = new Dexie("PokeMathDB");
        db.version(1).stores({ collection: '++id, pkmId, name, timestamp' });

        // --- 全域變數 ---
        let currentPkm = null;
        let startTime = 0;
        let timerInterval;
        let targetX = 0, targetY = 0;
        const NAME_CACHE = new Map();

        // --- 核心邏輯 ---
        const App = {
            async init() {
                this.renderMatrix();
                await this.newEncounter();
                this.bindEvents();
            },

            async fetchPkmName(id) {
                if (NAME_CACHE.has(id)) return NAME_CACHE.get(id);
                try {
                    const res = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`);
                    const data = await res.json();
                    const twName = data.names.find(n => n.language.name === "zh-Hant").name;
                    NAME_CACHE.set(id, twName);
                    return twName;
                } catch { return "寶可夢"; }
            },

            async newEncounter() {
                const randomId = Math.floor(Math.random() * 151) + 1;
                const name = await this.fetchPkmName(randomId);
                
                document.getElementById('pokemon-sprite').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${randomId}.png`;
                document.getElementById('pkm-name').innerText = name;
                document.getElementById('pokemon-sprite').classList.remove('runaway');
                
                targetX = Math.floor(Math.random() * 9) + 1;
                targetY = Math.floor(Math.random() * 9) + 1;
                document.getElementById('target-math').innerText = `${targetX} x ${targetY}`;
                
                this.startTimer();
            },

            renderMatrix() {
                const container = document.getElementById('matrix-container');
                container.innerHTML = '';
                for (let r = 0; r <= 9; r++) {
                    for (let c = 0; c <= 9; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'grid-cell bg-white aspect-square flex items-center justify-center text-xs font-bold border border-gray-100';
                        if (r === 0 || c === 0) {
                            cell.classList.add('bg-gray-100', 'text-gray-500');
                            cell.innerText = r || c || '';
                        } else {
                            cell.dataset.r = r;
                            cell.dataset.c = c;
                            cell.onclick = () => this.handleCellClick(r, c);
                        }
                        container.appendChild(cell);
                    }
                }
            },

            handleCellClick(r, c) {
                // 清除舊高亮
                document.querySelectorAll('.grid-cell').forEach(el => {
                    el.classList.remove('highlight-row', 'highlight-col', 'highlight-cross');
                });
                // 十字交叉亮帶
                document.querySelectorAll(`[data-r="${r}"]`).forEach(el => el.classList.add('highlight-row'));
                document.querySelectorAll(`[data-c="${c}"]`).forEach(el => el.classList.add('highlight-col'));
                const cross = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
                cross.classList.add('highlight-cross');
            },

            startTimer() {
                clearInterval(timerInterval);
                startTime = Date.now();
                const sprite = document.getElementById('pokemon-sprite');
                
                timerInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - startTime) / 1000);
                    document.getElementById('timer-display').innerText = `${elapsed}s`;
                    
                    if (elapsed >= 40) document.getElementById('pkm-hp').style.width = '50%';
                    if (elapsed >= 60) {
                        sprite.classList.add('runaway');
                        clearInterval(timerInterval);
                        setTimeout(() => this.newEncounter(), 2000);
                    }
                }, 1000);
            },

            async checkCapture() {
                const input = parseInt(document.getElementById('answer-input').value);
                const elapsed = (Date.now() - startTime) / 1000;
                
                if (input === targetX * targetY) {
                    clearInterval(timerInterval);
                    if (elapsed <= 20) {
                        alert("絕佳！成功捕獲！");
                        await db.collection.add({ pkmId: 1, name: document.getElementById('pkm-name').innerText, timestamp: Date.now() });
                    } else if (elapsed <= 40) {
                        alert("捕獲成功！但牠差點逃走。");
                    }
                    document.getElementById('answer-input').value = '';
                    this.newEncounter();
                } else {
                    alert("計算錯誤！捕獲失敗");
                }
            }
        };

        window.onload = () => App.init();
        function bindEvents() {
            document.getElementById('catch-btn').onclick = () => App.checkCapture();
        }
    </script>
</body>
</html>
