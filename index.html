<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mezastar Math: Ultimate v26.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Noto+Sans+TC:wght@900&display=swap');
        
        body { font-family: 'Orbitron', 'Noto Sans TC', sans-serif; background: #020617; color: white; overflow: hidden; user-select: none; }

        /* 3D 爆炸開場 */
        .burst-stage { perspective: 1500px; position: relative; width: 100vw; height: 50vh; overflow: hidden; }
        .poke-burst-unit { position: absolute; width: 150px; height: 150px; top: 50%; left: 50%; margin: -75px; opacity: 0; animation: burst-fly 1.5s ease-in infinite; }
        @keyframes burst-fly {
            0% { transform: translateZ(-1000px) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateZ(1000px) scale(6); opacity: 0; }
        }

        /* 矩陣 */
        .matrix-scale { transform: scale(1.4); transform-origin: center; }
        .block-unit { width: 90%; height: 90%; margin: auto; border-radius: 6px; background: radial-gradient(circle at 30% 30%, #fbbf24, #d97706); transform: scale(0); transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .block-show { transform: scale(1); }

        /* 虛線引導 */
        #guide-line { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .dash-line { stroke: #facc15; stroke-width: 4; stroke-dasharray: 10, 10; animation: dash-move 0.5s linear infinite; }
        @keyframes dash-move { to { stroke-dashoffset: -20; } }

        /* 閃爍引導 */
        .guide-flash { animation: guide-pulse 0.6s infinite alternate; border: 4px solid #facc15 !important; color: #facc15 !important; }
        @keyframes guide-pulse { from { opacity: 1; filter: brightness(1.2); } to { opacity: 0.4; filter: brightness(2.5); } }

        /* 收服按鈕抖動 */
        .ball-shake { animation: shake-btn 0.5s infinite; }
        @keyframes shake-btn { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(10deg); } 75% { transform: rotate(-10deg); } }

        .scene { position: absolute; inset: 0; transition: opacity 0.5s; }
        .hidden { display: none !important; }
        .hp-fill { background: #ef4444; transition: width 1.5s ease-in-out; }
        .battling { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(-2px, 2px); } 100% { transform: translate(2px, -2px); } }
    </style>
</head>
<body>

    <svg id="guide-line" class="hidden"><line id="svg-line" class="dash-line" x1="0" y1="0" x2="0" y2="0"/></svg>

    <div id="scene-start" class="scene flex flex-col items-center justify-center bg-black z-[1000]">
        <div class="burst-stage" id="burst-box"></div>
        <button onclick="changeScene('main')" class="bg-red-600 px-20 py-8 rounded-full text-4xl font-black border-4 border-white shadow-2xl z-50">一起抓夢吧！</button>
    </div>

    <div id="scene-main" class="scene hidden flex flex-col p-4">
        <div class="flex justify-center mb-10">
            <div id="formula-box" class="inline-flex items-center border-8 border-yellow-400 p-6 bg-black/60 rounded-3xl text-[100px] font-black italic">
                <span id="q-a">?</span> <span class="mx-4 text-blue-500">×</span> <span id="q-b">?</span> 
                <span class="mx-4 text-blue-500">=</span> <span id="q-ans" class="text-slate-800">?</span>
            </div>
        </div>

        <div class="flex-grow flex items-center justify-around">
            <div id="enemy-box" class="flex flex-col items-center w-1/4">
                <div id="enemy-sprite" class="w-80 h-80 bg-contain bg-no-repeat bg-center"></div>
                <div class="mt-4 text-center bg-black/60 p-4 rounded-3xl w-full border-2 border-white/20">
                    <p id="e-name-zh" class="text-2xl font-black">---</p>
                    <p id="e-name-other" class="text-xs text-slate-400">--- / ---</p>
                    <div class="w-full h-4 bg-red-950 rounded-full mt-2 overflow-hidden border">
                        <div id="e-hp" class="hp-fill h-full w-full"></div>
                    </div>
                    <button onclick="refreshEnemy()" class="mt-4 bg-slate-800 px-4 py-1 rounded-full text-xs border border-slate-600 hover:bg-slate-700 transition">挑戰其他寶可夢</button>
                    <div id="attack-text" class="hidden text-yellow-400 font-black animate-bounce mt-2 text-xl italic">攻擊效果絕佳!!</div>
                </div>
            </div>

            <div class="matrix-scale flex flex-col items-center">
                <div class="bg-slate-900 border-4 border-blue-500 w-[300px] h-[300px] p-2 relative rounded-2xl">
                    <div id="grid" class="grid grid-cols-10 grid-rows-10 gap-1 h-full w-full"></div>
                    <div id="block-layer" class="absolute inset-0 p-2 grid grid-cols-10 grid-rows-10 gap-1 pointer-events-none"></div>
                </div>
                <button id="btn-go" onclick="startBattle()" class="bg-blue-600 mt-20 px-12 py-4 rounded-2xl font-black italic text-2xl border-b-4 border-blue-900">上吧！<span class="p-name-zh">皮卡丘</span></button>
            </div>

            <div id="player-box" class="flex flex-col items-center w-1/4">
                <div id="player-sprite" class="w-80 h-80 bg-contain bg-no-repeat bg-center" style="transform: scaleX(-1);"></div>
                <div class="mt-4 text-center bg-black/60 p-4 rounded-3xl w-full border-2 border-blue-500/40">
                    <p class="p-name-zh text-2xl font-black text-blue-400">皮卡丘</p>
                    <p id="p-name-other" class="text-xs text-slate-400">Pikachu / ピカチュウ</p>
                    <button onclick="openBag()" class="mt-4 bg-slate-800 px-6 py-2 rounded-xl border border-slate-600 flex items-center gap-2 mx-auto">🎒 背包</button>
                </div>
            </div>
        </div>
    </div>

    <div id="scene-capture" class="scene hidden flex flex-col items-center justify-center bg-black/95 z-[2000]">
        <div id="cap-sprite" class="w-80 h-80 bg-contain bg-no-repeat bg-center mb-8 animate-bounce"></div>
        <div class="bg-slate-900 p-8 rounded-3xl border-4 border-yellow-500 text-center mb-10">
            <h2 id="cap-name-zh" class="text-5xl font-black text-yellow-400 italic">---</h2>
            <p id="cap-name-other" class="text-slate-400 text-lg">--- / ---</p>
            <p class="text-white text-3xl font-black mt-4">成功收服了！！</p>
        </div>
        <div class="flex gap-6">
            <button onclick="changeScene('main')" class="bg-slate-700 px-10 py-4 rounded-xl font-bold">繼續冒險</button>
            <button onclick="captureAndGoBag()" class="bg-red-600 px-10 py-4 rounded-xl font-bold flex items-center gap-3 ball-shake">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" class="w-8 h-8">
                收服寶可夢
            </button>
        </div>
    </div>

    <div id="scene-bag" class="scene hidden bg-slate-950 p-8 z-[3000] overflow-y-auto">
        <div class="flex justify-between items-center mb-8 border-b-4 border-blue-900 pb-4">
            <h2 class="text-4xl font-black italic text-blue-400">POKEMON BAG</h2>
            <button onclick="closeBag()" class="bg-slate-800 w-12 h-12 rounded-full font-bold">✕</button>
        </div>
        <div id="bag-grid" class="grid grid-cols-2 md:grid-cols-5 gap-10"></div>
    </div>

    <script>
        const db = new Dexie("MezastarV26DB");
        db.version(1).stores({ bag: 'id, name, en, jp, type, count' });

        // 預設 30 隻常用資料 (作為隨機挑選的樣本或優先名稱對應)
        const PRESET_DATA = [
            {id: 25, name: "皮卡丘", en: "Pikachu", jp: "ピカチュウ", type: "⚡ 電系"},
            {id: 6, name: "噴火龍", en: "Charizard", jp: "リザードン", type: "🔥 火系"},
            {id: 906, name: "新葉喵", en: "Sprigatito", jp: "ニャオハ", type: "🍃 草系"},
            {id: 909, name: "呆火鱷", en: "Fuecoco", jp: "ホゲータ", type: "🔥 火系"},
            {id: 912, name: "潤水鴨", en: "Quaxly", jp: "クワッス", type: "💧 水系"},
            {id: 150, name: "超夢", en: "Mewtwo", jp: "ミュウツー", type: "🔮 超能力"},
            {id: 448, name: "路卡利歐", en: "Lucario", jp: "ルカリオ", type: "👊 格鬥"},
            {id: 133, name: "伊布", en: "Eevee", jp: "イーブイ", type: "⚪ 一般"},
            {id: 384, name: "烈空坐", en: "Rayquaza", jp: "レックウザ", type: "🐲 龍系"},
            {id: 94, name: "耿鬼", en: "Gengar", jp: "ゲンガー", type: "👻 幽靈"}
            // ... 可擴充
        ];

        let valA, valB, ans, playerPoke = PRESET_DATA[0], enemyPoke = {}, step = 'wait';

        async function init() {
            if (await db.bag.count() === 0) await db.bag.add({...playerPoke, count: 1});
            initStartScene();
            buildGrid();
            refreshEnemy();
        }

        function initStartScene() {
            const box = document.getElementById('burst-box');
            [25, 6, 906, 150, 448, 912, 133, 94, 384, 909].forEach((id, i) => {
                const img = document.createElement('img');
                img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
                img.className = 'poke-burst-unit';
                img.style.animationDelay = `${i * 0.2}s`;
                box.appendChild(img);
            });
        }

        // 隨機從 1-1025 中挑選
        async function refreshEnemy() {
            const randomID = Math.floor(Math.random() * 1025) + 1;
            // 嘗試匹配預設資料，若無則顯示編號(真實開發會串接完整多語系JSON)
            const matched = PRESET_DATA.find(p => p.id === randomID);
            enemyPoke = matched ? {...matched} : {
                id: randomID, name: "寶可夢 #" + randomID, en: "Unknown", jp: "アンノウン", type: "❔ 未知"
            };
            
            document.getElementById('enemy-sprite').style.backgroundImage = `url(https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${randomID}.png)`;
            document.getElementById('e-name-zh').innerText = enemyPoke.name;
            document.getElementById('e-name-other').innerText = `${enemyPoke.en} / ${enemyPoke.jp}`;
            resetBattle();
        }

        function resetBattle() {
            valA = Math.floor(Math.random() * 8) + 2; valB = Math.floor(Math.random() * 8) + 2; ans = valA * valB;
            step = 'wait';
            document.getElementById('q-a').innerText = valA; document.getElementById('q-b').innerText = valB;
            document.getElementById('q-ans').innerText = "?";
            document.getElementById('q-ans').className = "text-slate-800";
            document.getElementById('e-hp').style.width = "100%";
            document.getElementById('player-sprite').style.backgroundImage = `url(https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${playerPoke.id}.png)`;
            document.querySelectorAll('.p-name-zh').forEach(el => el.innerText = playerPoke.name);
            document.getElementById('p-name-other').innerText = `${playerPoke.en} / ${playerPoke.jp}`;
            document.getElementById('block-layer').innerHTML = "";
            document.getElementById('guide-line').classList.add('hidden');
            document.getElementById('attack-text').classList.add('hidden');
            document.getElementById('enemy-box').classList.remove('battling');
            document.getElementById('player-box').classList.remove('battling');
            document.getElementById('btn-go').classList.remove('hidden');
        }

        function startBattle() {
            step = 'selectA';
            document.getElementById('btn-go').classList.add('hidden');
            document.getElementById('enemy-box').classList.add('battling');
            document.getElementById('player-box').classList.add('battling');
            updateGuide();
        }

        function updateGuide() {
            document.querySelectorAll('.guide-flash').forEach(el => el.classList.remove('guide-flash'));
            const svg = document.getElementById('guide-line');
            const line = document.getElementById('svg-line');
            svg.classList.add('hidden');

            if(step === 'selectA') {
                const start = document.getElementById('q-a'); const end = document.getElementById(`row-${valA}`);
                start.classList.add('guide-flash'); end.classList.add('guide-flash');
                drawGuide(start, end);
            } else if(step === 'selectB') {
                const start = document.getElementById('q-b'); const end = document.getElementById(`col-${valB}`);
                start.classList.add('guide-flash'); end.classList.add('guide-flash');
                drawGuide(start, end);
            } else if(step === 'finish') {
                document.getElementById('q-ans').classList.add('guide-flash');
            }
        }

        function drawGuide(el1, el2) {
            const svg = document.getElementById('guide-line');
            const line = document.getElementById('svg-line');
            const r1 = el1.getBoundingClientRect(); const r2 = el2.getBoundingClientRect();
            line.setAttribute('x1', r1.left + r1.width/2); line.setAttribute('y1', r1.top + r1.height/2);
            line.setAttribute('x2', r2.left + r2.width/2); line.setAttribute('y2', r2.top + r2.height/2);
            svg.classList.remove('hidden');
        }

        function handleRow(r) { if(step === 'selectA' && r === valA) { step = 'selectB'; createBlock(valA, 1); updateGuide(); } }
        function handleCol(c) {
            if(step === 'selectB' && c === valB) {
                step = 'animating'; document.getElementById('guide-line').classList.add('hidden');
                for(let j=2; j<=valB; j++) {
                    setTimeout(() => { 
                        for(let i=1; i<=valA; i++) createBlock(i, j); 
                        if(j === valB) { step = 'finish'; showAns(); }
                    }, (j-1) * 200);
                }
            }
        }

        function showAns() {
            const qa = document.getElementById('q-ans'); qa.innerText = ans;
            qa.classList.add('text-slate-500', 'guide-flash');
            qa.onclick = () => {
                qa.classList.remove('guide-flash'); qa.classList.add('text-white', 'scale-150', 'animate-pulse');
                document.getElementById('e-hp').style.width = "0%";
                document.getElementById('attack-text').classList.remove('hidden');
                setTimeout(() => { changeScene('capture'); }, 2000);
            };
        }

        // 核心功能：收服並進入背包
        async function captureAndGoBag() {
            const existing = await db.bag.get(enemyPoke.id);
            if(existing) {
                await db.bag.update(enemyPoke.id, { count: (existing.count || 1) + 1 });
            } else {
                await db.bag.add({ ...enemyPoke, count: 1 });
            }
            openBag();
        }

        async function openBag() {
            changeScene('bag');
            const items = await db.bag.toArray();
            const grid = document.getElementById('bag-grid');
            grid.innerHTML = items.map(i => `
                <div onclick="selectPoke(${i.id})" class="bg-slate-800 p-6 rounded-[3rem] text-center border-4 border-slate-700 hover:border-blue-500 cursor-pointer relative">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${i.id}.png" class="w-full h-auto scale-125">
                    <p class="text-2xl font-black mt-4">${i.name}</p>
                    <p class="text-xs opacity-50">${i.en} / ${i.jp}</p>
                    <p class="text-blue-400 font-bold">${i.type}</p>
                    ${i.count > 1 ? `<div class="absolute bottom-4 right-4 bg-red-600 text-white px-3 py-1 rounded-full text-xl font-bold">x${i.count}</div>` : ''}
                </div>
            `).join('');
        }

        function selectPoke(id) {
            db.bag.get(id).then(p => { playerPoke = p; closeBag(); resetBattle(); });
        }

        function buildGrid() {
            const grid = document.getElementById('grid'); grid.innerHTML = "";
            for (let r = 0; r <= 9; r++) {
                for (let c = 0; c <= 9; c++) {
                    const d = document.createElement('div');
                    d.className = "flex items-center justify-center border border-slate-800 text-[10px]";
                    if (c === 0 && r > 0) { d.innerText = r; d.id = `row-${r}`; d.onclick = () => handleRow(r); }
                    else if (r === 0 && c > 0) { d.innerText = c; d.id = `col-${c}`; d.onclick = () => handleCol(c); }
                    grid.appendChild(d);
                }
            }
        }

        function createBlock(r, c) {
            const wrap = document.createElement('div'); wrap.style.gridRow = r + 1; wrap.style.gridColumn = c + 1;
            const b = document.createElement('div'); b.className = "block-unit";
            wrap.appendChild(b); document.getElementById('block-layer').appendChild(wrap);
            setTimeout(() => b.classList.add('block-show'), 50);
        }

        function changeScene(s) {
            document.querySelectorAll('.scene').forEach(sc => sc.classList.add('hidden'));
            document.getElementById(`scene-${s}`).classList.remove('hidden');
        }
        function closeBag() { document.getElementById('scene-bag').classList.add('hidden'); }

        init();
    </script>
</body>
</html>
