<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mezastar 強制發聲版 - v11.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .mezastar-theme { background: radial-gradient(circle, #1e293b, #020617); }
        .glow-btn { box-shadow: 0 0 15px #3b82f6; }
    </style>
</head>
<body class="mezastar-theme text-white min-h-screen flex items-center justify-center p-6">

    <div id="overlay" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center">
        <h1 class="text-4xl font-black italic mb-10 text-blue-500">MEZASTAR MATH</h1>
        <p class="text-slate-500 mb-6 text-sm">請確認側邊開關未開啟靜音</p>
        <button id="unlock-btn" class="bg-blue-600 px-20 py-8 rounded-full font-black text-2xl glow-btn active:scale-90 transition">
            GET READY!
        </button>
    </div>

    <div class="text-center">
        <div class="mb-10 text-2xl font-black italic text-blue-300">SYSTEM READY</div>
        <button onclick="playMezastarHit()" class="bg-red-600 px-12 py-6 rounded-2xl font-bold text-xl glow-btn">
            攻擊音效測試
        </button>
    </div>

    <script>
        // 1. 預先建立 Audio 物件 (不要在 function 裡才 new)
        const hitSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2577/2577-preview.mp3');
        const startSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
        const bgm = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3');

        // 2. 關鍵解鎖函數
        document.getElementById('unlock-btn').addEventListener('click', function() {
            // 在這個同步的點擊事件中，立刻「摸一下」所有音軌
            hitSound.play().then(() => { hitSound.pause(); hitSound.currentTime = 0; });
            startSound.play(); // 播放開場音樂
            
            bgm.loop = true;
            bgm.volume = 0.2;
            bgm.play();

            document.getElementById('overlay').style.display = 'none';
        });

        // 3. 測試播放
        function playMezastarHit() {
            // 直接播放預載好的物件，不要有任何邏輯判斷
            hitSound.currentTime = 0;
            hitSound.play();
        }
    </script>
</body>
</html>
